<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SpriNg Bot"/>
  <meta name="theme-color" content="#08090f"/>
  <title>SpriNg Bot</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#08090f;color:#e0e0f0;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;justify-content:center;}
    ::-webkit-scrollbar{width:0;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,224,150,0.35)}50%{box-shadow:0 0 0 10px rgba(0,224,150,0)}}
    @keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(255,77,109,0.35)}50%{box-shadow:0 0 0 10px rgba(255,77,109,0)}}
    .wrap{width:100%;max-width:400px;padding:0 16px 40px;}
    .header{display:flex;align-items:center;justify-content:space-between;padding:48px 0 20px;}
    .logo-signal{font-size:22px;font-weight:800;background:linear-gradient(135deg,#4fc3f7,#7c83ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logo-pro{font-size:11px;font-weight:700;color:#f0c040;background:rgba(240,192,64,0.12);padding:2px 7px;border-radius:5px;margin-left:6px;vertical-align:middle;}
    .selectors{display:flex;gap:8px;margin-bottom:14px;position:relative;}
    .pair-btn{flex:1;display:flex;align-items:center;justify-content:space-between;background:#10121e;border:1px solid #1e2235;border-radius:10px;padding:10px 12px;color:#e0e0f0;font-size:13px;font-weight:600;cursor:pointer;pointer-events:auto;}
    .pair-dropdown{position:absolute;top:46px;left:0;right:70px;z-index:100;background:#10121e;border:1px solid #1e2235;border-radius:10px;max-height:220px;overflow-y:auto;box-shadow:0 8px 32px #000;}
    .pair-item{padding:11px 12px;font-size:13px;cursor:pointer;color:#b0b8d8;border-bottom:1px solid #0d0f1a;}
    .pair-item.active{color:#7c83ff;background:#1a1c2e;}
    .card{background:#10121e;border:1px solid #1a1c2e;border-radius:16px;padding:18px;margin-bottom:12px;min-height:140px;display:flex;align-items:center;justify-content:center;}
    .card-inner{width:100%;animation:fadeUp 0.4s ease;}
    .idle{text-align:center;color:#2a2d45;font-size:14px;padding:20px 0;}
    .spinner{width:38px;height:38px;border:3px solid #1e2235;border-top:3px solid #7c83ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px;}
    .analyzing{color:#555;font-size:12px;text-align:center;}
    .sec-lbl{font-size:10px;color:#444;font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;}
    .ibox{background:#0d0f1a;border-radius:10px;padding:11px 13px;margin-bottom:8px;}
    .ilbl{font-size:10px;color:#444;margin-bottom:3px;}
    .ival{font-size:15px;font-weight:700;color:#fff;}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
    .acc{color:#7c83ff!important;}
    .bar-track{background:#1a1c2e;border-radius:100px;height:5px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:100px;transition:width 1s ease;}
    .bar-fill.up{background:linear-gradient(90deg,#4fc3f7,#00e096);}
    .bar-fill.down{background:linear-gradient(90deg,#ff4d6d,#ff8c00);}
    .bar-lbl{display:flex;justify-content:space-between;margin-top:3px;}
    .bar-lbl span{font-size:9px;color:#333;}
    .dir-box{border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;}
    .dir-box.up{background:rgba(0,224,150,0.07);border:1px solid rgba(0,224,150,0.2);}
    .dir-box.down{background:rgba(255,77,109,0.07);border:1px solid rgba(255,77,109,0.2);}
    .dir-box.wait{background:rgba(240,192,64,0.07);border:1px solid rgba(240,192,64,0.2);}
    .dir-lbl{font-size:26px;font-weight:900;}
    .dir-lbl.up{color:#00e096;}
    .dir-lbl.down{color:#ff4d6d;}
    .dir-lbl.wait{color:#f0c040;}
    .reasons-box{background:#0d0f1a;border-radius:10px;padding:12px 14px;margin-bottom:12px;}
    .reason-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
    .reason-item:last-child{margin-bottom:0;}
    .reason-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
    .reason-num.up{background:rgba(0,224,150,0.15);color:#00e096;}
    .reason-num.down{background:rgba(255,77,109,0.15);color:#ff4d6d;}
    .reason-num.wait{background:rgba(240,192,64,0.15);color:#f0c040;}
    .reason-txt{font-size:12px;color:#a0a8c8;line-height:1.5;}
    .sr-box{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
    .sr-item{background:#0d0f1a;border-radius:8px;padding:8px 10px;text-align:center;}
    .sr-lbl{font-size:9px;color:#444;margin-bottom:3px;}
    .sr-val{font-size:11px;font-weight:700;}
    .mtf-box{background:#0d0f1a;border-radius:10px;padding:12px;margin-bottom:8px;}
    .mtf-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #0a0c14;}
    .mtf-row:last-child{border-bottom:none;}
    .mtf-tf{font-size:11px;color:#555;width:50px;}
    .mtf-bar{flex:1;height:4px;background:#1a1c2e;border-radius:100px;overflow:hidden;margin:0 8px;}
    .mtf-fill{height:100%;border-radius:100px;}
    .mtf-sig{font-size:11px;font-weight:700;width:40px;text-align:right;}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
    .btn-take{padding:13px;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;pointer-events:auto;}
    .btn-take.up{background:#00e096;animation:pulse 2s infinite;}
    .btn-take.down{background:#ff4d6d;animation:pulseRed 2s infinite;}
    .btn-take.wait{background:#f0c040;color:#000;}
    .btn-skip{padding:13px;background:transparent;border:1px solid #1e2235;border-radius:10px;color:#555;font-weight:700;font-size:14px;cursor:pointer;pointer-events:auto;}
    .success-box{text-align:center;padding:14px;background:rgba(0,224,150,0.06);border-radius:10px;border:1px solid rgba(0,224,150,0.18);grid-column:1/-1;}
    .success-text{font-size:13px;color:#00e096;font-weight:600;}
    .new-sig-btn{margin-top:8px;background:none;border:none;color:#555;font-size:12px;cursor:pointer;}
    .get-btn{width:100%;padding:15px;background:linear-gradient(135deg,#4fc3f7,#7c83ff);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 24px rgba(124,131,255,0.28);pointer-events:auto;}
    .get-btn.loading{background:#1e2035;cursor:not-allowed;box-shadow:none;}
    .bull{color:#00e096;} .bear{color:#ff4d6d;} .neut{color:#f0c040;}
    .nav{display:flex;justify-content:space-around;margin-top:24px;border-top:1px solid #10121e;padding-top:14px;}
    .nav-item{text-align:center;cursor:pointer;pointer-events:auto;}
    .nav-icon{font-size:17px;margin-bottom:2px;}
    .nav-label{font-size:9px;color:#333;}
    .nav-item.active .nav-label{color:#7c83ff;font-weight:700;}
    .nav-item:not(.active) .nav-icon{opacity:0.2;}
    .err-box{text-align:center;padding:24px;color:#ff4d6d;font-size:13px;line-height:1.8;}
    .wave-box{background:#0d0f1a;border-radius:10px;padding:11px 13px;margin-bottom:8px;}
    .wave-lbl{font-size:10px;color:#444;margin-bottom:6px;}
    .wave-tag{display:inline-block;background:#1a1c2e;border-radius:5px;padding:2px 7px;font-size:10px;color:#7c83ff;margin:1px;}
    button,.pair-btn,.nav-item,.get-btn,.btn-take,.btn-skip,.new-sig-btn,.pair-item{cursor:pointer!important;pointer-events:auto!important;touch-action:manipulation!important}
    .pair-dropdown{pointer-events:auto!important;z-index:99999!important}
    #hPage button,#hPage *{pointer-events:auto!important;cursor:pointer!important}
    *{-webkit-user-select:none;user-select:none}
    .wrap,.card,.card-inner,.header,.selectors,.nav,body,html{pointer-events:auto!important}
    [style*="display:none"],[style*="display: none"]{pointer-events:none!important}
    #dd[style*="display:block"],#dd[style*="display: block"]{pointer-events:auto!important}
    #dd .pair-item{pointer-events:auto!important}
    .success-box button{pointer-events:auto!important;cursor:pointer!important}
    #hPage{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#08090f;z-index:9999;overflow-y:auto;padding:20px 16px 40px;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <span class="logo-signal">SpriNg</span>
      <span class="logo-pro">PRO</span>
    </div>
  </div>

  <div class="selectors">
    <div style="flex:1;position:relative;">
      <button class="pair-btn" id="pairBtn">
        <span id="pairLabel">EUR/USD</span>
        <span style="color:#444;font-size:10px;">▼</span>
      </button>
      <div class="pair-dropdown" id="dd" style="display:none;"></div>
    </div>
  </div>
  <input type="hidden" id="tfSelect" value="5min"/>

  <div class="card" id="card">
    <div class="idle">Press Get Signal to start</div>
  </div>

  <button class="get-btn" id="getBtn">⚡ Get Signal</button>

  <div class="nav">
    <div class="nav-item" id="navProfile"><div class="nav-icon">👤</div><div class="nav-label">Profile</div></div>
    <div class="nav-item" id="navHistory"><div class="nav-icon">🕶</div><div class="nav-label">History</div></div>
    <div class="nav-item active"><div class="nav-icon">📈</div><div class="nav-label">Signals</div></div>
    <div class="nav-item" id="navAI"><div class="nav-icon">🧠</div><div class="nav-label">AI</div></div>
    <div class="nav-item" id="navSupport"><div class="nav-icon">🎧</div><div class="nav-label">Support</div></div>

</div>

<script>
// ======= ربط الأحداث =======
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('getBtn').addEventListener('click', function(e) {
    e.preventDefault();
    getSignal();
  });

  document.getElementById('pairBtn').addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    var d = document.getElementById('dd');
    d.style.display = d.style.display === 'none' ? 'block' : 'none';
  });

  document.getElementById('navProfile').addEventListener('click', function(e) {
    e.preventDefault();
    alert('Profile page');
  });
  document.getElementById('navHistory').addEventListener('click', function(e) {
    e.preventDefault();
    showHistory();
  });
  document.getElementById('navAI').addEventListener('click', function(e) {
    e.preventDefault();
    alert('AI Analysis - Coming Soon!');
  });
  document.getElementById('navSupport').addEventListener('click', function(e) {
    e.preventDefault();
    alert('Support - Contact us at support@springbot.com');
  });

  document.addEventListener('click', function() {
    document.getElementById('dd').style.display = 'none';
  });
});

// ======= باقي الكود =======
var tradeHistory=JSON.parse(localStorage.getItem("th")||"[]");
var lastTradeId=null;

function saveTrade(dir,duration,pair){
  var t={id:Date.now(),time:new Date().toLocaleTimeString(),date:new Date().toLocaleDateString(),pair:pair,dir:dir,duration:duration,result:null};
  tradeHistory.unshift(t);
  if(tradeHistory.length>100)tradeHistory=tradeHistory.slice(0,100);
  localStorage.setItem("th",JSON.stringify(tradeHistory));
  return t.id;
}

function setResult(id,result){
  tradeHistory=tradeHistory.map(function(t){if(t.id===id)t.result=result;return t;});
  localStorage.setItem("th",JSON.stringify(tradeHistory));
  var box=document.querySelector(".success-box");
  if(box){
    var c=result==="WIN"?"#00e096":"#ff4d6d";
    box.innerHTML='<div style="font-size:14px;font-weight:700;color:'+c+';">'+(result==="WIN"?"✅":"❌")+' Marked as '+result+'!</div><button class="new-sig-btn" onclick="resetCard()">Get new signal</button>';
  }
}

function showHistory(){
  var done=tradeHistory.filter(function(t){return t.result!==null;});
  var wins=done.filter(function(t){return t.result==="WIN";}).length;
  var losses=done.filter(function(t){return t.result==="LOSS";}).length;
  var rate=done.length>0?Math.round(wins/done.length*100):0;
  document.getElementById("hStats").innerHTML=
    '<div style="background:#10121e;border-radius:8px;padding:10px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#7c83ff;">'+tradeHistory.length+'</div><div style="font-size:9px;color:#444;">TOTAL</div></div>'+
    '<div style="background:#10121e;border-radius:8px;padding:10px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#00e096;">'+wins+'</div><div style="font-size:9px;color:#444;">WINS</div></div>'+
    '<div style="background:#10121e;border-radius:8px;padding:10px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#ff4d6d;">'+losses+'</div><div style="font-size:9px;color:#444;">LOSSES</div></div>'+
    '<div style="background:#10121e;border-radius:8px;padding:10px;text-align:center;"><div style="font-size:18px;font-weight:800;color:'+(rate>=65?"#00e096":rate>=50?"#f0c040":"#ff4d6d")+';">'+rate+'%</div><div style="font-size:9px;color:#444;">WIN RATE</div></div>';
  document.getElementById("hList").innerHTML=tradeHistory.length===0?
    '<div style="text-align:center;color:#2a2d45;padding:30px;font-size:13px;">No trades yet</div>':
    tradeHistory.slice(0,30).map(function(t){
      var rc=t.result==="WIN"?"#00e096":t.result==="LOSS"?"#ff4d6d":"#f0c040";
      return '<div style="background:#10121e;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">'+
        '<div><div style="font-size:13px;font-weight:700;color:#e0e0f0;">'+t.pair+'</div>'+
        '<div style="font-size:10px;color:#444;">'+t.date+' '+t.time+' | '+t.dir+'</div></div>'+
        (t.result===null?
          '<div style="display:flex;gap:6px;">'+
            '<button onclick="setResult('+t.id+',\'WIN\')" style="padding:4px 8px;background:rgba(0,224,150,0.15);border:1px solid #00e096;border-radius:6px;color:#00e096;font-size:11px;font-weight:700;cursor:pointer;">WIN</button>'+
            '<button onclick="setResult('+t.id+',\'LOSS\')" style="padding:4px 8px;background:rgba(255,77,109,0.15);border:1px solid #ff4d6d;border-radius:6px;color:#ff4d6d;font-size:11px;font-weight:700;cursor:pointer;">LOSS</button>'+
          '</div>':
          '<span style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;color:'+rc+';background:'+rc+'22;">'+t.result+'</span>')+
      '</div>';
    }).join("");
  document.getElementById("hPage").style.display="block";
}

function hideHistory(){document.getElementById("hPage").style.display="none";}

const PAIRS=[
  {label:"EUR/USD",symbol:"EUR/USD"},{label:"GBP/USD",symbol:"GBP/USD"},
  {label:"USD/JPY",symbol:"USD/JPY"},{label:"AUD/USD",symbol:"AUD/USD"},
  {label:"USD/CAD",symbol:"USD/CAD"},{label:"USD/CHF",symbol:"USD/CHF"},
  {label:"EUR/GBP",symbol:"EUR/GBP"},{label:"EUR/JPY",symbol:"EUR/JPY"},
  {label:"GBP/JPY",symbol:"GBP/JPY"},{label:"NZD/USD",symbol:"NZD/USD"},
  {label:"AUD/JPY",symbol:"AUD/JPY"},{label:"EUR/CHF",symbol:"EUR/CHF"},
  {label:"GBP/CHF",symbol:"GBP/CHF"},{label:"EUR/AUD",symbol:"EUR/AUD"},
  {label:"GBP/AUD",symbol:"GBP/AUD"},{label:"AUD/CAD",symbol:"AUD/CAD"},
  {label:"AUD/NZD",symbol:"AUD/NZD"},{label:"NZD/JPY",symbol:"NZD/JPY"},
  {label:"CAD/JPY",symbol:"CAD/JPY"},{label:"CHF/JPY",symbol:"CHF/JPY"},
  {label:"EUR/NZD",symbol:"EUR/NZD"},{label:"GBP/NZD",symbol:"GBP/NZD"},
  {label:"EUR/CAD",symbol:"EUR/CAD"},{label:"GBP/CAD",symbol:"GBP/CAD"},
  {label:"USD/MXN",symbol:"USD/MXN"},{label:"USD/SGD",symbol:"USD/SGD"},
];
let currentPair=PAIRS[0],isLoading=false;
const dd=document.getElementById("dd");
PAIRS.forEach(function(p){
  const d=document.createElement("div");
  d.className="pair-item"+(p.symbol===currentPair.symbol?" active":"");
  d.innerHTML=p.label;
  d.addEventListener('click', function(e) {
    e.stopPropagation();
    currentPair=p;
    document.getElementById("pairLabel").innerHTML=p.label;
    document.querySelectorAll(".pair-item").forEach(function(x){x.classList.remove("active");});
    this.classList.add("active");
    dd.style.display="none";
    resetCard();
  });
  dd.appendChild(d);
});

function setCard(h){document.getElementById("card").innerHTML=h;}

// ======= INDICATORS =======
function ema(data,p){
  var k=2/(p+1),e=data[0];
  for(var i=1;i<data.length;i++)e=data[i]*k+e*(1-k);
  return e;
}
function rsi(data,p){
  p=p||14;if(data.length<p+1)return 50;
  var g=0,l=0;
  for(var i=data.length-p;i<data.length;i++){var d=data[i]-data[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
  return 100-(100/(1+(g/p)/((l/p)||0.0001)));
}
function atr(H,L,C,p){
  p=p||14;var tr=[];
  for(var i=1;i<C.length;i++)tr.push(Math.max(H[i]-L[i],Math.abs(H[i]-C[i-1]),Math.abs(L[i]-C[i-1])));
  return tr.slice(-p).reduce(function(a,b){return a+b;},0)/p;
}
function macd(data){
  return ema(data.slice(-26),12)-ema(data.slice(-26),26);
}
function stoch(H,L,C,p){
  p=p||14;
  var hh=Math.max.apply(null,H.slice(-p));
  var ll=Math.min.apply(null,L.slice(-p));
  return ((C[C.length-1]-ll)/(hh-ll||0.0001))*100;
}

function marketStructure(C){
  var n=C.length,ups=0,downs=0;
  for(var i=3;i<Math.min(n,25);i++){
    if(C[i]>C[i-1]&&C[i-1]>C[i-2]&&C[i-2]>C[i-3])ups++;
    if(C[i]<C[i-1]&&C[i-1]<C[i-2]&&C[i-2]<C[i-3])downs++;
  }
  if(ups>downs+1)return{trend:"UPTREND",score:2};
  if(downs>ups+1)return{trend:"DOWNTREND",score:-2};
  return{trend:"SIDEWAYS",score:0};
}

function getSR(H,L,C){
  var last=C[C.length-1];
  var res=Math.max.apply(null,H.slice(-30));
  var sup=Math.min.apply(null,L.slice(-30));
  var pivot=(H[H.length-1]+L[L.length-1]+C[C.length-1])/3;
  var r1=2*pivot-L[L.length-1];
  var s1=2*pivot-H[H.length-1];
  return{res:res,sup:sup,pivot:pivot,r1:r1,s1:s1};
}

function trendLines(C,H,L){
  var n=C.length;
  var recentHighs=[],recentLows=[];
  for(var i=n-20;i<n;i++){
    if(i>0&&i<n-1&&H[i]>H[i-1]&&H[i]>H[i+1])recentHighs.push({i:i,v:H[i]});
    if(i>0&&i<n-1&&L[i]<L[i-1]&&L[i]<L[i+1])recentLows.push({i:i,v:L[i]});
  }
  var hlSlope=0,llSlope=0;
  if(recentHighs.length>=2){var a=recentHighs[recentHighs.length-1],b=recentHighs[recentHighs.length-2];hlSlope=(a.v-b.v)/(a.i-b.i);}
  if(recentLows.length>=2){var a=recentLows[recentLows.length-1],b=recentLows[recentLows.length-2];llSlope=(a.v-b.v)/(a.i-b.i);}
  var trendDir="NEUTRAL";
  if(hlSlope>0&&llSlope>0)trendDir="UP_CHANNEL";
  else if(hlSlope<0&&llSlope<0)trendDir="DOWN_CHANNEL";
  else if(hlSlope<0&&llSlope>0)trendDir="CONVERGING";
  return{trendDir:trendDir,hlSlope:hlSlope,llSlope:llSlope};
}

function breakoutRetest(C,H,L,sr){
  var last=C[C.length-1];
  var prev=C[C.length-2];
  var signals=[],score=0;
  if(prev<sr.r1&&last>sr.r1){signals.push("Breakout above R1");score+=3;}
  if(prev>sr.s1&&last<sr.s1){signals.push("Breakout below S1");score-=3;}
  if(last>sr.pivot){score+=1;}else{score-=1;}
  return{signals:signals,score:score};
}

function candlePatterns(O,H,L,C){
  var patterns=[],score=0;
  var n=C.length-1;
  var o=O[n],h=H[n],l=L[n],c=C[n];
  var body=Math.abs(c-o),range=h-l;
  var bull=c>o;
  if(body<range*0.1){patterns.push("Doji");}
  if(body>range*0.75){patterns.push(bull?"Marubozu Bull":"Marubozu Bear");score+=bull?2:-2;}
  if(n>0){
    var po=O[n-1],pc=C[n-1];
    if(pc<po&&c>o&&c>po&&o<pc){patterns.push("Bullish Engulfing");score+=3;}
    if(pc>po&&c<o&&c<po&&o>pc){patterns.push("Bearish Engulfing");score-=3;}
  }
  return{patterns:patterns,score:score};
}

function waveAnalysis(C){
  var n=C.length,sw=[];
  for(var i=2;i<n-2;i++){
    if(C[i]>C[i-1]&&C[i]>C[i-2]&&C[i]>C[i+1]&&C[i]>C[i+2])sw.push({type:"H"});
    if(C[i]<C[i-1]&&C[i]<C[i-2]&&C[i]<C[i+1]&&C[i]<C[i+2])sw.push({type:"L"});
  }
  var wt="Unknown",wb="Analyzing...",sc=0;
  if(sw.length>=3){
    var s1=sw[sw.length-3],s2=sw[sw.length-2],s3=sw[sw.length-1];
    if(s1.type==="L"&&s2.type==="H"&&s3.type==="L"){wt="Impulsive";wb="Wave 3 UP";sc=3;}
    else if(s1.type==="H"&&s2.type==="L"&&s3.type==="H"){wt="Corrective";wb="Wave ABC DOWN";sc=-2;}
    else{wt="Neutral";wb="Sideways";sc=0;}
  }
  return{waveType:wt,waveBias:wb,waveScore:sc};
}

function momentum(C){
  var n=C.length;
  var m5=C[n-1]-C[n-6];
  var m10=C[n-1]-C[n-11];
  if(m5>0&&m10>0)return{label:"Strong Bullish Momentum",score:2};
  if(m5<0&&m10<0)return{label:"Strong Bearish Momentum",score:-2};
  if(m5>0)return{label:"Weak Bullish Momentum",score:1};
  return{label:"Weak Bearish Momentum",score:-1};
}

function rejectionZones(H,L,C){
  var n=C.length,levels=[],tol=0.0003;
  for(var i=5;i<n-5;i++){
    if(H[i]>H[i-1]&&H[i]>H[i-2]&&H[i]>H[i+1]&&H[i]>H[i+2])levels.push({price:H[i],type:"R"});
    if(L[i]<L[i-1]&&L[i]<L[i-2]&&L[i]<L[i+1]&&L[i]<L[i+2])levels.push({price:L[i],type:"S"});
  }
  var clusters=[];
  levels.forEach(function(lv){
    var found=false;
    clusters.forEach(function(cl){
      if(Math.abs(cl.price-lv.price)/lv.price<tol){cl.touches++;found=true;}
    });
    if(!found)clusters.push({price:lv.price,touches:1});
  });
  var strong=clusters.filter(function(c){return c.touches>=3;});
  var last=C[n-1],nearZone=null;
  strong.forEach(function(z){
    var d=Math.abs(last-z.price)/z.price*100;
    if(d<0.05){nearZone=z;}
  });
  var score=0,label="No rejection zone nearby",atZone=false;
  if(nearZone){atZone=true;score=2;label="Support zone ("+nearZone.touches+"x) at "+nearZone.price.toFixed(5);}
  return{atZone:atZone,score:score,label:label};
}

function volumeProfile(H,L,C,V){
  var n=C.length,minP=Math.min.apply(null,L),maxP=Math.max.apply(null,H),range=maxP-minP,buckets=20;
  var profile=[];
  for(var b=0;b<buckets;b++)profile.push({priceMid:minP+(b+0.5)*range/buckets,volume:0});
  for(var i=0;i<n;i++){
    var vol=V&&V[i]?V[i]:1;
    for(var b=0;b<buckets;b++){if(L[i]<=minP+(b+1)*range/buckets&&H[i]>=minP+b*range/buckets)profile[b].volume+=vol;}
  }
  var poc=profile.reduce(function(a,b){return b.volume>a.volume?b:a;});
  var avg=profile.reduce(function(a,b){return a+b.volume;},0)/buckets;
  var hvn=profile.filter(function(b){return b.volume>avg*1.5;});
  var last=C[n-1];
  var atHVN=hvn.some(function(z){return Math.abs(last-z.priceMid)/last<0.0008;});
  var nearPOC=Math.abs(last-poc.priceMid)/last<0.0005;
  return{atHVN:atHVN,nearPOC:nearPOC,label:atHVN?"HVN":nearPOC?"Near POC":"Clear"};
}

function analyze(O,H,L,C,V){
  var last=C[C.length-1];
  var e20=ema(C.slice(-20),20);
  var e50=ema(C.slice(-50),50);
  var r=rsi(C);
  var m=macd(C);
  var k=stoch(H,L,C,14);
  var sr=getSR(H,L,C);
  var ms=marketStructure(C);
  var br=breakoutRetest(C,H,L,sr);
  var cp=candlePatterns(O,H,L,C);
  var wa=waveAnalysis(C);
  var mo=momentum(C);
  var tl=trendLines(C,H,L);
  var rz=rejectionZones(H,L,C);
  var vp=volumeProfile(H,L,C,V);
  var n2=C.length;
  var last5Up=0,last5Down=0;
  for(var li=n2-5;li<n2;li++){last5Up+=(C[li]>C[li-1]?1:0);last5Down+=(C[li]<C[li-1]?1:0);}
  var avgBd=0;for(var li=n2-10;li<n2-1;li++)avgBd+=Math.abs(C[li]-O[li]);avgBd/=9;
  var strongCnd=Math.abs(C[n2-1]-O[n2-1])>avgBd*0.8;
  var clearEma=Math.abs(C[n2-1]-e20)/e20*100>0.01;
  var momAcc=Math.abs(C[n2-1]-C[n2-2])>Math.abs(C[n2-2]-C[n2-3]);
  var cndCons=Math.max(last5Up,last5Down);
  var mcs=0;if(cndCons>=3)mcs++;if(strongCnd)mcs++;if(clearEma)mcs++;if(momAcc)mcs++;
  var liquidityOk=mcs>=3;
  var liquidityScore=mcs*25;
  var mcsDetails="Candles:"+cndCons+"/5 | Body:"+(strongCnd?"Strong":"Weak")+" | Clear:"+(clearEma?"Yes":"No")+" | Accel:"+(momAcc?"Yes":"No");
  var totalScore=0;

  var emaScore=0;
  if(last>e20&&e20>e50)emaScore=2;
  else if(last<e20&&e20<e50)emaScore=-2;
  else if(last>e20)emaScore=1;
  else emaScore=-1;
  totalScore+=emaScore;

  var rsiScore=0;
  if(r<25)rsiScore=3;else if(r<35)rsiScore=2;else if(r<45)rsiScore=1;
  else if(r>75)rsiScore=-3;else if(r>65)rsiScore=-2;else if(r>55)rsiScore=-1;
  totalScore+=rsiScore;

  totalScore+=m>0?1:-1;
  if(k<20)totalScore+=2;else if(k>80)totalScore-=2;
  totalScore+=ms.score;
  totalScore+=wa.waveScore||0;
  totalScore+=br.score;
  totalScore+=cp.score;
  totalScore+=mo.score;
  if(tl.trendDir==="UP_CHANNEL")totalScore+=1;
  else if(tl.trendDir==="DOWN_CHANNEL")totalScore-=1;
  totalScore+=rz.score;
  if(vp.atLVN)totalScore+=(totalScore>0?2:-2);
  if(vp.nearPOC)totalScore=Math.round(totalScore*0.7);

  var emaUp=last>e20&&e20>e50;
  var emaDown=last<e20&&e20<e50;
  var rsiUp=r<50;
  var rsiDown=r>50;
  var msUp=ms.score>0;
  var msDown=ms.score<0;
  var macdUp=m>0;
  var macdDown=m<0;
  var conflicts=0;
  if(rz.atZone&&rz.nearType==="RESISTANCE"&&totalScore>0)conflicts+=2;
  if(rz.atZone&&rz.nearType==="SUPPORT"&&totalScore<0)conflicts+=2;
  if(emaUp&&msDown)conflicts++;
  if(emaDown&&msUp)conflicts++;
  if(emaUp&&rsiDown&&r>65)conflicts++;
  if(emaDown&&rsiUp&&r<35)conflicts++;
  if(macdUp&&emaDown)conflicts++;
  if(macdDown&&emaUp)conflicts++;
  var direction,dcls;
  if(conflicts>=2||Math.abs(totalScore)<3||!liquidityOk){direction="WAIT";dcls="wait";}
  else if(totalScore>0){direction="UP";dcls="up";}
  else{direction="DOWN";dcls="down";}

  var absScore=Math.abs(totalScore);
  var accuracy=Math.min(96,58+absScore*3.5);
  if(direction==="WAIT")accuracy=0;
  var strength=Math.min(98,50+absScore*5);

  var reasons=[];
  if(direction!=="WAIT"){
    var isUP=direction==="UP";
    if(emaScore!==0)reasons.push(isUP?"Price above EMA20 & EMA50 ✅":"Price below EMA20 & EMA50 ✅");
    if(r<40&&isUP)reasons.push("RSI at "+r.toFixed(0)+" ✅ oversold");
    if(r>60&&!isUP)reasons.push("RSI at "+r.toFixed(0)+" ✅ overbought");
    if(ms.score!==0)reasons.push("Market structure: "+ms.trend);
    if(cp.patterns.length>0)reasons.push("Pattern: "+cp.patterns[0]);
    reasons=reasons.slice(0,3);
    while(reasons.length<3){
      if(isUP)reasons.push("Bullish bias maintained");
      else reasons.push("Bearish pressure continues");
    }
  } else {
    reasons.push("Mixed signals - wait for confirmation");
    reasons.push("RSI at "+r.toFixed(0)+" - neutral");
    reasons.push("No clear direction");
  }

  var duration="";

  return{direction:direction,dcls:dcls,accuracy:Math.round(accuracy),strength:Math.round(strength),
    reasons:reasons,sr:sr,last:last.toFixed(5),duration:duration,
    rsi:r.toFixed(1),macd:m.toFixed(5),stoch:k.toFixed(0),
    e20:e20.toFixed(5),e50:e50.toFixed(5),
    patterns:cp.patterns,ms:ms,wa:wa,tl:tl,waveBias:wa.waveBias,waveType:wa.waveType,
    emaScore:emaScore,totalScore:totalScore,liquidityOk:liquidityOk,liquidityScore:liquidityScore,mcsDetails:mcsDetails,rz:rz,vp:vp};
}

async function fetchTF(symbol, interval) {
  // ===== المفتاح الجديد =====
  var API_KEY = "9c77f26dc59c4df99779c269f663e68e";
  
  var url = "https://api.twelvedata.com/time_series?symbol=" + symbol + "&interval=" + interval + "&outputsize=100&apikey=" + API_KEY;
  
  try {
    var res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    var data = await res.json();
    if (data.status === "error" || !data.values) throw new Error(data.message || "No data");
    var vals = data.values.reverse();
    vals = vals.slice(0, -1);
    return {
      O: vals.map(function(v) { return parseFloat(v.open); }),
      H: vals.map(function(v) { return parseFloat(v.high); }),
      L: vals.map(function(v) { return parseFloat(v.low); }),
      C: vals.map(function(v) { return parseFloat(v.close); }),
      V: vals.map(function(v) { return parseFloat(v.volume || 0); })
    };
  } catch (e) {
    console.log("Fetch error:", e.message);
    throw new Error("Network error - Please check your internet connection and try again");
  }
}

function quickBias(O,H,L,C){
  var last=C[C.length-1];
  var e20=ema(C.slice(-20),20);
  var e50=ema(C.slice(-50),50);
  var r=rsi(C);
  var m=macd(C);
  var score=0;
  if(last>e20)score++;else score--;
  if(last>e50)score++;else score--;
  if(r<45)score++;else if(r>55)score--;
  if(m>0)score++;else score--;
  if(score>=2)return"UP";
  if(score<=-2)return"DOWN";
  return"NEUTRAL";
}

        '<div style="background:'+(verdict==='GO'?verdictColor+'18':'#0d0f1a')+';padding:14px;display:flex;align-items:center;justify-content:space-between;border-radius:10px;">'+
          '<div style="display:flex;align-items:center;gap:10px">'+
            '<div style="width:40px;height:40px;border-radius:50%;background:'+(verdict==='GO'?verdictColor:'#1e2235')+';display:flex;align-items:center;justify-content:center;font-size:18px;">'+(verdict==='GO'?'✅':'🚫')+'</div>'+
            '<div><div style="font-size:22px;font-weight:900;letter-spacing:2px;color:'+(verdict==='GO'?verdictColor:'#333')+';">'+verdict+'</div>'+
            '<div style="font-size:10px;color:#555;">'+(verdict==='GO'?'All conditions met':'Not enough confirmation')+'</div></div>'+
          '</div>'+
          (verdict==='GO'?'<div style="text-align:right"><div style="font-size:18px;font-weight:800;color:'+verdictColor+';">'+verdictDir+'</div><div style="font-size:12px;color:#666;">'+verdictTime+'</div></div>':'<div style="font-size:11px;color:#333;text-align:right">Wait for<br>better setup</div>')+
        '</div>'+
      '</div>'+
      '<div class="actions">'+
        '<button class="btn-take '+sig.dcls+'" onclick="takeTrade()">✅ Take</button>'+
        '<button class="btn-skip" onclick="skipTrade()">❌ Skip</button>'+
      '</div>'+
      '</div>'
    );
    window._currentSig=sig;window._currentPair=currentPair.label;
    btn.style.display="none";
  }catch(e){
    setCard('<div class="err-box">❌ '+e.message+'</div>');
    btn.className="get-btn";btn.innerHTML="⚡ Get Signal";
  }
  isLoading=false;
}
function takeTrade(){
  if(window._currentSig){lastTradeId=saveTrade(window._currentSig.direction,window._currentSig.duration,window._currentPair||"");}
  var a=document.querySelector(".actions");
  if(a)a.outerHTML='<div class="success-box">'+
    '<div class="success-text">✅ Trade Taken!</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">'+
      '<button onclick="setResult(lastTradeId,\'WIN\')" style="padding:10px;background:rgba(0,224,150,0.15);border:1px solid #00e09660;border-radius:8px;color:#00e096;font-weight:700;font-size:13px;cursor:pointer;">✅ WIN</button>'+
      '<button onclick="setResult(lastTradeId,\'LOSS\')" style="padding:10px;background:rgba(255,77,109,0.15);border:1px solid #ff4d6d60;border-radius:8px;color:#ff4d6d;font-weight:700;font-size:13px;cursor:pointer;">❌ LOSS</button>'+
    '</div>'+
  '</div>';
}
function skipTrade(){resetCard();}
function resetCard(){
  setCard('<div class="idle">Press Get Signal to start</div>');
  var btn=document.getElementById("getBtn");
  btn.style.display="flex";btn.className="get-btn";btn.innerHTML="⚡ Get Signal";
  isLoading=false;
}
</script>

<div id="hPage" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#08090f;z-index:9999;overflow-y:auto;padding:20px 16px 40px;">
  <div style="display:flex;align-items:center;justify-content:space-between;padding-top:48px;margin-bottom:20px;">
    <div style="font-size:18px;font-weight:800;color:#fff;">🕶 Trade History</div>
    <button onclick="hideHistory()" style="background:#10121e;border:1px solid #1e2235;border-radius:8px;padding:8px 14px;color:#7c83ff;font-size:13px;font-weight:600;cursor:pointer;">← Back</button>
  </div>
  <div id="hStats" style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px;"></div>
  <div id="hList"></div>
  <button onclick="if(confirm('Clear all?')){localStorage.removeItem('th');tradeHistory=[];showHistory();}" style="width:100%;margin-top:12px;padding:10px;background:transparent;border:1px solid #1e2235;border-radius:8px;color:#444;font-size:11px;cursor:pointer;">🗑 Clear All</button>
</div>
</body>
</html>
