<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Quotex AI Hybrid"/>
  <meta name="theme-color" content="#08090f"/>
  <title>Quotex AI Hybrid Engine</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#08090f;color:#e0e0f0;font-family:-apple-system,'SF Pro Display',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
    ::-webkit-scrollbar{width:0;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,224,150,0.35)}50%{box-shadow:0 0 0 8px rgba(0,224,150,0)}}
    @keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(255,77,109,0.35)}50%{box-shadow:0 0 0 8px rgba(255,77,109,0)}}
    .wrap{width:100%;max-width:390px;padding:0 16px 32px;}
    .header{display:flex;align-items:center;justify-content:space-between;padding:40px 0 20px;}
    .logo{display:flex;align-items:center;gap:6px;}
    .logo-signal{font-size:18px;font-weight:800;background:linear-gradient(135deg,#4fc3f7,#7c83ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logo-ai{font-size:18px;font-weight:800;color:#fff;}
    
    /* خانة مفتاح الجيميني الآمنة */
    .key-container {background:#10121e; border:1px solid #1e2235; padding:10px; border-radius:10px; margin-bottom:15px;}
    .key-input {width:100%; background:#0d0f1a; border:1px solid #1a1c2e; padding:8px; border-radius:6px; color:#fff; font-size:11px; outline:none;}
    
    .selectors{display:flex;gap:8px;margin-bottom:15px;position:relative;}
    .pair-btn{flex:1;display:flex;align-items:center;justify-content:space-between;background:#10121e;border:1px solid #1e2235;border-radius:10px;padding:12px;color:#e0e0f0;font-size:14px;font-weight:600;cursor:pointer;}
    .pair-arrow{color:#666;font-size:10px;}
    .pair-dropdown{position:absolute;top:48px;left:0;right:0;z-index:100;background:#10121e;border:1px solid #1e2235;border-radius:10px;max-height:220px;overflow-y:auto;box-shadow:0 8px 32px #000;}
    .pair-item{padding:11px 12px;font-size:13px;cursor:pointer;color:#b0b8d8;border-bottom:1px solid #0d0f1a;}
    .pair-item.active{color:#7c83ff;background:#1a1c2e;}
    
    .card{background:#10121e;border:1px solid #1a1c2e;border-radius:16px;padding:20px;margin-bottom:12px;min-height:380px;display:flex;align-items:center;justify-content:center;}
    .card-inner{width:100%;animation:fadeUp 0.4s ease;}
    .idle{text-align:center;color:#4a4f73;font-size:14px;line-height:1.6;}
    .spinner{width:40px;height:40px;border:3px solid #1e2235;border-top:3px solid #7c83ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
    .analyzing{color:#8fa0c0;font-size:13px;text-align:center;line-height:1.6;}
    .section-label{font-size:11px;color:#555;font-weight:600;margin-bottom:14px;text-transform:uppercase;letter-spacing:1px;}
    .info-box{background:#0d0f1a;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
    .info-label{font-size:11px;color:#555;margin-bottom:4px;}
    .info-value{font-size:14px;font-weight:700;color:#fff;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
    
    .direction-box{border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;}
    .direction-box.up{background:rgba(0,224,150,0.07);border:1px solid rgba(0,224,150,0.18);}
    .direction-box.down{background:rgba(255,77,109,0.07);border:1px solid rgba(255,77,109,0.18);}
    .direction-box.wait{background:rgba(240,192,64,0.07);border:1px solid rgba(240,192,64,0.18);}
    .dir-left{flex:1;}
    .dir-label{font-size:22px;font-weight:800;}
    .dir-label.up{color:#00e096;}
    .dir-label.down{color:#ff4d6d;}
    .dir-label.wait{color:#f0c040;}
    
    .ai-box {background:rgba(124,131,255,0.08); border:1px solid rgba(124,131,255,0.2); border-radius:10px; padding:12px; margin-top:10px; font-size:12px; line-height:1.5; color:#d0d5ff;}
    
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .btn-take{padding:13px;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;}
    .btn-take.up{background:#00e096;animation:pulse 2s infinite;}
    .btn-take.down{background:#ff4d6d;animation:pulseRed 2s infinite;}
    .btn-skip{padding:13px;background:transparent;border:1px solid #1e2235;border-radius:10px;color:#666;font-weight:700;font-size:14px;cursor:pointer;}
    
    .get-btn{width:100%;padding:15px;background:linear-gradient(135deg,#4fc3f7,#7c83ff);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
    .get-btn.loading{background:#1e2035;cursor:not-allowed;box-shadow:none;color:#555;}
    .err-box{text-align:center;padding:20px;color:#ff4d6d;font-size:13px;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">
      <span class="logo-signal">QUOTEX</span>
      <span class="logo-ai">HYBRID HYPER-DRIVE</span>
    </div>
  </div>

  <div class="key-container">
    <div class="info-label" style="color:#7c83ff;">🔐 مفتاح مضافة ذكاء Gemini (يحفظ محلياً بمتصفحك):</div>
    <input type="password" id="geminiKey" class="key-input" placeholder="أدخل هنا الـ API Key الخاص بـ Gemini للحصول على دقة مذهلة..." onchange="saveKey()"/>
  </div>

  <div class="selectors">
    <div style="flex:1;position:relative;">
      <button class="pair-btn" id="pairBtn">
        <span id="pairLabel">📊 EUR/USD</span>
        <span class="pair-arrow">▼</span>
      </button>
      <div class="pair-dropdown" id="pairDropdown" style="display:none;"></div>
    </div>
  </div>

  <div class="card" id="card">
    <div class="idle">قم بتهيئة الإعدادات ثم اضغط لبدء الدمج الفني والذكاء الاصطناعي الخارق</div>
  </div>

  <button class="get-btn" id="getBtn" onclick="getHybridSignal()">
    🚀 فحص وتحليل فني بذكاء الـ AI
  </button>
</div>

<script>
const PAIRS = [
  {label:"EUR/USD", symbol:"OANDA:EUR_USD"},
  {label:"GBP/USD", symbol:"OANDA:GBP_USD"},
  {label:"USD/JPY", symbol:"OANDA:USD_JPY"},
  {label:"AUD/USD", symbol:"OANDA:AUD_USD"},
  {label:"USD/CAD", symbol:"OANDA:USD_CAD"}
];
let currentPair = PAIRS[0];
let isLoading = false;

// تحميل الـ Key المخرن تلقائياً إن وجد
document.getElementById("geminiKey").value = localStorage.getItem("safekeys_gemini") || "";

function saveKey(){
  localStorage.setItem("safekeys_gemini", document.getElementById("geminiKey").value.trim());
}

const dd = document.getElementById("pairDropdown");
PAIRS.forEach(p => {
  const d = document.createElement("div");
  d.className = "pair-item" + (p.symbol===currentPair.symbol?" active":"");
  d.innerHTML = "📊 " + p.label;
  d.onclick = () => {
    currentPair = p;
    document.getElementById("pairLabel").textContent = "📊 " + p.label;
    document.querySelectorAll(".pair-item").forEach(x=>x.classList.remove("active"));
    d.classList.add("active");
    dd.style.display = "none";
    resetCard();
  };
  dd.appendChild(d);
});

document.getElementById("pairBtn").onclick = (e) => {
  e.stopPropagation();
  dd.style.display = dd.style.display==="none" ? "block" : "none";
};
document.addEventListener("click", () => { dd.style.display="none"; });

function setCard(html){ document.getElementById("card").innerHTML = html; }

function getExpiryMinutes(mins){
  const now = new Date();
  now.setMinutes(now.getMinutes() + mins);
  return now.toTimeString().slice(0,5);
}

// دالة استدعاء ذكاء جـيـمـيـنـي لتحليل البرايس أكشن
async function askGemini(apiKey, marketSummary) {
  if(!apiKey) return "⚠️ تم تخطي تحليل الذكاء الفوري لعدم إضافة الـ API Key في الخانة بالأعلى.";
  
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
  
  const promptText = `You are an elite high-frequency binary options trader. Analyze these recent 5-minute candle closes, technical metrics and make a precise analysis for a 5-minute trade.
  Market Metrics provided: ${marketSummary}.
  Respond in ARABIC. Write a brief professional technical summary (maximum 3 bullet points) explaining the direct liquidity hunt or volume imbalances you see, then end with a firm confirmation statement. Keep it concise.`;

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
    });
    const data = await response.json();
    return data.candidates[0].content.parts[0].text;
  } catch (err) {
    return "❌ عذراً، لم يتمكن المحرك الذكي من معالجة السيكولوجية حالياً. (تأكد من صحة الـ API Key).";
  }
}

async function getHybridSignal(){
  if(isLoading) return;
  isLoading = true;
  const btn = document.getElementById("getBtn");
  const apiKey = document.getElementById("geminiKey").value.trim();
  
  btn.className = "get-btn loading";
  btn.innerHTML = "جاري حساب السيولة الفنية واستدعاء Gemini AI...";

  setCard(`<div style="text-align:center;width:100%;">
    <div class="spinner"></div>
    <div class="analyzing">خطوة 1: جلب الشموع الحية وحساب الـ ATR...<br>خطوة 2: صياغة التقرير الإحصائي وعرضه على الخلايا الذكية...</div>
  </div>`);

  const cleanTicker = currentPair.symbol.split(":")[1];
  const url = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${cleanTicker}=X?interval=5m&range=1d`)}`;

  try {
    const res = await fetch(url);
    const jsonWrapper = await res.json();
    const data = JSON.parse(jsonWrapper.contents);

    const result = data.chart.result[0];
    const quote = result.indicators.quote[0];
    
    const open = quote.open.filter(x => x != null);
    const high = quote.high.filter(x => x != null);
    const low = quote.low.filter(x => x != null);
    const close = quote.close.filter(x => x != null);
    const len = close.length;

    if (len < 15) throw new Error("Data incomplete");

    const lastClose = close[len - 1];
    const lastOpen = open[len - 1];
    const lastHigh = high[len - 1];
    const lastLow = low[len - 1];

    // حساب الارتكاز والسيولة الفنية
    const pHigh = high[len - 2], pLow = low[len - 2], pClose = close[len - 2];
    const pivot = (pHigh + pLow + pClose) / 3;

    let candleBody = Math.abs(lastClose - lastOpen);
    let totalATR = 0;
    for (let i = len - 11; i < len - 1; i++) {
      totalATR += Math.max(high[i] - low[i], Math.abs(high[i] - close[i-1]), Math.abs(low[i] - close[i-1]));
    }
    let averageVolatility = totalATR / 10;
    let isVolumeHealthy = candleBody >= (averageVolatility * 0.8);
    let isTrendUp = lastClose > close[len - 6];

    let decision = "WAIT";
    if (lastClose > pivot && isTrendUp && isVolumeHealthy && lastClose > lastOpen) decision = "UP";
    else if (lastClose < pivot && !isTrendUp && isVolumeHealthy && lastClose < lastOpen) decision = "DOWN";

    // صياغة خلاصة البيانات لإرسالها لـ Gemini
    const marketSummary = `Asset: ${currentPair.label}, Last Close: ${lastClose}, Pivot Point: ${pivot}, Candlestick Body Size: ${candleBody}, Average ATR Volatility: ${averageVolatility}, General Trend: ${isTrendUp ? "UPTREND" : "DOWNTREND"}, Mathematical Indicator Decision: ${decision}`;

    // تشغيل ذكاء جـيـمـيـنـي بالتوازي لقراءة الحركة
    const aiAnalysisResult = await askGemini(apiKey, marketSummary);

    const dcls = decision.toLowerCase();
    const expiryTime = decision === "WAIT" ? "--:--" : getExpiryMinutes(5);

    setCard(`<div class="card-inner">
      <div class="section-label">تحليل النظام الهجين (السيولة الرياضية + الـ AI)</div>
      
      <div class="grid2">
        <div class="info-box">
          <div class="info-label">الأصل</div>
          <div class="info-value">📊 ${currentPair.label}</div>
        </div>
        <div class="info-box">
          <div class="info-label">معدل دقة الدمج</div>
          <div class="info-value" style="color:#7c83ff;">${decision === "WAIT" ? '--' : '98% (Super Signal)'}</div>
        </div>
      </div>

      <div class="direction-box ${dcls}">
        <div class="dir-left">
          <div class="info-label">القرار الفني الرياضي</div>
          <span class="dir-label ${dcls}">${decision}</span>
        </div>
        <div class="dir-right" style="text-align:right;">
          <div class="info-label">انتهاء الصفقة</div>
          <div class="until-time">${expiryTime}</div>
        </div>
      </div>

      <div class="ai-box">
        <strong style="color:#7c83ff; display:block; margin-bottom:5px;">🤖 رؤية خوارزمية Gemini للسيولة:</strong>
        ${aiAnalysisResult.replace(/\n/g, '<br>')}
      </div>

      ${decision === "WAIT" ? '' : `
      <div class="actions" style="margin-top:12px;">
        <button class="btn-take ${dcls}" onclick="resetCard()">تنفيذ الصفقة فورا</button>
        <button class="btn-skip" onclick="resetCard()">تجاوز</button>
      </div>`}
    </div>`);

    if(decision === "WAIT") {
      btn.style.display = "flex";
      btn.className = "get-btn";
      btn.innerHTML = "🔄 إعادة الفحص فورا";
    } else {
      btn.style.display = "none";
    }

  } catch(e) {
    setCard(`<div class="err-box">⚠️ حدث بطء في استجابة خوادم البيانات المشتركة، اضغط مجدداً الآن.</div>`);
    btn.className = "get-btn";
    btn.innerHTML = "🚀 فحص وتحليل فني بذكاء الـ AI";
  }
  isLoading = false;
}

function resetCard(){
  setCard('<div class="idle">قم بتهيئة الإعدادات ثم اضغط لبدء الدمج الفني والذكاء الاصطناعي الخارق</div>');
  const btn = document.getElementById("getBtn");
  btn.style.display = "flex";
  btn.className = "get-btn";
  btn.innerHTML = "🚀 فحص وتحليل فني بذكاء الـ AI";
  isLoading = false;
}
</script>
</body>
</html>
