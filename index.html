<script>

  {label:"AUD/USD",symbol:"AUD/USD",flag:"&#127462;&#127482;"},
  {label:"USD/CAD",symbol:"USD/CAD",flag:"&#127464;&#127462;"},
  {label:"EUR/GBP",symbol:"EUR/GBP",flag:"&#127466;&#127482;"},
  {label:"EUR/JPY",symbol:"EUR/JPY",flag:"&#127466;&#127482;"},
  {label:"GBP/JPY",symbol:"GBP/JPY",flag:"&#127468;&#127463;"},
  {label:"USD/CHF",symbol:"USD/CHF",flag:"&#127464;&#127469;"},
  {label:"NZD/USD",symbol:"NZD/USD",flag:"&#127475;&#127487;"},
  {label:"AUD/JPY",symbol:"AUD/JPY",flag:"&#127462;&#127482;"},
  {label:"EUR/CHF",symbol:"EUR/CHF",flag:"&#127466;&#127482;"},
];
let currentPair=PAIRS[0],isLoading=false;
const dd=document.getElementById("pairDropdown");
PAIRS.forEach(function(p){
  const d=document.createElement("div");
  d.className="pair-item"+(p.symbol===currentPair.symbol?" active":"");
  d.innerHTML=p.flag+" "+p.label;

  };

document.getElementById("pairBtn").onclick=function(e){e.stopPropagation();dd.style.display=dd.style.display==="none"?"block":"none";};
document.addEventListener("click",function(){dd.style.display="none";});
function setCard(h){document.getElementById("card").innerHTML=h;}
function getExpiry(tf){
  const now=new Date(),map={"1min":1,"5min":5,"15min":15,"1h":60};
  now.setMinutes(now.getMinutes()+(map[tf]||5));
  return now.toTimeString().slice(0,5);
}

// ===== INDICATORS =====
function calcEMA(data,period){
  const k=2/(period+1);let ema=data[0];
  for(let i=1;i<data.length;i++)ema=data[i]*k+ema*(1-k);
  return ema;
}
function calcRSI(data,period){
  period=period||14;
  if(data.length<period+1)return 50;
  let g=0,l=0;
  for(let i=data.length-period;i<data.length;i++){
    const d=data[i]-data[i-1];
    if(d>0)g+=d;else l+=Math.abs(d);
  }
  return 100-(100/(1+(g/period)/((l/period)||0.0001)));
}
function calcMACD(data){
  const ema12=calcEMA(data.slice(-26),12);
  const ema26=calcEMA(data.slice(-26),26);
  return ema12-ema26;
}
function calcATR(highs,lows,closes,period){
  period=period||14;
  let trs=[];
  for(let i=1;i<closes.length;i++){
    trs.push(Math.max(highs[i]-lows[i],Math.abs(highs[i]-closes[i-1]),Math.abs(lows[i]-closes[i-1])));
  }
  return trs.slice(-period).reduce(function(a,b){return a+b;},0)/period;
}

// ===== PRICE ACTION =====
function detectMarketStructure(closes){
  const n=closes.length;
  let hh=0,hl=0,lh=0,ll=0;
  for(let i=2;i<Math.min(n,20);i++){
    if(closes[i]>closes[i-1]&&closes[i-1]>closes[i-2])hh++;
    if(closes[i]>closes[i-2]&&closes[i]<closes[i-1])hl++;
    if(closes[i]<closes[i-1]&&closes[i-1]<closes[i-2])ll++;
    if(closes[i]<closes[i-2]&&closes[i]>closes[i-1])lh++;
  }
  if(hh+hl>lh+ll+2)return{trend:"UPTREND",label:"HH/HL - Uptrend",score:1};
  if(ll+lh>hh+hl+2)return{trend:"DOWNTREND",label:"LH/LL - Downtrend",score:-1};
  return{trend:"SIDEWAYS",label:"Sideways",score:0};
}

function detectSupportResistance(closes,highs,lows){
  const last=closes[closes.length-1];
  const recentHighs=highs.slice(-30);
  const recentLows=lows.slice(-30);
  const resistance=Math.max.apply(null,recentHighs);
  const support=Math.min.apply(null,recentLows);
  const range=resistance-support;
  const pos=(last-support)/range;
  let score=0,zones=[];
  if(pos<0.25){score+=1;zones.push("Near Support");}
  else if(pos>0.75){score-=1;zones.push("Near Resistance");}
  else zones.push("Mid Range");
  return{support:support.toFixed(5),resistance:resistance.toFixed(5),pos:Math.round(pos*100),score,zones};
}

function detectBreakoutRetest(closes,highs,lows){
  const last=closes[closes.length-1];
  const prev20High=Math.max.apply(null,highs.slice(-22,-2));
  const prev20Low=Math.min.apply(null,lows.slice(-22,-2));
  const signals=[];
  let score=0;
  if(last>prev20High){signals.push("Bullish Breakout");score+=2;}
  else if(last<prev20Low){signals.push("Bearish Breakout");score-=2;}
  const retestHigh=Math.abs(last-prev20High)/prev20High<0.001;
  const retestLow=Math.abs(last-prev20Low)/prev20Low<0.001;
  if(retestHigh){signals.push("Retest Resistance");score-=1;}
  if(retestLow){signals.push("Retest Support");score+=1;}
  return{signals,score};
}

// ===== CANDLESTICK PATTERNS =====
function detectCandlePatterns(opens,highs,lows,closes){
  const patterns=[];
  let score=0;
  const n=closes.length-1;
  const o=opens[n],h=highs[n],l=lows[n],c=closes[n];
  const body=Math.abs(c-o);
  const totalRange=h-l;
  const upperWick=h-Math.max(o,c);
  const lowerWick=Math.min(o,c)-l;
  const bullish=c>o;

  // Doji
  if(body<totalRange*0.1){patterns.push("Doji");score+=0;}
  // Hammer
  if(lowerWick>body*2&&upperWick<body*0.5&&!bullish){patterns.push("Hammer");score+=1;}
  // Shooting Star
  if(upperWick>body*2&&lowerWick<body*0.5&&bullish){patterns.push("Shooting Star");score-=1;}
  // Pin Bar Bull
  if(lowerWick>body*2.5&&upperWick<body){patterns.push("Bull Pin Bar");score+=2;}
  // Pin Bar Bear
  if(upperWick>body*2.5&&lowerWick<body){patterns.push("Bear Pin Bar");score-=2;}

  // Engulfing (2 candles)
  if(n>0){
    const po=opens[n-1],pc=closes[n-1];
    // Bullish Engulfing
    if(pc<po&&c>o&&c>po&&o<pc){patterns.push("Bullish Engulfing");score+=2;}
    // Bearish Engulfing
    if(pc>po&&c<o&&c<po&&o>pc){patterns.push("Bearish Engulfing");score-=2;}
    // Morning Star
    if(n>1){
      const ppo=opens[n-2],ppc=closes[n-2];
      if(ppc<ppo&&Math.abs(pc-po)<Math.abs(ppc-ppo)*0.3&&c>o&&c>(ppo+ppc)/2){
        patterns.push("Morning Star");score+=3;
      }
      // Evening Star
      if(ppc>ppo&&Math.abs(pc-po)<Math.abs(ppc-ppo)*0.3&&c<o&&c<(ppo+ppc)/2){
        patterns.push("Evening Star");score-=3;
      }
    }
  }
  // Strong candle
  if(body>totalRange*0.7&&bullish){patterns.push("Strong Bull Candle");score+=1;}
  if(body>totalRange*0.7&&!bullish){patterns.push("Strong Bear Candle");score-=1;}

  return{patterns,score};
}

// ===== MOMENTUM =====
function detectMomentum(closes){
  const n=closes.length;
  const mom5=closes[n-1]-closes[n-6];
  const mom10=closes[n-1]-closes[n-11];
  let score=0,label="";
  if(mom5>0&&mom10>0){score+=1;label="Strong Bull Momentum";}
  else if(mom5<0&&mom10<0){score-=1;label="Strong Bear Momentum";}
  else if(mom5>0){score+=0.5;label="Weak Bull Momentum";}
  else{score-=0.5;label="Weak Bear Momentum";}
  return{score,label};
}

// ===== MAIN ANALYSIS =====
function analyze(opens,highs,lows,closes){
  const c=closes;
  const ema20=calcEMA(c.slice(-20),20);
  const ema50=calcEMA(c.slice(-50),50);
  const ema200=calcEMA(c,200);
  const rsi=calcRSI(c);
  const macd=calcMACD(c);
  const atr=calcATR(highs,lows,closes,14);
  const last=c[c.length-1];

  let totalScore=0;
  const signals=[];

  // 1. EMA Trend
  let emaSig={label:"",cls:"neut",score:0};
  if(last>ema20&&ema20>ema50){emaSig={label:"Price > EMA20 > EMA50",cls:"bull",score:2};}
  else if(last<ema20&&ema20<ema50){emaSig={label:"Price < EMA20 < EMA50",cls:"bear",score:-2};}
  else{emaSig={label:"Mixed EMA",cls:"neut",score:0};}
  totalScore+=emaSig.score;
  signals.push({label:emaSig.label,cls:emaSig.cls});

  // 2. RSI
  let rsiSig={label:"",cls:"neut",score:0};
  if(rsi<30){rsiSig={label:"RSI Oversold ("+rsi.toFixed(0)+")",cls:"bull",score:2};}
  else if(rsi>70){rsiSig={label:"RSI Overbought ("+rsi.toFixed(0)+")",cls:"bear",score:-2};}
  else if(rsi>50){rsiSig={label:"RSI Bullish ("+rsi.toFixed(0)+")",cls:"bull",score:1};}
  else{rsiSig={label:"RSI Bearish ("+rsi.toFixed(0)+")",cls:"bear",score:-1};}
  totalScore+=rsiSig.score;
  signals.push({label:rsiSig.label,cls:rsiSig.cls});

  // 3. MACD
  let macdSig={label:"",cls:"neut",score:0};
  if(macd>0){macdSig={label:"MACD Bullish",cls:"bull",score:1};}
  else{macdSig={label:"MACD Bearish",cls:"bear",score:-1};}
  totalScore+=macdSig.score;
  signals.push({label:macdSig.label,cls:macdSig.cls});

  // 4. Market Structure
  const ms=detectMarketStructure(c);
  totalScore+=ms.score;
  signals.push({label:ms.label,cls:ms.score>0?"bull":ms.score<0?"bear":"neut"});

  // 5. Support/Resistance
  const sr=detectSupportResistance(c,highs,lows);
  totalScore+=sr.score;
  sr.zones.forEach(function(z){signals.push({label:z,cls:sr.score>0?"bull":sr.score<0?"bear":"neut"});});

  // 6. Breakout/Retest
  const br=detectBreakoutRetest(c,highs,lows);
  totalScore+=br.score;
  br.signals.forEach(function(s){signals.push({label:s,cls:br.score>0?"bull":br.score<0?"bear":"neut"});});

  // 7. Candle Patterns
  const cp=detectCandlePatterns(opens,highs,lows,c);
  totalScore+=cp.score;

  // 8. Momentum
  const mom=detectMomentum(c);
  totalScore+=mom.score;
  signals.push({label:mom.label,cls:mom.score>0?"bull":mom.score<0?"bear":"neut"});

  // Final
  const direction=totalScore>=1?"UP":"DOWN";
  const absScore=Math.abs(totalScore);
  const accuracy=Math.min(92,Math.round(55+absScore*4));
  const strength=Math.min(98,Math.round(50+absScore*6));
  const trend_label=strength<65?"Weak":strength<80?"Moderate":"Strong";

  return{
    direction,accuracy,strength,trend_label,totalScore,
    ema20:ema20.toFixed(5),ema50:ema50.toFixed(5),
    rsi:rsi.toFixed(1),macd:macd.toFixed(5),
    atr:atr.toFixed(5),last:last.toFixed(5),
    signals:signals.slice(0,8),
    patterns:cp.patterns,
    sr
  };
}

async function getSignal(){
  if(isLoading)return;
  isLoading=true;
  const btn=document.getElementById("getBtn");
  btn.className="get-btn loading";btn.innerHTML="Analyzing...";
  dd.style.display="none";
  setCard('<div style="text-align:center;width:100%;"><div class="spinner"></div><div class="analyzing">Fetching & Analyzing...</div></div>');
  const tf=document.getElementById("tfSelect").value;
  try{
    const url="/api/data?symbol="+currentPair.symbol+"&interval="+tf;
    const res=await fetch(url);
    const data=await res.json();
    if(data.status==="error"||!data.values)throw new Error(data.message||"No data");
    const vals=data.values.reverse();
    const opens=vals.map(function(v){return parseFloat(v.open);});
    const highs=vals.map(function(v){return parseFloat(v.high);});
    const lows=vals.map(function(v){return parseFloat(v.low);});
    const closes=vals.map(function(v){return parseFloat(v.close);});
    const sig=analyze(opens,highs,lows,closes);
    const isUP=sig.direction==="UP";
    const dcls=isUP?"up":"down";
    const darr=isUP?"&#8593;":"&#8595;";
    const tfLabel=tf.replace("min"," min").replace("1h","1 hour");
    const signalsHTML=sig.signals.map(function(s){
      return '<div class="sig-item"><div class="sig-dot '+s.cls+'"></div><div class="sig-text">'+s.label+'</div></div>';
    }).join("");
    const patternsHTML=sig.patterns.length>0
      ? '<div class="patterns-box"><div class="info-label" style="margin-bottom:6px">Candle Patterns</div>'+sig.patterns.map(function(p){return '<span class="pattern-tag">'+p+'</span>';}).join("")+'</div>'
      : '';
    setCard(
      '<div class="card-inner">'+
      '<div class="sec-label">Signal &mdash; Live Analysis</div>'+
      '<div class="grid2">'+
        '<div class="info-box" style="margin-bottom:0"><div class="info-label">Pair</div><div class="info-value" style="font-size:13px">'+currentPair.flag+' '+currentPair.label+'</div></div>'+
        '<div class="info-box" style="margin-bottom:0"><div class="info-label">Accuracy</div><div class="info-value acc-value">'+sig.accuracy+'%</div></div>'+
      '</div>'+
      '<div class="grid3" style="margin-top:8px">'+
        '<div class="ind-box"><div class="ind-label">RSI</div><div class="ind-value '+( sig.rsi<40?"bull":sig.rsi>60?"bear":"neut")+'">'+sig.rsi+'</div></div>'+
        '<div class="ind-box"><div class="ind-label">EMA20</div><div class="ind-value '+( sig.last>sig.ema20?"bull":"bear")+'" style="font-size:10px">'+sig.ema20+'</div></div>'+
        '<div class="ind-box"><div class="ind-label">MACD</div><div class="ind-value '+( parseFloat(sig.macd)>0?"bull":"bear")+'">'+( parseFloat(sig.macd)>0?"+":"")+parseFloat(sig.macd).toFixed(4)+'</div></div>'+
      '</div>'+
      '<div class="info-box">'+
        '<div class="bar-row"><span class="info-label">Signal Strength</span><span style="font-size:10px;color:#666">'+sig.trend_label+'</span></div>'+
        '<div class="bar-track"><div class="bar-fill '+dcls+'" style="width:'+sig.strength+'%"></div></div>'+
        '<div class="bar-labels"><span>Weak</span><span style="color:#555">'+sig.strength+'%</span><span>Strong</span></div>'+
      '</div>'+
      '<div class="signals-grid">'+signalsHTML+'</div>'+
      patternsHTML+
      '<div class="info-box" style="margin-bottom:12px">'+
        '<div class="info-label" style="margin-bottom:4px">Support / Resistance</div>'+
        '<div style="display:flex;justify-content:space-between">'+
          '<div><div style="font-size:9px;color:#00e096">Support</div><div style="font-size:12px;font-weight:700;color:#e0e0f0">'+sig.sr.support+'</div></div>'+
          '<div style="text-align:right"><div style="font-size:9px;color:#ff4d6d">Resistance</div><div style="font-size:12px;font-weight:700;color:#e0e0f0">'+sig.sr.resistance+'</div></div>'+
        '</div>'+
      '</div>'+
      '<div class="direction-box '+dcls+'" style="display:flex">'+
        '<div class="dir-left"><div class="info-label">Direction</div>'+
          '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:22px">'+darr+'</span><span class="dir-label '+dcls+'">'+sig.direction+'</span></div></div>'+
        '<div class="dir-right"><div class="info-label">until</div><div class="until-time">'+getExpiry(tf)+'</div></div>'+
      '</div>'+
      '<div class="actions">'+
        '<button class="btn-take '+dcls+'" onclick="takeTrade()">&#10003; Take</button>'+
        '<button class="btn-skip" onclick="skipTrade()">&#10005; Skip</button>'+
      '</div>'+
      '</div>'
    );
    btn.style.display="none";
  }catch(e){
    setCard('<div class="err-box">&#10060; '+e.message+'</div>');
    btn.className="get-btn";btn.innerHTML="&#9889; Get Signal";
  }
  isLoading=false;
}
function takeTrade(){
  const a=document.querySelector(".actions");
  if(a)a.outerHTML='<div class="success-box"><div class="success-text">&#10003; Trade Taken &mdash; Good luck!</div><button class="new-signal-btn" onclick="resetCard()">Get new signal</button></div>';
}
function skipTrade(){resetCard();}
function resetCard(){
  setCard('<div class="idle">Press Get Signal to start</div>');
  const btn=document.getElementById("getBtn");
  btn.style.display="flex";btn.className="get-btn";btn.innerHTML="&#9889; Get Signal";
  isLoading=false;
}
</script>
</body>
</html>
