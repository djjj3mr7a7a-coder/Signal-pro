// ============================================================
// LAYER 1: QUAD MATRIX (4 Technical Perspectives)
// ============================================================
function quadMatrix(O,H,L,C,V) {
  const n=C.length,last=C[n-1];
  const e20=calcEma(C.slice(-20),20),e50=calcEma(C.slice(-50),50);
  const r=calcRsi(C),m=calcMacd(C),k=calcStoch(H,L,C);
  const ms=marketStr(C),cp=candleP(O,H,L,C);
  const rz=rejZones(H,L,C),vp=volProfile(H,L,C,V);
  
  let perspectives = [];
  let score = 0;
  
  // Perspective 1: Trend Follow (EMA + Structure)
  let tfScore = 0;
  if(last>e20&&e20>e50) tfScore+=2;
  else if(last<e20&&e20<e50) tfScore-=2;
  else if(last>e20) tfScore+=1;
  else tfScore-=1;
  tfScore += ms.score;
  if(tfScore>=2) { perspectives.push({name:"Trend",signal:"UP",weight:2}); score+=2; }
  else if(tfScore<=-2) { perspectives.push({name:"Trend",signal:"DOWN",weight:2}); score-=2; }
  else { perspectives.push({name:"Trend",signal:"NEUTRAL",weight:0}); }
  
  // Perspective 2: Momentum (RSI + MACD + Stoch)
  let momScore = 0;
  if(r<30) momScore+=2; else if(r<45) momScore+=1; else if(r>70) momScore-=2; else if(r>55) momScore-=1;
  if(m>0) momScore+=1; else momScore-=1;
  if(k<20) momScore+=2; else if(k>80) momScore-=2; else if(k<40) momScore+=1; else if(k>60) momScore-=1;
  if(momScore>=2) { perspectives.push({name:"Momentum",signal:"UP",weight:2}); score+=2; }
  else if(momScore<=-2) { perspectives.push({name:"Momentum",signal:"DOWN",weight:2}); score-=2; }
  else { perspectives.push({name:"Momentum",signal:"NEUTRAL",weight:0}); }
  
  // Perspective 3: Structure (Rejection + Volume)
  let structScore = 0;
  if(rz.atZone) { structScore += (rz.nearType==="SUPPORT"?2:-2); }
  if(vp.atLVN) { structScore += 2; }
  if(vp.atHVN) { structScore -= 1; }
  if(vp.nearPOC) { structScore = Math.round(structScore*0.5); }
  if(structScore>=2) { perspectives.push({name:"Structure",signal:"UP",weight:2}); score+=2; }
  else if(structScore<=-2) { perspectives.push({name:"Structure",signal:"DOWN",weight:2}); score-=2; }
  else { perspectives.push({name:"Structure",signal:"NEUTRAL",weight:0}); }
  
  // Perspective 4: Patterns (Candles + Breakout)
  let patScore = cp.score;
  const prev=C[n-2], prev2=C[n-3];
  if(prev>prev2&&last>prev) patScore+=2;
  else if(prev<prev2&&last<prev) patScore-=2;
  if(patScore>=2) { perspectives.push({name:"Patterns",signal:"UP",weight:2}); score+=2; }
  else if(patScore<=-2) { perspectives.push({name:"Patterns",signal:"DOWN",weight:2}); score-=2; }
  else { perspectives.push({name:"Patterns",signal:"NEUTRAL",weight:0}); }
  
  // Quad Matrix Decision
  const upVotes = perspectives.filter(p=>p.signal==="UP").length;
  const downVotes = perspectives.filter(p=>p.signal==="DOWN").length;
  let direction = "NEUTRAL";
  if(upVotes>=3) direction="UP";
  else if(downVotes>=3) direction="DOWN";
  
  return {
    perspectives,
    score,
    upVotes,
    downVotes,
    direction,
    details: perspectives.map(p=>`${p.name}:${p.signal}`).join(" | ")
  };
}

// ============================================================
// LAYER 2: CONTRARIAN INDEX (Smart Money Flow)
// ============================================================
function contrarianIndex(O,H,L,C,V) {
  const n=C.length;
  let buyVol=0, sellVol=0, totalVol=0;
  for(let i=0;i<n;i++) {
    const vol = V[i]||1;
    const body = C[i]-O[i];
    if(body>0) buyVol += vol;
    else if(body<0) sellVol += vol;
    totalVol += vol;
  }
  const buyRatio = totalVol>0 ? buyVol/totalVol : 0.5;
  const avgRange = (Math.max(...H)-Math.min(...L))/C[C.length-1];
  const volatility = avgRange;
  
  let signal = "NEUTRAL";
  let confidence = 0;
  if(buyRatio>0.65) { signal="BUY"; confidence = Math.round((buyRatio-0.5)*200); }
  else if(buyRatio<0.35) { signal="SELL"; confidence = Math.round((0.5-buyRatio)*200); }
  
  return {
    buyRatio: Math.round(buyRatio*100),
    signal,
    confidence: Math.min(100,confidence),
    label: signal==="BUY"?"Smart Money BUYing":signal==="SELL"?"Smart Money SELLing":"Neutral Flow",
    score: signal==="BUY"?2:signal==="SELL"?-2:0
  };
}

// ============================================================
// LAYER 3: GOLDEN WINDOW (Time Analysis)
// ============================================================
function goldenWindow() {
  const now = new Date();
  const hour = now.getHours();
  const day = now.getDay();
  
  const goldenHours = [10,11,14,15,20,21];
  const blackoutHours = [0,1,2,23,22];
  
  let isGolden = false;
  let isBlackout = false;
  let nextGolden = null;
  
  if(goldenHours.includes(hour)) isGolden = true;
  if(blackoutHours.includes(hour)) isBlackout = true;
  
  for(let i=1;i<=24;i++) {
    const nextH = (hour+i)%24;
    if(goldenHours.includes(nextH)) { nextGolden = nextH; break; }
  }
  
  let recommendation = "Neutral";
  if(isGolden) recommendation = "GOLDEN WINDOW - Optimal Entry";
  else if(isBlackout) recommendation = "BLACKOUT - Avoid Trading";
  else recommendation = `Next Golden: ${nextGolden}:00 UTC`;
  
  return {
    isGolden,
    isBlackout,
    nextGolden,
    recommendation,
    score: isGolden?2:isBlackout?-2:0
  };
}

// ============================================================
// LAYER 4: TRINITY SHIELD (Risk Protection)
// ============================================================
function trinityShield(O,H,L,C) {
  const n=C.length,last=C[n-1];
  const atr = calcAtr(H,L,C);
  const avgRange = (Math.max(...H.slice(-20))-Math.min(...L.slice(-20)))/last;
  
  const stopLoss = last - (atr * 1.5);
  const stopLossPct = ((last - stopLoss)/last)*100;
  
  const resistance = Math.max(...H.slice(-20));
  const takeProfit = Math.min(last + (atr * 2.5), resistance);
  const takeProfitPct = ((takeProfit - last)/last)*100;
  
  let earlyExit = false;
  let earlyExitReason = "";
  const mom = C[n-1]-C[n-2];
  const prevMom = C[n-2]-C[n-3];
  if((mom>0 && prevMom<0 && Math.abs(mom)>Math.abs(prevMom)*1.5) ||
     (mom<0 && prevMom>0 && Math.abs(mom)>Math.abs(prevMom)*1.5)) {
    earlyExit = true;
    earlyExitReason = "Momentum reversal detected";
  }
  const bbUpper = calcEma(C.slice(-20),20) + (Math.sqrt(calcEma(C.map((x,i)=>Math.pow(x-calcEma(C.slice(-20),20),2)).slice(-20),20)) * 2);
  const bbLower = calcEma(C.slice(-20),20) - (Math.sqrt(calcEma(C.map((x,i)=>Math.pow(x-calcEma(C.slice(-20),20),2)).slice(-20),20)) * 2);
  if(last>bbUpper*1.01 || last<bbLower*0.99) {
    earlyExit = true;
    earlyExitReason = "Price outside Bollinger Bands";
  }
  
  const shieldLevel = (stopLossPct + takeProfitPct) / 2;
  let grade = "A";
  if(shieldLevel>2) grade="A";
  else if(shieldLevel>1) grade="B";
  else grade="C";
  
  return {
    stopLoss: stopLoss.toFixed(5),
    stopLossPct: stopLossPct.toFixed(2),
    takeProfit: takeProfit.toFixed(5),
    takeProfitPct: takeProfitPct.toFixed(2),
    earlyExit,
    earlyExitReason,
    shieldLevel: shieldLevel.toFixed(2),
    grade,
    score: earlyExit? -2 : (grade==="A"?2:grade==="B"?1:0)
  };
}

function aiPredictor(O,H,L,C) {
  const n=C.length;
  if(n<30) return {signal:"NEUTRAL",probability:0,score:0};
  
  const recent = C.slice(-20);
  const patternHistory = [];
  
  let dbCount=0, dtCount=0;
  for(let i=5;i<recent.length-5;i++) {
    if(recent[i] < recent[i-2] && recent[i] < recent[i+2]) dbCount++;
    if(recent[i] > recent[i-2] && recent[i] > recent[i+2]) dtCount++;
  }
  
  let trendUp=0, trendDown=0;
  for(let i=1;i<recent.length;i++) {
    if(recent[i]>recent[i-1]) trendUp++;
    else trendDown++;
  }
  
  const range = Math.max(...recent) - Math.min(...recent);
  const avgRange = (Math.max(...C.slice(-50))-Math.min(...C.slice(-50)));
  const isConsolidating = range/avgRange < 0.3;
  
  let signal = "NEUTRAL";
  let probability = 50;
  
  if(dbCount>=2 && trendUp>trendDown) {
    signal = "UP";
    probability = 75 + Math.min(10, dbCount*2);
  } else if(dtCount>=2 && trendDown>trendUp) {
    signal = "DOWN";
    probability = 75 + Math.min(10, dtCount*2);
  } else if(isConsolidating && trendUp>trendDown*1.5) {
    signal = "UP";
    probability = 68;
  } else if(isConsolidating && trendDown>trendUp*1.5) {
    signal = "DOWN";
    probability = 68;
  } else if(trendUp>trendDown*2 && recent[recent.length-1]>recent[recent.length-2]) {
    signal = "UP";
    probability = 65;
  } else if(trendDown>trendUp*2 && recent[recent.length-1]<recent[recent.length-2]) {
    signal = "DOWN";
    probability = 65;
  }
  
  return {
    signal,
    probability: Math.min(95,probability),
    patterns: `${dbCount>=2?"Double Bottom ":""}${dtCount>=2?"Double Top ":""}${isConsolidating?"Consolidation ":""}`.trim()||"No clear pattern",
    score: signal==="UP"?2:signal==="DOWN"?-2:0
  };
}

// INDICATORS & HELPERS
// ============================================================
function calcEma(d,p){const k=2/(p+1);let e=d[0];for(let i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e;}
function calcRsi(d,p=14){if(d.length<p+1)return 50;let g=0,l=0;for(let i=d.length-p;i<d.length;i++){const x=d[i]-d[i-1];x>0?g+=x:l+=Math.abs(x);}return 100-100/(1+(g/p)/((l/p)||0.0001));}
function calcMacd(d){return calcEma(d.slice(-26),12)-calcEma(d.slice(-26),26);}
function calcStoch(H,L,C,p=14){const hh=Math.max(...H.slice(-p)),ll=Math.min(...L.slice(-p));return ((C[C.length-1]-ll)/((hh-ll)||0.0001))*100;}
function calcAtr(H,L,C,p=14){const tr=[];for(let i=1;i<C.length;i++)tr.push(Math.max(H[i]-L[i],Math.abs(H[i]-C[i-1]),Math.abs(L[i]-C[i-1])));return tr.slice(-p).reduce((a,b)=>a+b,0)/p;}

function marketStr(C){let u=0,d=0;for(let i=3;i<Math.min(C.length,25);i++){if(C[i]>C[i-1]&&C[i-1]>C[i-2]&&C[i-2]>C[i-3])u++;if(C[i]<C[i-1]&&C[i-1]<C[i-2]&&C[i-2]<C[i-3])d++;}if(u>d+1)return{trend:"UPTREND",score:2};if(d>u+1)return{trend:"DOWNTREND",score:-2};return{trend:"SIDEWAYS",score:0};}

function candleP(O,H,L,C){const n=C.length-1,o=O[n],h=H[n],l=L[n],c=C[n];const body=Math.abs(c-o),range=h-l,bull=c>o;const up=h-Math.max(o,c),dn=Math.min(o,c)-l;const p=[];let s=0;if(body<range*0.1)p.push("Doji");if(dn>body*2.5&&up<body*0.5){p.push(bull?"Hammer":"Hanging Man");s+=bull?2:-1;}if(up>body*2.5&&dn<body*0.5){p.push(bull?"Shooting Star":"Inv Hammer");s+=bull?-2:1;}if(body>range*0.75){p.push(bull?"Marubozu Bull":"Marubozu Bear");s+=bull?2:-2;}if(n>0){const po=O[n-1],pc=C[n-1];if(pc<po&&c>o&&c>po&&o<pc){p.push("Bullish Engulfing");s+=3;}if(pc>po&&c<o&&c<po&&o>pc){p.push("Bearish Engulfing");s-=3;}if(n>1){const ppc=C[n-2],ppo=O[n-2];if(ppc<ppo&&Math.abs(pc-po)<Math.abs(ppc-ppo)*0.3&&c>o&&c>(ppo+ppc)/2){p.push("Morning Star");s+=4;}if(ppc>ppo&&Math.abs(pc-po)<Math.abs(ppc-ppo)*0.3&&c<o&&c<(ppo+ppc)/2){p.push("Evening Star");s-=4;}}}return{patterns:p,score:s};}

function rejZones(H,L,C){const n=C.length,levels=[],tol=0.0003;for(let i=5;i<n-5;i++){if(H[i]>H[i-1]&&H[i]>H[i-2]&&H[i]>H[i+1]&&H[i]>H[i+2])levels.push({price:H[i],type:"R"});if(L[i]<L[i-1]&&L[i]<L[i-2]&&L[i]<L[i+1]&&L[i]<L[i+2])levels.push({price:L[i],type:"S"});}const cl=[];levels.forEach(lv=>{let found=false;cl.forEach(c=>{if(Math.abs(c.price-lv.price)/lv.price<tol){c.touches++;lv.type==="R"?c.ru++:c.rd++;found=true;}});if(!found)cl.push({price:lv.price,touches:1,ru:lv.type==="R"?1:0,rd:lv.type==="S"?1:0});});const strong=cl.filter(c=>c.touches>=3).sort((a,b)=>b.touches-a.touches);const last=C[n-1];let nz=null,nt="",ns=0;strong.forEach(z=>{const d=Math.abs(last-z.price)/z.price*100;if(d<0.05&&(!nz||d<Math.abs(last-nz.price)/last*100)){nz=z;nt=z.rd>z.ru?"RESISTANCE":"SUPPORT";ns=Math.min(100,z.touches*20);}});const atZone=!!nz,score=atZone?(nt==="SUPPORT"?2:-2):0;return{nearZone:nz,nearType:nt,nearStrength:ns,atZone,score,label:atZone?`${nt} zone (${nz.touches}x) at ${nz.price.toFixed(5)}`:"No rejection zone nearby"};}

function volProfile(H,L,C,V){const n=C.length,minP=Math.min(...L),maxP=Math.max(...H),range=maxP-minP,buckets=20;const prof=Array.from({length:buckets},(_,b)=>({mid:minP+(b+0.5)*range/buckets,vol:0}));for(let i=0;i<n;i++){const v=V&&V[i]?V[i]:1;for(let b=0;b<buckets;b++)if(L[i]<=minP+(b+1)*range/buckets&&H[i]>=minP+b*range/buckets)prof[b].vol+=v;}const poc=prof.reduce((a,b)=>b.vol>a.vol?b:a);const avg=prof.reduce((a,b)=>a+b.vol,0)/buckets;const last=C[n-1];const atHVN=prof.some(z=>z.vol>avg*1.5&&Math.abs(last-z.mid)/last<0.0008);const atLVN=prof.some(z=>z.vol<avg*0.4&&z.vol>0&&Math.abs(last-z.mid)/last<0.0008);const nearPOC=Math.abs(last-poc.mid)/last<0.0005;const label=atLVN?"EXPLOSION ZONE":atHVN?"HVN - Institutional":nearPOC?`Near POC ${poc.mid.toFixed(5)}`:`POC: ${poc.mid.toFixed(5)}`;return{atHVN,atLVN,nearPOC,label};}

// CACHING
// ============================================================
const CACHE_KEY = 'polygon_cache';
const CACHE_DURATION = 5 * 60 * 1000;

function getCachedData(symbol, interval) {
    const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
    const key = `${symbol}_${interval}`;
    const entry = cache[key];
    if (entry && (Date.now() - entry.timestamp) < CACHE_DURATION) {
        return entry.data;
    }
    return null;
}

function setCachedData(symbol, interval, data) {
    const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
    const key = `${symbol}_${interval}`;
    cache[key] = { data, timestamp: Date.now() };
    localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
}

// ============================================================
// FETCH
// ============================================================
async function fetchTF(symbol, interval) {
    const cached = getCachedData(symbol, interval);
    if (cached) return cached;

    const ticker = "C:" + symbol.replace("/", "");
    const map = {"5min":"5","15min":"15","30min":"30","1h":"60","4h":"240"};
    const mins = map[interval] || "5";
    const to = new Date().toISOString().split("T")[0];
    const from = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split("T")[0];
    const url = `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/${mins}/minute/${from}/${to}?adjusted=true&sort=asc&limit=100&apiKey=${POLYGON_KEY}`;

    await new Promise(r => setTimeout(r, 500));

    const res = await fetch(url);
    if (!res.ok) {
        if (res.status === 403 || res.status === 429) {
            throw new Error(`API Limit Reached (${res.status}). Please wait.`);
        }
        throw new Error(`HTTP ${res.status}`);
    }
    
    const data = await res.json();
    if (!data.results || !data.results.length) {
        throw new Error("No data from Polygon. Check symbol or market hours.");
    }
    
    const v = data.results.slice(0, -1);
    const result = {
        O: v.map(x => x.o),
        H: v.map(x => x.h),
        L: v.map(x => x.l),
        C: v.map(x => x.c),
        V: v.map(x => x.v || 0)
    };

    setCachedData(symbol, interval, result);
    return result;
}

function quickBias(O,H,L,C){
  const last=C[C.length-1],e20=calcEma(C.slice(-20),20),e50=calcEma(C.slice(-50),50);
  const r=calcRsi(C),m=calcMacd(C);
  let s=0;
  if(last>e20)s++;else s--;if(last>e50)s++;else s--;
  if(r<45)s++;else if(r>55)s--;if(m>0)s++;else s--;
  if(s>=2)return"UP";if(s<=-2)return"DOWN";return"NEUTRAL";
}

                        padding:"2px 8px",
                        borderRadius:4,
                        background:layer.signal==="UP"?"rgba(0,224,150,0.1)":layer.signal==="DOWN"?"rgba(255,77,109,0.1)":"rgba(240,192,64,0.05)"
                      }}>
                        {layer.signal}
                      </span>
                    </div>
                    <span style={{fontSize:8,color:C.dim,width:70,textAlign:"right"}}>{layer.details}</span>
                  </div>
                ))}
              </div>

              {/* Actions */}
              {!taken && penta.finalDirection!=="WAIT" ? (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <button onClick={takeTrade} style={{padding:13,border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",background:penta.finalDirection==="CALL"?C.up:C.down,animation:penta.finalConfidence>=95?"pulseGold 2s infinite":penta.finalDirection==="CALL"?"pulseG 2s infinite":"pulseR 2s infinite"}}>
                    {penta.finalConfidence>=95?"?? TAKE (GOLD)":"? TAKE"}
                  </button>
                  <button onClick={skipToNext} style={{padding:13,background:"transparent",border:`1px solid ${C.border}`,borderRadius:10,color:C.dim,fontWeight:700,fontSize:14,cursor:"pointer"}}>? Next Pair</button>
                </div>
              ) : !taken && penta.finalDirection==="WAIT" ? (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <button style={{padding:13,border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14,background:"#1e2235",cursor:"not-allowed",opacity:0.5}}>? WAIT</button>
                  <button onClick={skipToNext} style={{padding:13,background:"transparent",border:`1px solid ${C.border}`,borderRadius:10,color:C.dim,fontWeight:700,fontSize:14,cursor:"pointer"}}>? Next Pair</button>
                </div>
              ) : (
                <div style={{background:"rgba(255,215,0,0.06)",border:"1px solid rgba(255,215,0,0.18)",borderRadius:10,padding:14,textAlign:"center"}}>
                  <div style={{fontSize:13,color:C.gold,fontWeight:600,marginBottom:10}}>?? Mark result:</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <button onClick={()=>markResult("WIN")} style={{padding:10,background:"rgba(0,224,150,0.15)",border:`1px solid ${C.up}60`,borderRadius:8,color:C.up,fontWeight:700,fontSize:13,cursor:"pointer"}}>? WIN</button>
                    <button onClick={()=>markResult("LOSS")} style={{padding:10,background:"rgba(255,77,109,0.15)",border:`1px solid ${C.down}60`,borderRadius:8,color:C.down,fontWeight:700,fontSize:13,cursor:"pointer"}}>? LOSS</button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Buttons */}
        {!loading && !sig && !scanning && (
          <div style={{display:"grid", gridTemplateColumns: "1fr 1fr", gap: 10}}>
            <button 
              onClick={scanAllPairs}
              style={{
                padding: 15,
                background: "linear-gradient(135deg,#ffd700,#f0a500)",
                border: "none",
                borderRadius: 12,
                color: "#000",
                fontWeight: 800,
                fontSize: 14,
                cursor: "pointer"
              }}
            >
              ?? Scan All
            </button>
            <button 
              onClick={getSignal}
              style={{
                padding: 15,
                background: "linear-gradient(135deg,#4fc3f7,#7c83ff)",
                border: "none",
                borderRadius: 12,
                color: "#fff",
                fontWeight: 700,
                fontSize: 14,
                cursor: "pointer"
              }}
            >
              ?? Single
            </button>
          </div>
        )}

        {/* Nav */}
        <div style={{display:"flex",justifyContent:"space-around",marginTop:24,borderTop:`1px solid ${C.card}`,paddingTop:14}}>
          {[{ic:"??",lb:"Profile"},{ic:"??",lb:"History",action:()=>setPage("history")},{ic:"??",lb:"Signals"},{ic:"??",lb:"AI"},{ic:"??",lb:"Support"}].map((x,i)=>(
            <div key={x.lb} onClick={x.action} style={{textAlign:"center",cursor:x.action?"pointer":"default",opacity:x.lb==="Signals"||x.lb==="History"?1:0.25}}>
              <div style={{fontSize:17,marginBottom:2}}>{x.ic}</div>
              <div style={{fontSize:9,color:x.lb==="Signals"?C.accent:"#333",fontWeight:x.lb==="Signals"?700:400}}>{x.lb}</div>
            </div>
          ))}
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
