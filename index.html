// 📈 Indicators 
function calcEma(d, p) {
  const k = 2/(p+1); let e = d[0];
  for (let i=1;i<d.length;i++) e = d[i]*k + e*(1-k);
  return e;
}
function calcRsi(d, p=14) {
  if (d.length<p+1) return 50;
  let g=0,l=0;
  for (let i=d.length-p;i<d.length;i++) { const x=d[i]-d[i-1]; x>0?g+=x:l+=Math.abs(x); }
  return 100 - 100/(1+(g/p)/((l/p)||0.0001));
}
function calcMacd(d) { return calcEma(d.slice(-26),12)-calcEma(d.slice(-26),26); }
function calcStoch(H,L,C,p=14) {
  const hh=Math.max(...H.slice(-p)), ll=Math.min(...L.slice(-p));
  return ((C[C.length-1]-ll)/((hh-ll)||0.0001))*100;
}
function calcAtr(H,L,C,p=14) {
  const tr=[];
  for (let i=1;i<C.length;i++) tr.push(Math.max(H[i]-L[i],Math.abs(H[i]-C[i-1]),Math.abs(L[i]-C[i-1])));
  return tr.slice(-p).reduce((a,b)=>a+b,0)/p;
}

// 📊 Market Structure
function marketStr(C) {
  let u=0,d=0;
  for (let i=3;i<Math.min(C.length,25);i++) {
    if(C[i]>C[i-1]&&C[i-1]>C[i-2]&&C[i-2]>C[i-3])u++;
    if(C[i]<C[i-1]&&C[i-1]<C[i-2]&&C[i-2]<C[i-3])d++;
  }
  if(u>d+1) return {trend:"UPTREND",score:2};
  if(d>u+1) return {trend:"DOWNTREND",score:-2};
  return {trend:"SIDEWAYS",score:0};
}

// 🕯️ Candle Patterns
function candleP(O,H,L,C) {
  const n=C.length-1,o=O[n],h=H[n],l=L[n],c=C[n];
  const body=Math.abs(c-o),range=h-l,bull=c>o;
  const up=h-Math.max(o,c),dn=Math.min(o,c)-l;
  const p=[]; let s=0;
  if(body<range*0.1){p.push("Doji");}
  if(dn>body*2.5&&up<body*0.5){p.push(bull?"Hammer":"Hanging Man");s+=bull?2:-1;}
  if(up>body*2.5&&dn<body*0.5){p.push(bull?"Shooting Star":"Inv Hammer");s+=bull?-2:1;}
  if(body>range*0.75){p.push(bull?"Marubozu Bull":"Marubozu Bear");s+=bull?2:-2;}
  if(n>0){
    const po=O[n-1],pc=C[n-1];
    if(pc<po&&c>o&&c>po&&o<pc){p.push("Bullish Engulfing");s+=3;}
    if(pc>po&&c<o&&c<po&&o>pc){p.push("Bearish Engulfing");s-=3;}
    if(n>1){
      const ppc=C[n-2],ppo=O[n-2];
      if(ppc<ppo&&Math.abs(pc-po)<Math.abs(ppc-ppo)*0.3&&c>o&&c>(ppo+ppc)/2){p.push("Morning Star");s+=4;}
      if(ppc>ppo&&Math.abs(pc-po)<Math.abs(ppc-ppo)*0.3&&c<o&&c<(ppo+ppc)/2){p.push("Evening Star");s-=4;}
    }
  }
  return {patterns:p,score:s};
}

// 🛑 Rejection Zones
function rejZones(H,L,C) {
  const n=C.length,levels=[],tol=0.0003;
  for(let i=5;i<n-5;i++){
    if(H[i]>H[i-1]&&H[i]>H[i-2]&&H[i]>H[i+1]&&H[i]>H[i+2])levels.push({price:H[i],type:"R"});
    if(L[i]<L[i-1]&&L[i]<L[i-2]&&L[i]<L[i+1]&&L[i]<L[i+2])levels.push({price:L[i],type:"S"});
  }
  const cl=[];
  levels.forEach(lv=>{
    let found=false;
    cl.forEach(c=>{if(Math.abs(c.price-lv.price)/lv.price<tol){c.touches++;lv.type==="R"?c.ru++:c.rd++;found=true;}});
    if(!found)cl.push({price:lv.price,touches:1,ru:lv.type==="R"?1:0,rd:lv.type==="S"?1:0});
  });
  const strong=cl.filter(c=>c.touches>=3).sort((a,b)=>b.touches-a.touches);
  const last=C[n-1]; let nz=null,nt="",ns=0;
  strong.forEach(z=>{
    const d=Math.abs(last-z.price)/z.price*100;
    if(d<0.05&&(!nz||d<Math.abs(last-nz.price)/last*100)){nz=z;nt=z.rd>z.ru?"RESISTANCE":"SUPPORT";ns=Math.min(100,z.touches*20);}
  });
  const atZone=!!nz,score=atZone?(nt==="SUPPORT"?2:-2):0;
  return {nearZone:nz,nearType:nt,nearStrength:ns,atZone,score,label:atZone?`${nt} zone (${nz.touches}x) at ${nz.price.toFixed(5)}`:"No rejection zone nearby"};
}

// 📊 Volume Profile
function volProfile(H,L,C,V) {
  const n=C.length,minP=Math.min(...L),maxP=Math.max(...H),range=maxP-minP,buckets=20;
  const prof=Array.from({length:buckets},(_,b)=>({mid:minP+(b+0.5)*range/buckets,vol:0}));
  for(let i=0;i<n;i++){
    const v=V&&V[i]?V[i]:1;
    for(let b=0;b<buckets;b++)if(L[i]<=minP+(b+1)*range/buckets&&H[i]>=minP+b*range/buckets)prof[b].vol+=v;
  }
  const poc=prof.reduce((a,b)=>b.vol>a.vol?b:a);
  const avg=prof.reduce((a,b)=>a+b.vol,0)/buckets;
  const last=C[n-1];
  const atHVN=prof.some(z=>z.vol>avg*1.5&&Math.abs(last-z.mid)/last<0.0008);
  const atLVN=prof.some(z=>z.vol<avg*0.4&&z.vol>0&&Math.abs(last-z.mid)/last<0.0008);
  const nearPOC=Math.abs(last-poc.mid)/last<0.0005;
  const label=atLVN?"EXPLOSION ZONE2":atHVN?"HVN - Institutional":nearPOC?`Near POC ${poc.mid.toFixed(5)}`:`POC: ${poc.mid.toFixed(5)}`;
  return {atHVN,atLVN,nearPOC,label};
}

// 🛡️ Smart Triple Check (تم تعديل المنطق الداخلي ليكون أكثر مرونة)
function smartTripleCheck(O,H,L,C,rz,vp,sig) {
  const n=C.length;
  let lu=0,ld=0;
  for(let i=n-5;i<n;i++){lu+=(C[i]>C[i-1]?1:0);ld+=(C[i]<C[i-1]?1:0);}
  let ab=0;for(let i=n-10;i<n-1;i++)ab+=Math.abs(C[i]-O[i]);ab/=9;
  const strongCnd=Math.abs(C[n-1]-O[n-1])>ab*0.8;
  const clearEma=Math.abs(C[n-1]-calcEma(C.slice(-20),20))/calcEma(C.slice(-20),20)*100>0.01;
  const momAcc=Math.abs(C[n-1]-C[n-2])>Math.abs(C[n-2]-C[n-3]);
  const cndCons=Math.max(lu,ld);
  let mcs=0;
  if(cndCons>=3)mcs++;if(strongCnd)mcs++;if(clearEma)mcs++;if(momAcc)mcs++;
  const check1=mcs>=3;

  // تعديل مرونة الفحص للـ Zone والسيولة حتى لا يقفل الإشارات في مناطق الانفجار السعري
  const rzOk=!rz.atZone||(rz.nearType==="SUPPORT"&&sig==="UP")||(rz.nearType==="RESISTANCE"&&sig==="DOWN")||(sig==="WAIT");
  const vpOk=vp.atLVN || (!vp.atHVN); // يسمح بالدخول في حالة مناطق الانفجار أو في حالة وضوح السيولة
  const check2=rzOk&&vpOk;

  const rsiV=calcRsi(C);
  const macdV=calcMacd(C);
  const e20=calcEma(C.slice(-20),20),e50=calcEma(C.slice(-50),50);
  const last=C[n-1];
  let agree=0;
  if(sig==="UP"){
    if(rsiV<60&&rsiV>30)agree++;
    if(macdV>0)agree++;
    if(last>e20)agree++;
  } else if(sig==="DOWN"){
    if(rsiV>40&&rsiV<70)agree++;
    if(macdV<0)agree++;
    if(last<e20)agree++;
  }
  const check3=sig==="WAIT" ? true : (agree>=2);

  const passed=[check1,check2,check3].filter(Boolean).length;
  const allPassed=passed===3;

  return {
    check1,check2,check3,passed,allPassed,
    mcs,mcsDetails:`Candles:${cndCons}/5 | Body:${strongCnd?"Strong":"Weak"} | Clear:${clearEma?"Yes":"No"} | Accel:${momAcc?"Yes":"No"}`,
    agree,rzOk,vpOk
  };
}

// 🧠 Main Analysis
function analyze(O,H,L,C,V) {
  const n=C.length,last=C[n-1];
  const e20=calcEma(C.slice(-20),20),e50=calcEma(C.slice(-50),50);
  const r=calcRsi(C),m=calcMacd(C),k=calcStoch(H,L,C);
  const ms=marketStr(C),cp=candleP(O,H,L,C);
  const rz=rejZones(H,L,C),vp=volProfile(H,L,C,V);

  let total=0;
  if(last>e20&&e20>e50)total+=2;else if(last<e20&&e20<e50)total-=2;else if(last>e20)total+=1;else total-=1;
  if(r<25)total+=3;else if(r<35)total+=2;else if(r<45)total+=1;
  else if(r>75)total-=3;else if(r>65)total-=2;else if(r>55)total-=1;
  total+=m>0?1:-1;
  if(k<20)total+=2;else if(k>80)total-=2;
  total+=ms.score+cp.score+rz.score;
  
  // عدم معاقبة السكور بشكل كلي عند العرضي أو الانفجار السعري لتسهيل الفلترة
  if(vp.atLVN)total+=(total>0?1:-1);

  let conflicts=0;
  if(last>e20&&e20>e50&&ms.score<0)conflicts++;
  if(last<e20&&e20<e50&&ms.score>0)conflicts++;
  if(rz.atZone&&rz.nearType==="RESISTANCE"&&total>0)conflicts+=1;
  if(rz.atZone&&rz.nearType==="SUPPORT"&&total<0)conflicts+=1;

  let direction="WAIT",dcls="wait";
  if(conflicts<2&&Math.abs(total)>=2){
    direction=total>0?"UP":"DOWN";
    dcls=total>0?"up":"down";
  }

  const stc=smartTripleCheck(O,H,L,C,rz,vp,direction);
  if(direction!=="WAIT"&&!stc.allPassed){direction="WAIT";dcls="wait";}

  const absScore=Math.abs(total);
  const accuracy=Math.min(95,Math.round(60+absScore*4));
  const strength=Math.min(98,Math.round(52+absScore*5));

  const atrVal=calcAtr(H,L,C);
  const atrPct=(atrVal/last)*100;
  let duration="No Entry";
  if(direction!=="WAIT"){
    if(atrPct>0.15)duration="5 min";
    else if(atrPct>0.08)duration="15 min";
    else if(atrPct>0.04)duration="30 min";
    else duration="1 hour";
  }

  const reasons=[];
  if(direction!=="WAIT"){
    const up=direction==="UP";
    if(up&&last>e20||!up&&last<e20) reasons.push(`Price ${up?"above":"below"} EMA20 & EMA50`);
    if(r<45&&up) reasons.push(`RSI ${r.toFixed(0)} — support dynamic alignment`);
    if(r>55&&!up) reasons.push(`RSI ${r.toFixed(0)} — resistance dynamic alignment`);
    if(ms.score!==0) reasons.push(`${ms.trend} Structure Aligned`);
    if(cp.patterns.length>0) reasons.push(`${cp.patterns[0]} confirmed`);
    while(reasons.length<3) reasons.push(`${up?"Bullish":"Bearish"} momentum aligned`);
  } else {
    reasons.push("Mixed signals — monitoring market structure");
    reasons.push(`Smart Triple Check: ${stc.passed}/3 checks passed`);
    reasons.push("Wait for system confluence");
  }

  return {
    direction,dcls,accuracy,strength,duration,total,
    rsi:r.toFixed(1),macd:m.toFixed(5),stoch:k.toFixed(0),
    e20:e20.toFixed(5),last:last.toFixed(5),
    ms,cp,rz,vp,stc,reasons:reasons.slice(0,3)
  };
}

async function fetchTF(symbol,interval) {
  const ticker="C:"+symbol.replace("/","");
  const map={"5min":"5","15min":"15","30min":"30","1h":"60","4h":"240"};
  const mins=map[interval]||"5";
  const to=new Date().toISOString().split("T")[0];
  const from=new Date(Date.now()-7*24*60*60*1000).toISOString().split("T")[0];
  const url=`https://api.polygon.io/v2/aggs/ticker/${ticker}/range/${mins}/minute/${from}/${to}?adjusted=true&sort=asc&limit=100&apiKey=${POLYGON_KEY}`;
  const res=await fetch(url);
  const data=await res.json();
  if(!data.results||!data.results.length)throw new Error("No data");
  const v=data.results.slice(0,-1);
  return{O:v.map(x=>x.o),H:v.map(x=>x.h),L:v.map(x=>x.l),C:v.map(x=>x.c),V:v.map(x=>x.v||0)};
}
