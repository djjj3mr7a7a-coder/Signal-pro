<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Signal AI"/>
  <meta name="theme-color" content="#08090f"/>
  <title>Signal AI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#08090f;color:#e0e0f0;font-family:-apple-system,'SF Pro Display',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
    ::-webkit-scrollbar{width:0;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,224,150,0.35)}50%{box-shadow:0 0 0 8px rgba(0,224,150,0)}}
    @keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(255,77,109,0.35)}50%{box-shadow:0 0 0 8px rgba(255,77,109,0)}}
    .wrap{width:100%;max-width:390px;padding:0 16px 32px;}
    .header{display:flex;align-items:center;justify-content:space-between;padding:52px 0 24px;}
    .logo{display:flex;align-items:center;gap:6px;}
    .logo-signal{font-size:22px;font-weight:800;background:linear-gradient(135deg,#4fc3f7,#7c83ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logo-ai{font-size:22px;font-weight:800;color:#fff;}
    .logo-star{font-size:14px;color:#7c83ff;}
    .header-icons{display:flex;gap:10px;}
    .icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid #1e2235;display:flex;align-items:center;justify-content:center;color:#8fa0c0;font-size:15px;cursor:pointer;background:none;}
    .selectors{display:flex;gap:8px;margin-bottom:20px;position:relative;}
    .pair-btn{flex:1;display:flex;align-items:center;justify-content:space-between;background:#10121e;border:1px solid #1e2235;border-radius:10px;padding:10px 12px;color:#e0e0f0;font-size:13px;font-weight:600;cursor:pointer;}
    .pair-btn:active{background:#1a1c2e;}
    .pair-arrow{color:#666;font-size:10px;}
    .pair-dropdown{position:absolute;top:46px;left:0;right:60px;z-index:100;background:#10121e;border:1px solid #1e2235;border-radius:10px;max-height:220px;overflow-y:auto;box-shadow:0 8px 32px #000;}
    .pair-item{padding:11px 12px;font-size:13px;cursor:pointer;color:#b0b8d8;border-bottom:1px solid #0d0f1a;display:flex;align-items:center;gap:8px;}
    .pair-item.active{color:#7c83ff;background:#1a1c2e;}
    .tf-wrap{position:relative;}
    .tf-select{background:#10121e;border:1px solid #1e2235;border-radius:10px;padding:10px 28px 10px 12px;color:#e0e0f0;font-size:13px;font-weight:600;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;}
    .tf-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#666;font-size:11px;pointer-events:none;}
    .card{background:#10121e;border:1px solid #1a1c2e;border-radius:16px;padding:20px;margin-bottom:12px;min-height:320px;display:flex;align-items:center;justify-content:center;}
    .card-inner{width:100%;animation:fadeUp 0.4s ease;}
    .idle{text-align:center;color:#4a4f73;font-size:14px;}
    .spinner{width:40px;height:40px;border:3px solid #1e2235;border-top:3px solid #7c83ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
    .analyzing{color:#8fa0c0;font-size:13px;text-align:center;}
    .section-label{font-size:11px;color:#444;font-weight:600;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px;}
    .info-box{background:#0d0f1a;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
    .info-label{font-size:11px;color:#444;margin-bottom:4px;}
    .info-value{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
    .grid2 .info-value{font-size:15px;}
    .acc-value{color:#7c83ff !important;}
    .bar-row{display:flex;justify-content:space-between;margin-bottom:8px;}
    .bar-track{background:#1a1c2e;border-radius:100px;height:6px;overflow:hidden;}
    .bar-fill{height:100%;background:linear-gradient(90deg,#4fc3f7,#00e096);border-radius:100px;transition:width 0.8s ease;}
    .bar-labels{display:flex;justify-content:space-between;margin-top:4px;}
    .bar-labels span{font-size:10px;color:#333;}
    .bar-labels .mid{color:#8fa0c0;}
    .direction-box{border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;}
    .direction-box.up{background:rgba(0,224,150,0.07);border:1px solid rgba(0,224,150,0.18);}
    .direction-box.down{background:rgba(255,77,109,0.07);border:1px solid rgba(255,77,109,0.18);}
    .dir-left{flex:1;}
    .dir-arrow{font-size:20px;margin-right:6px;}
    .dir-label{font-size:22px;font-weight:800;}
    .dir-label.up{color:#00e096;}
    .dir-label.down{color:#ff4d6d;}
    .dir-right{text-align:right;}
    .until-label{font-size:11px;color:#444;margin-bottom:4px;}
    .until-time{font-size:18px;font-weight:700;color:#8fa0c0;}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .btn-take{padding:13px;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;}
    .btn-take.up{background:#00e096;animation:pulse 2s infinite;}
    .btn-take.down{background:#ff4d6d;animation:pulseRed 2s infinite;}
    .btn-skip{padding:13px;background:transparent;border:1px solid #1e2235;border-radius:10px;color:#666;font-weight:700;font-size:14px;cursor:pointer;}
    .success-box{text-align:center;padding:14px;background:rgba(0,224,150,0.06);border-radius:10px;border:1px solid rgba(0,224,150,0.18);}
    .success-text{font-size:13px;color:#00e096;font-weight:600;}
    .new-signal-btn{margin-top:10px;background:none;border:none;color:#7c83ff;font-size:12px;cursor:pointer;}
    .get-btn{width:100%;padding:15px;background:linear-gradient(135deg,#4fc3f7,#7c83ff);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 24px rgba(124,131,255,0.28);}
    .get-btn.loading{background:#1e2035;cursor:not-allowed;box-shadow:none;}
    .indicators-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
    .ind-box{background:#0d0f1a;border-radius:10px;padding:10px 12px;}
    .ind-label{font-size:10px;color:#444;margin-bottom:3px;}
    .ind-value{font-size:13px;font-weight:700;}
    .ind-value.bull{color:#00e096;}
    .ind-value.bear{color:#ff4d6d;}
    .ind-value.neut{color:#f0c040;}
    .nav{display:flex;justify-content:space-around;margin-top:28px;border-top:1px solid #10121e;padding-top:16px;}
    .nav-item{text-align:center;cursor:pointer;}
    .nav-icon{font-size:18px;margin-bottom:3px;}
    .nav-label{font-size:9px;color:#555;}
    .nav-item.active .nav-icon{opacity:1;}
    .nav-item.active .nav-label{color:#7c83ff;font-weight:700;}
    .nav-item:not(.active) .nav-icon{opacity:0.25;}
    .err-box{text-align:center;padding:20px;color:#ff4d6d;font-size:13px;line-height:1.6;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">
      <span class="logo-signal">SIGNAL</span>
      <span class="logo-ai">AI</span>
      <span class="logo-star">+</span>
    </div>
    <div class="header-icons">
      <div class="icon-btn">#</div>
    </div>
  </div>

  <div class="selectors">
    <div style="flex:1;position:relative;">
      <button class="pair-btn" id="pairBtn">
        <span id="pairLabel">FX: EUR/USD</span>
        <span class="pair-arrow">v</span>
      </button>
      <div class="pair-dropdown" id="pairDropdown" style="display:none;"></div>
    </div>
    <div class="tf-wrap">
      <select class="tf-select" id="tfSelect">
        <option value="1min">1 min</option>
        <option value="5min" selected>5 min</option>
        <option value="15min">15 min</option>
        <option value="1h">1 hour</option>
      </select>
      <span class="tf-icon">T</span>
    </div>
  </div>

  <div class="card" id="card">
    <div class="idle">Press Get Signal to Start</div>
  </div>

  <button class="get-btn" id="getBtn" onclick="getSignal()">
    <span>$</span> Get Signal
  </button>

  <div class="nav">
    <div class="nav-item"><div class="nav-icon">P</div><div class="nav-label">Profile</div></div>
    <div class="nav-item"><div class="nav-icon">H</div><div class="nav-label">History</div></div>
    <div class="nav-item active"><div class="nav-icon">S</div><div class="nav-label">Signals</div></div>
    <div class="nav-item"><div class="nav-icon">A</div><div class="nav-label">AI Bot</div></div>
    <div class="nav-item"><div class="nav-icon">C</div><div class="nav-label">Support</div></div>
  </div>
</div>

<script>
const API_KEY = "fbaf04b411c7458f923c05ef24bcc878";

const PAIRS = [
  {label:"EUR/USD", symbol:"EUR/USD"},
  {label:"GBP/USD", symbol:"GBP/USD"},
  {label:"USD/JPY", symbol:"USD/JPY"},
  {label:"AUD/USD", symbol:"AUD/USD"},
  {label:"USD/CAD", symbol:"USD/CAD"},
  {label:"EUR/GBP", symbol:"EUR/GBP"},
  {label:"EUR/JPY", symbol:"EUR/JPY"},
  {label:"GBP/JPY", symbol:"GBP/JPY"}
];
let currentPair = PAIRS[0];
let isLoading = false;

const dd = document.getElementById("pairDropdown");
PAIRS.forEach(p => {
  const d = document.createElement("div");
  d.className = "pair-item" + (p.symbol===currentPair.symbol?" active":"");
  d.innerHTML = p.label;
  d.onclick = () => {
    currentPair = p;
    document.getElementById("pairLabel").textContent = "FX: " + p.label;
    document.querySelectorAll(".pair-item").forEach(x=>x.classList.remove("active"));
    d.classList.add("active");
    dd.style.display = "none";
    resetCard();
  };
  dd.appendChild(d);
});

document.getElementById("pairBtn").onclick = (e) => {
  e.stopPropagation();
  dd.style.display = dd.style.display==="none" ? "block" : "none";
};
document.addEventListener("click", () => { dd.style.display="none"; });

function setCard(html){ document.getElementById("card").innerHTML = html; }

function getExpiry(tf){
  const now = new Date();
  const map = {"1min":1,"5min":5,"15min":15,"1h":60};
  now.setMinutes(now.getMinutes() + (map[tf]||5));
  return now.toTimeString().slice(0,5);
}

function analyzeMarket(candles) {
  const openPrices = candles.map(c => parseFloat(c.open)).reverse();
  const highPrices = candles.map(c => parseFloat(c.high)).reverse();
  const lowPrices = candles.map(c => parseFloat(c.low)).reverse();
  const closePrices = candles.map(c => parseFloat(c.close)).reverse();

  const length = closePrices.length;
  const lastClose = closePrices[length - 1];
  const prevClose = closePrices[length - 2];
  const lastHigh = highPrices[length - 1];
  const lastLow = lowPrices[length - 1];
  const lastOpen = openPrices[length - 1];

  const pHigh = highPrices[length - 2];
  const pLow = lowPrices[length - 2];
  const pClose = closePrices[length - 2];
  
  const pivot = (pHigh + pLow + pClose) / 3;
  const r1 = (2 * pivot) - pLow;
  const s1 = (2 * pivot) - pHigh;

  let score = 0;
  let reason = "Price Action Analysis";

  const bodySize = Math.abs(lastClose - lastOpen);
  const upperShadow = lastHigh - Math.max(lastClose, lastOpen);
  const lowerShadow = Math.min(lastClose, lastOpen) - lastLow;

  if (lowerShadow > (bodySize * 2) && lastClose > s1) {
    score += 3;
    reason = "Bullish Pin Bar near Support";
  }
  if (upperShadow > (bodySize * 2) && lastClose < r1) {
    score -= 3;
    reason = "Bearish Pin Bar near Resistance";
  }

  if (prevClose > r1 && lastLow <= r1 && lastClose > r1) {
    score += 4;
    reason = "Resistance Broken and Retested (UP)";
  }
  if (prevClose < s1 && lastHigh >= s1 && lastClose < s1) {
    score -= 4;
    reason = "Support Broken and Retested (DOWN)";
  }

  if (lastClose > r1) { score += 1; }
  else if (lastClose < s1) { score -= 1; }

  const direction = score >= 0 ? "UP" : "DOWN";
  const absScore = Math.abs(score);
  
  const accuracy = Math.min(96, 65 + (absScore * 7));
  const trend_strength = Math.min(100, 55 + (absScore * 10));
  const trend_label = trend_strength > 80 ? "Strong" : trend_strength > 65 ? "Moderate" : "Weak";

  return {
    direction,
    accuracy: Math.round(accuracy),
    trend_strength: Math.round(trend_strength),
    trend_label,
    reason,
    lastPrice: lastClose.toFixed(5),
    pivot: pivot.toFixed(5),
    r1: r1.toFixed(5),
    s1: s1.toFixed(5)
  };
}

async function getSignal(){
  if(isLoading) return;
  isLoading = true;
  const btn = document.getElementById("getBtn");
  btn.className = "get-btn loading";
  btn.innerHTML = "Analyzing...";
  dd.style.display = "none";

  setCard(`<div style="text-align:center;width:100%;">
    <div class="spinner"></div>
    <div class="analyzing">Scanning Price Action and Key Levels...</div>
  </div>`);

  const tf = document.getElementById("tfSelect").value;

  try {
    const url = `https://api.twelvedata.com/time_series?symbol=${currentPair.symbol}&interval=${tf}&outputsize=60&apikey=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    if(data.status === "error" || !data.values){
      throw new Error(data.message || "API Error");
    }

    const sig = analyzeMarket(data.values);
    const isUP = sig.direction === "UP";
    const dcls = isUP ? "up" : "down";
    const darr = isUP ? "[UP]" : "[DOWN]";

    setCard(`<div class="card-inner">
      <div class="section-label">Price Action Live Signal</div>
      <div class="info-box">
        <div class="info-label">Currency Pair</div>
        <div class="info-value">FX: ${currentPair.label}</div>
      </div>
      <div class="grid2">
        <div class="info-box" style="margin-bottom:0">
          <div class="info-label">Timeframe</div>
          <div class="info-value">${tf.replace("min"," min").replace("1h","1 hour")}</div>
        </div>
        <div class="info-box" style="margin-bottom:0">
          <div class="info-label">Signal Accuracy</div>
          <div class="info-value acc-value">${sig.accuracy}%</div>
        </div>
      </div>
      <div class="indicators-row" style="margin-top:10px">
        <div class="ind-box">
          <div class="ind-label">Resistance (R1)</div>
          <div class="ind-value bear" style="font-size:11px">${sig.r1}</div>
        </div>
        <div class="ind-box">
          <div class="ind-label">Current Price</div>
          <div class="ind-value neut" style="font-size:11px">${sig.lastPrice}</div>
        </div>
        <div class="ind-box">
          <div class="ind-label">Support (S1)</div>
          <div class="ind-value bull" style="font-size:11px">${sig.s1}</div>
        </div>
      </div>
      <div class="info-box">
        <div class="bar-row">
          <span class="info-label">Pattern: <span style="color:#fff">${sig.reason}</span></span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${sig.trend_strength}%"></div></div>
        <div class="bar-labels"><span>Weak</span><span class="mid">${sig.trend_strength}%</span><span>Strong Trend</span></div>
      </div>
      <div class="direction-box ${dcls}" style="display:flex">
        <div class="dir-left">
          <div class="info-label">Action</div>
          <div style="display:flex;align-items:center">
            <span class="dir-arrow">${darr}</span>
            <span class="dir-label ${dcls}">${sig.direction}</span>
          </div>
        </div>
        <div class="dir-right">
          <div class="until-label">Expiration</div>
          <div class="until-time">${getExpiry(tf)}</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn-take ${dcls}" onclick="takeTrade()">Take</button>
        <button class="btn-skip" onclick="skipTrade()">Skip</button>
      </div>
    </div>`);

    btn.style.display = "none";
  } catch(e) {
    setCard(`<div class="err-box">Error fetching live data<br><span style="color:#666;font-size:11px">${e.message}</span></div>`);
    btn.className = "get-btn";
    btn.innerHTML = '<span>$</span> Get Signal';
  }
  isLoading = false;
}

function takeTrade(){
  const actDiv = document.querySelector(".actions");
  if(actDiv) actDiv.outerHTML = `<div class="success-box">
    <div class="success-text">Trade Position Sent to Dashboard!</div>
    <button class="new-signal-btn" onclick="resetCard()">Get next signal</button>
  </div>`;
}

function skipTrade(){ resetCard(); }

function resetCard(){
  setCard('<div class="idle">Press Get Signal to Start</div>');
  const btn = document.getElementById("getBtn");
  btn.style.display = "flex";
  btn.className = "get-btn";
  btn.innerHTML = '<span>$</span> Get Signal';
  isLoading = false;
}
</script>
</body>
</html>
