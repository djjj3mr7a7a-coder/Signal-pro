<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SpriNg Bot - Final</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#08090f;color:#e0e0f0;font-family:-apple-system,sans-serif;display:flex;justify-content:center;min-height:100vh;}
    .wrap{width:100%;max-width:400px;padding:16px;}
    .header{display:flex;justify-content:space-between;padding:30px 0 20px;}
    .logo-signal{font-size:22px;font-weight:800;background:linear-gradient(135deg,#4fc3f7,#7c83ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logo-pro{font-size:11px;font-weight:700;color:#f0c040;background:rgba(240,192,64,0.12);padding:2px 7px;border-radius:5px;margin-left:6px;}
    .pair-btn{width:100%;padding:12px;background:#10121e;border:1px solid #1e2235;border-radius:10px;color:#e0e0f0;font-size:14px;font-weight:600;text-align:left;cursor:pointer;}
    .pair-dropdown{background:#10121e;border:1px solid #1e2235;border-radius:10px;max-height:200px;overflow-y:auto;display:none;position:absolute;width:100%;z-index:999;}
    .pair-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #0d0f1a;}
    .pair-item:hover{background:#1a1c2e;}
    .card{background:#10121e;border:1px solid #1a1c2e;border-radius:16px;padding:18px;margin:12px 0;min-height:120px;}
    .idle{text-align:center;color:#555;padding:20px 0;}
    .get-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4fc3f7,#7c83ff);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;}
    .get-btn.loading{background:#1e2035;cursor:not-allowed;}
    .nav{display:flex;justify-content:space-around;margin-top:24px;border-top:1px solid #10121e;padding-top:14px;}
    .nav-item{text-align:center;cursor:pointer;opacity:0.6;}
    .nav-item.active{opacity:1;}
    .nav-label{font-size:10px;color:#888;}
    .spinner{width:30px;height:30px;border:3px solid #1e2235;border-top:3px solid #7c83ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .ibox{background:#0d0f1a;border-radius:8px;padding:10px 12px;margin-bottom:8px;}
    .ilbl{font-size:10px;color:#666;}
    .ival{font-size:16px;font-weight:700;}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:8px 0;}
    .dir-box{padding:12px;border-radius:10px;text-align:center;margin:10px 0;}
    .dir-box.up{background:rgba(0,224,150,0.1);border:1px solid #00e09644;}
    .dir-box.down{background:rgba(255,77,109,0.1);border:1px solid #ff4d6d44;}
    .dir-box.wait{background:rgba(240,192,64,0.1);border:1px solid #f0c04044;}
    .dir-lbl{font-size:28px;font-weight:900;}
    .dir-lbl.up{color:#00e096;}
    .dir-lbl.down{color:#ff4d6d;}
    .dir-lbl.wait{color:#f0c040;}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
    .btn-take,.btn-skip{padding:12px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;border:none;}
    .btn-take.up{background:#00e096;color:#fff;}
    .btn-take.down{background:#ff4d6d;color:#fff;}
    .btn-take.wait{background:#f0c040;color:#000;}
    .btn-skip{background:transparent;border:1px solid #1e2235;color:#888;}
    .err-box{color:#ff4d6d;text-align:center;padding:20px;}
    .mtf-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #0a0c14;}
    .mtf-tf{width:50px;color:#888;}
    .mtf-sig{font-weight:700;}
    .mtf-sig.bull{color:#00e096;}
    .mtf-sig.bear{color:#ff4d6d;}
    .mtf-sig.neut{color:#f0c040;}
    .success-box{text-align:center;padding:14px;background:rgba(0,224,150,0.06);border-radius:10px;}
    .success-text{color:#00e096;font-weight:600;}
    .new-sig-btn{margin-top:8px;background:none;border:none;color:#555;font-size:12px;cursor:pointer;}
    #hPage{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#08090f;z-index:9999;padding:20px;overflow-y:auto;}
    .pair-dropdown{position:absolute;top:50px;left:0;right:0;}
    .selectors{position:relative;}
    button{cursor:pointer;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div><span class="logo-signal">SpriNg</span><span class="logo-pro">PRO</span></div>
  </div>

  <div class="selectors">
    <button class="pair-btn" id="pairBtn"><span id="pairLabel">EUR/USD</span> <span style="float:right;">▼</span></button>
    <div class="pair-dropdown" id="dd"></div>
  </div>

  <div class="card" id="card"><div class="idle">⚡ اضغط Get Signal</div></div>
  <button class="get-btn" id="getBtn">🚀 Get Signal</button>

  <div class="nav">
    <div class="nav-item" id="navProfile"><div class="nav-label">👤 Profile</div></div>
    <div class="nav-item" id="navHistory"><div class="nav-label">🕶 History</div></div>
    <div class="nav-item active"><div class="nav-label">📈 Signals</div></div>
    <div class="nav-item" id="navAI"><div class="nav-label">🧠 AI</div></div>
    <div class="nav-item" id="navSupport"><div class="nav-label">🎧 Support</div></div>
  </div>
</div>

<script>
// ===================== DATA =====================
const PAIRS = [
  "EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","USD/CHF",
  "EUR/GBP","EUR/JPY","GBP/JPY","NZD/USD","AUD/JPY","EUR/CHF",
  "GBP/CHF","EUR/AUD","GBP/AUD","AUD/CAD","AUD/NZD","NZD/JPY",
  "CAD/JPY","CHF/JPY","EUR/NZD","GBP/NZD","EUR/CAD","GBP/CAD",
  "USD/MXN","USD/SGD"
];
let currentPair = "EUR/USD";
let isLoading = false;
let tradeHistory = JSON.parse(localStorage.getItem("th") || "[]");
let lastTradeId = null;

// ===================== UI =====================
const dd = document.getElementById("dd");
PAIRS.forEach(p => {
  let d = document.createElement("div");
  d.className = "pair-item";
  d.textContent = p;
  d.onclick = () => {
    currentPair = p;
    document.getElementById("pairLabel").textContent = p;
    dd.style.display = "none";
    resetCard();
  };
  dd.appendChild(d);
});

document.getElementById("pairBtn").onclick = (e) => {
  e.stopPropagation();
  dd.style.display = dd.style.display === "block" ? "none" : "block";
};
document.addEventListener("click", () => dd.style.display = "none");

document.getElementById("getBtn").onclick = getSignal;
document.getElementById("navHistory").onclick = showHistory;
document.getElementById("navProfile").onclick = () => alert("Profile");
document.getElementById("navAI").onclick = () => alert("AI Coming Soon");
document.getElementById("navSupport").onclick = () => alert("Support");

function setCard(html) { document.getElementById("card").innerHTML = html; }
function resetCard() {
  setCard('<div class="idle">⚡ اضغط Get Signal</div>');
  document.getElementById("getBtn").className = "get-btn";
  document.getElementById("getBtn").innerHTML = "🚀 Get Signal";
  isLoading = false;
}

// ===================== INDICATORS =====================
function ema(data, p) {
  let k = 2/(p+1), e = data[0];
  for (let i=1; i<data.length; i++) e = data[i]*k + e*(1-k);
  return e;
}
function rsi(data, p=14) {
  if (data.length < p+1) return 50;
  let g=0, l=0;
  for (let i=data.length-p; i<data.length; i++) {
    let d = data[i] - data[i-1];
    if (d>0) g+=d; else l+=Math.abs(d);
  }
  return 100 - (100/(1 + (g/p)/((l/p)||0.0001)));
}
function macd(data) {
  return ema(data.slice(-26),12) - ema(data.slice(-26),26);
}
function stoch(H,L,C,p=14) {
  let hh = Math.max(...H.slice(-p));
  let ll = Math.min(...L.slice(-p));
  return ((C[C.length-1]-ll)/(hh-ll||0.0001))*100;
}

// ===================== ANALYSIS =====================
function analyze(O,H,L,C) {
  let last = C[C.length-1];
  let e20 = ema(C.slice(-20),20);
  let e50 = ema(C.slice(-50),50);
  let r = rsi(C);
  let m = macd(C);
  let k = stoch(H,L,C);

  let score = 0;
  if (last > e20 && e20 > e50) score += 2;
  else if (last < e20 && e20 < e50) score -= 2;
  else if (last > e20) score += 1;
  else score -= 1;

  if (r < 30) score += 2;
  else if (r > 70) score -= 2;
  else if (r < 45) score += 1;
  else if (r > 55) score -= 1;

  if (m > 0) score += 1;
  else score -= 1;

  if (k < 20) score += 2;
  else if (k > 80) score -= 2;
  else if (k < 40) score += 1;
  else if (k > 60) score -= 1;

  let direction = "WAIT";
  if (score >= 3) direction = "UP";
  else if (score <= -3) direction = "DOWN";
  else if (score >= 1) direction = "UP";
  else if (score <= -1) direction = "DOWN";

  let confidence = Math.min(95, 55 + Math.abs(score) * 5);
  if (direction === "WAIT") confidence = 0;

  let reasons = [];
  if (direction === "UP") {
    reasons.push("📈 السعر فوق المتوسطات");
    if (r < 40) reasons.push("📉 RSI في منطقة تشبع بيعي");
    reasons.push("✅ الزخم إيجابي");
  } else if (direction === "DOWN") {
    reasons.push("📉 السعر تحت المتوسطات");
    if (r > 60) reasons.push("📈 RSI في منطقة تشبع شرائي");
    reasons.push("❌ الزخم سلبي");
  } else {
    reasons.push("⏳ إشارات متضاربة");
    reasons.push("📊 RSI في منطقة محايدة");
    reasons.push("🔄 انتظر وضوح الاتجاه");
  }

  return {
    direction,
    confidence: Math.round(confidence),
    score,
    reasons,
    rsi: r.toFixed(1),
    macd: m.toFixed(5),
    stoch: k.toFixed(0),
    last: last.toFixed(5)
  };
}

// ===================== FETCH =====================
async function fetchData(symbol, interval) {
  let url = `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=${interval}&outputsize=100&apikey=9c77f26dc59c4df99779c269f663e68e`;
  let res = await fetch(url);
  if (!res.ok) throw new Error("Network error");
  let data = await res.json();
  if (data.status === "error" || !data.values) throw new Error(data.message || "No data");
  let vals = data.values.reverse().slice(0, -1);
  return {
    O: vals.map(v => parseFloat(v.open)),
    H: vals.map(v => parseFloat(v.high)),
    L: vals.map(v => parseFloat(v.low)),
    C: vals.map(v => parseFloat(v.close))
  };
}

function quickBias(O,H,L,C) {
  let last = C[C.length-1];
  let e20 = ema(C.slice(-20),20);
  let e50 = ema(C.slice(-50),50);
  let r = rsi(C);
  let m = macd(C);
  let score = 0;
  if (last > e20) score++; else score--;
  if (last > e50) score++; else score--;
  if (r < 45) score++; else if (r > 55) score--;
  if (m > 0) score++; else score--;
  if (score >= 2) return "UP";
  if (score <= -2) return "DOWN";
  return "NEUTRAL";
}

// ===================== GET SIGNAL =====================
async function getSignal() {
  if (isLoading) return;
  isLoading = true;
  let btn = document.getElementById("getBtn");
  btn.className = "get-btn loading";
  btn.innerHTML = "⏳ جاري التحليل...";
  dd.style.display = "none";

  setCard(`<div style="text-align:center;padding:20px;"><div class="spinner"></div><div style="margin-top:10px;color:#888;">جاري تحليل 5 أطراف زمنية...</div></div>`);

  try {
    let TFS = ["5min","15min","30min","1h","4h"];
    let labels = {"5min":"5م","15min":"15م","30min":"30م","1h":"1س","4h":"4س"};
    let mainData = await fetchData(currentPair, "5min");
    let results = [mainData];
    
    for (let i = 1; i < TFS.length; i++) {
      try {
        await new Promise(r => setTimeout(r, 400));
        let d = await fetchData(currentPair, TFS[i]);
        results.push(d);
      } catch(e) { results.push(null); }
    }

    let sig = analyze(mainData.O, mainData.H, mainData.L, mainData.C);

    let mtfData = [];
    let up=0, down=0;
    TFS.forEach((t,i) => {
      if (results[i]) {
        let b = quickBias(results[i].O, results[i].H, results[i].L, results[i].C);
        mtfData.push({tf: labels[t], bias: b, active: t === "5min"});
        if (b === "UP") up++;
        else if (b === "DOWN") down++;
      }
    });
    let mtfAlign = Math.max(up, down);
    let mtfDir = up > down ? "UP" : down > up ? "DOWN" : "NEUTRAL";

    if (mtfDir !== "NEUTRAL" && mtfDir !== sig.direction && sig.direction !== "WAIT") {
      sig.direction = "WAIT";
      sig.confidence = 0;
      sig.reasons = ["❌ تعارض مع الأطراف الزمنية", "⏳ انتظر وضوح الاتجاه"];
    }

    if (mtfDir === sig.direction && sig.direction !== "WAIT") {
      sig.confidence = Math.min(96, sig.confidence + mtfAlign * 2);
    }

    let duration = sig.direction === "WAIT" ? "---" : 
                   mtfAlign >= 3 ? "1-4 ساعات" : 
                   mtfAlign >= 2 ? "15-30 دقيقة" : "5-10 دقائق";

    let go = sig.direction !== "WAIT" && sig.confidence >= 75;

    let mtfHTML = mtfData.map(d => `
      <div class="mtf-row">
        <span class="mtf-tf">${d.tf}</span>
        <span class="mtf-sig ${d.bias.toLowerCase()}">${d.bias}</span>
      </div>
    `).join("");

    let reasonsHTML = sig.reasons.map((r,i) => `
      <div style="display:flex;gap:8px;margin:4px 0;">
        <span style="color:#666;">${i+1}.</span>
        <span style="color:#aaa;">${r}</span>
      </div>
    `).join("");

    setCard(`
      <div>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <div><span class="ilbl">الثقة</span><div class="ival" style="color:#7c83ff;">${sig.confidence}%</div></div>
          <div><span class="ilbl">RSI</span><div class="ival">${sig.rsi}</div></div>
          <div><span class="ilbl">MACD</span><div class="ival">${sig.macd}</div></div>
        </div>
        
        <div class="dir-box ${sig.direction.toLowerCase()}">
          <div class="dir-lbl ${sig.direction.toLowerCase()}">${sig.direction}</div>
          <div style="font-size:12px;color:#888;">⏱️ ${duration}</div>
        </div>

        <div class="ibox">
          <div class="ilbl">📊 الأطراف الزمنية (${mtfAlign}/5 متفقين)</div>
          ${mtfHTML}
        </div>

        <div class="ibox">
          <div class="ilbl">📋 الأسباب</div>
          ${reasonsHTML}
        </div>

        <div style="margin:10px 0;padding:12px;border-radius:10px;border:2px solid ${go ? '#00e096' : '#1e2235'};">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:900;font-size:20px;color:${go ? '#00e096' : '#555'};">${go ? '✅ GO' : '⏳ WAIT'}</span>
            <span style="color:#888;font-size:12px;">${go ? 'يمكنك الدخول' : 'انتظر إشارة أقوى'}</span>
          </div>
        </div>

        <div class="actions">
          <button class="btn-take ${sig.direction.toLowerCase()}" onclick="takeTrade()">✅ Take</button>
          <button class="btn-skip" onclick="skipTrade()">❌ Skip</button>
        </div>
      </div>
    `);

    window._currentSig = sig;
    window._currentPair = currentPair;

  } catch(e) {
    setCard(`<div class="err-box">❌ ${e.message}</div>`);
  }

  btn.className = "get-btn";
  btn.innerHTML = "🚀 Get Signal";
  isLoading = false;
}

// ===================== TRADING =====================
function saveTrade(dir, duration, pair) {
  let t = {id: Date.now(), time: new Date().toLocaleTimeString(), date: new Date().toLocaleDateString(), pair, dir, duration, result: null};
  tradeHistory.unshift(t);
  if (tradeHistory.length > 100) tradeHistory = tradeHistory.slice(0,100);
  localStorage.setItem("th", JSON.stringify(tradeHistory));
  return t.id;
}

function setResult(id, result) {
  tradeHistory = tradeHistory.map(t => { if(t.id === id) t.result = result; return t; });
  localStorage.setItem("th", JSON.stringify(tradeHistory));
  document.querySelector(".success-box").innerHTML = `
    <div style="font-size:14px;font-weight:700;color:${result === 'WIN' ? '#00e096' : '#ff4d6d'};">${result === 'WIN' ? '✅' : '❌'} تم التسجيل!</div>
    <button class="new-sig-btn" onclick="resetCard()">🔄 إشارة جديدة</button>
  `;
}

function takeTrade() {
  let duration = window._currentSig?.confidence >= 85 ? "1-4 ساعات" : 
                 window._currentSig?.confidence >= 70 ? "15-30 دقيقة" : "5-10 دقائق";
  if (window._currentSig) {
    lastTradeId = saveTrade(window._currentSig.direction, duration, window._currentPair);
  }
  let a = document.querySelector(".actions");
  if (a) a.outerHTML = `
    <div class="success-box">
      <div class="success-text">✅ تم أخذ الصفقة!</div>
      <div style="font-size:12px;color:#888;margin:4px 0;">⏱️ ${duration}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
        <button onclick="setResult(${lastTradeId},'WIN')" style="padding:8px;background:rgba(0,224,150,0.15);border:1px solid #00e096;border-radius:6px;color:#00e096;font-weight:700;cursor:pointer;">✅ WIN</button>
        <button onclick="setResult(${lastTradeId},'LOSS')" style="padding:8px;background:rgba(255,77,109,0.15);border:1px solid #ff4d6d;border-radius:6px;color:#ff4d6d;font-weight:700;cursor:pointer;">❌ LOSS</button>
      </div>
    </div>
  `;
}

function skipTrade(){ resetCard(); }

function showHistory() {
  let wins = tradeHistory.filter(t => t.result === "WIN").length;
  let losses = tradeHistory.filter(t => t.result === "LOSS").length;
  let rate = (wins+losses) > 0 ? Math.round(wins/(wins+losses)*100) : 0;
  let list = tradeHistory.length === 0 ? "<div style='color:#444;text-align:center;padding:20px;'>لا توجد صفقات</div>" :
    tradeHistory.slice(0,30).map(t => `
      <div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #0a0c14;">
        <div><span style="color:#aaa;">${t.pair}</span> <span style="color:${t.dir === 'UP' ? '#00e096' : '#ff4d6d'};">${t.dir}</span></div>
        <div><span style="color:#666;">${t.time}</span> <span style="color:${t.result === 'WIN' ? '#00e096' : t.result === 'LOSS' ? '#ff4d6d' : '#888'};">${t.result || '⏳'}</span></div>
      </div>
    `).join("");

  document.getElementById("hPage").innerHTML = `
    <div style="display:flex;justify-content:space-between;padding:20px 0;">
      <span style="font-size:18px;font-weight:800;">📊 History</span>
      <button onclick="document.getElementById('hPage').style.display='none'" style="background:#10121e;border:1px solid #1e2235;border-radius:8px;padding:6px 14px;color:#7c83ff;cursor:pointer;">رجوع</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;">
      <div style="background:#10121e;border-radius:8px;padding:8px;text-align:center;"><div style="font-size:20px;font-weight:800;color:#7c83ff;">${tradeHistory.length}</div><div style="font-size:9px;color:#666;">الإجمالي</div></div>
      <div style="background:#10121e;border-radius:8px;padding:8px;text-align:center;"><div style="font-size:20px;font-weight:800;color:#00e096;">${wins}</div><div style="font-size:9px;color:#666;">ربح</div></div>
      <div style="background:#10121e;border-radius:8px;padding:8px;text-align:center;"><div style="font-size:20px;font-weight:800;color:#ff4d6d;">${losses}</div><div style="font-size:9px;color:#666;">خسارة</div></div>
    </div>
    <div style="background:#10121e;border-radius:8px;padding:8px;text-align:center;margin-bottom:16px;">
      <div style="font-size:16px;font-weight:800;color:${rate >= 65 ? '#00e096' : '#f0c040'};">${rate}%</div>
      <div style="font-size:9px;color:#666;">نسبة النجاح</div>
    </div>
    ${list}
    <button onclick="if(confirm('مسح الكل؟')){localStorage.removeItem('th');tradeHistory=[];showHistory();}" style="width:100%;margin-top:12px;padding:8px;background:transparent;border:1px solid #1e2235;border-radius:8px;color:#444;cursor:pointer;">🗑 مسح الكل</button>
  `;
  document.getElementById("hPage").style.display = "block";
}

// History page
let hPage = document.createElement("div");
hPage.id = "hPage";
hPage.style.display = "none";
document.body.appendChild(hPage);
</script>
</body>
</html>
