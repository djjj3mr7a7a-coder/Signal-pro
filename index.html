// ============================================================
// INDICATORS
// ============================================================
function calcEma(d, p) {
  const k = 2/(p+1); let e = d[0];
  for (let i=1;i<d.length;i++) e = d[i]*k + e*(1-k);
  return e;
}
function calcRsi(d, p=14) {
  if (d.length<p+1) return 50;
  let g=0,l=0;
  for (let i=d.length-p;i<d.length;i++) { const x=d[i]-d[i-1]; x>0?g+=x:l+=Math.abs(x); }
  return 100 - 100/(1+(g/p)/((l/p)||0.0001));
}
function calcMacd(d) { return calcEma(d.slice(-26),12)-calcEma(d.slice(-26),26); }
function calcStoch(H,L,C,p=14) {
  const hh=Math.max(...H.slice(-p)), ll=Math.min(...L.slice(-p));
  return ((C[C.length-1]-ll)/((hh-ll)||0.0001))*100;
}
function calcAtr(H,L,C,p=14) {
  const tr=[];
  for (let i=1;i<C.length;i++) tr.push(Math.max(H[i]-L[i],Math.abs(H[i]-C[i-1]),Math.abs(L[i]-C[i-1])));
  return tr.slice(-p).reduce((a,b)=>a+b,0)/p;
}

function marketStr(C) {
  let u=0,d=0;
  for (let i=3;i<Math.min(C.length,25);i++) {
    if(C[i]>C[i-1]&&C[i-1]>C[i-2]&&C[i-2]>C[i-3])u++;
    if(C[i]<C[i-1]&&C[i-1]<C[i-2]&&C[i-2]<C[i-3])d++;
  }
  if(u>d+1) return {trend:"UPTREND",score:2};
  if(d>u+1) return {trend:"DOWNTREND",score:-2};
  return {trend:"SIDEWAYS",score:0};
}

function candleP(O,H,L,C) {
  const n=C.length-1,o=O[n],h=H[n],l=L[n],c=C[n];
  const body=Math.abs(c-o),range=h-l,bull=c>o;
  const up=h-Math.max(o,c),dn=Math.min(o,c)-l;
  const p=[]; let s=0;
  if(body<range*0.1){p.push("Doji");}
  if(dn>body*2.5&&up<body*0.5){p.push(bull?"Hammer":"Hanging Man");s+=bull?2:-1;}
  if(up>body*2.5&&dn<body*0.5){p.push(bull?"Shooting Star":"Inv Hammer");s+=bull?-2:1;}
  if(body>range*0.75){p.push(bull?"Marubozu Bull":"Marubozu Bear");s+=bull?2:-2;}
  if(n>0){
    const po=O[n-1],pc=C[n-1];
    if(pc<po&&c>o&&c>po&&o<pc){p.push("Bullish Engulfing");s+=3;}
    if(pc>po&&c<o&&c<po&&o>pc){p.push("Bearish Engulfing");s-=3;}
    if(n>1){
      const ppc=C[n-2],ppo=O[n-2];
      if(ppc<ppo&&Math.abs(pc-po)<Math.abs(ppc-ppo)*0.3&&c>o&&c>(ppo+ppc)/2){p.push("Morning Star");s+=4;}
      if(ppc>ppo&&Math.abs(pc-po)<Math.abs(ppc-ppo)*0.3&&c<o&&c<(ppo+ppc)/2){p.push("Evening Star");s-=4;}
    }
  }
  return {patterns:p,score:s};
}

function rejZones(H,L,C) {
  const n=C.length,levels=[],tol=0.0003;
  for(let i=5;i<n-5;i++){
    if(H[i]>H[i-1]&&H[i]>H[i-2]&&H[i]>H[i+1]&&H[i]>H[i+2])levels.push({price:H[i],type:"R"});
    if(L[i]<L[i-1]&&L[i]<L[i-2]&&L[i]<L[i+1]&&L[i]<L[i+2])levels.push({price:L[i],type:"S"});
  }
  const cl=[];
  levels.forEach(lv=>{
    let found=false;
    cl.forEach(c=>{if(Math.abs(c.price-lv.price)/lv.price<tol){c.touches++;lv.type==="R"?c.ru++:c.rd++;found=true;}});
    if(!found)cl.push({price:lv.price,touches:1,ru:lv.type==="R"?1:0,rd:lv.type==="S"?1:0});
  });
  const strong=cl.filter(c=>c.touches>=3).sort((a,b)=>b.touches-a.touches);
  const last=C[n-1]; let nz=null,nt="",ns=0;
  strong.forEach(z=>{
    const d=Math.abs(last-z.price)/z.price*100;
    if(d<0.05&&(!nz||d<Math.abs(last-nz.price)/last*100)){nz=z;nt=z.rd>z.ru?"RESISTANCE":"SUPPORT";ns=Math.min(100,z.touches*20);}
  });
  const atZone=!!nz,score=atZone?(nt==="SUPPORT"?2:-2):0;
  return {nearZone:nz,nearType:nt,nearStrength:ns,atZone,score,label:atZone?`${nt} zone (${nz.touches}x) at ${nz.price.toFixed(5)}`:"No rejection zone nearby"};
}

function volProfile(H,L,C,V) {
  const n=C.length,minP=Math.min(...L),maxP=Math.max(...H),range=maxP-minP,buckets=20;
  const prof=Array.from({length:buckets},(_,b)=>({mid:minP+(b+0.5)*range/buckets,vol:0}));
  for(let i=0;i<n;i++){
    const v=V&&V[i]?V[i]:1;
    for(let b=0;b<buckets;b++)if(L[i]<=minP+(b+1)*range/buckets&&H[i]>=minP+b*range/buckets)prof[b].vol+=v;
  }
  const poc=prof.reduce((a,b)=>b.vol>a.vol?b:a);
  const avg=prof.reduce((a,b)=>a+b.vol,0)/buckets;
  const last=C[n-1];
  const atHVN=prof.some(z=>z.vol>avg*1.5&&Math.abs(last-z.mid)/last<0.0008);
  const atLVN=prof.some(z=>z.vol<avg*0.4&&z.vol>0&&Math.abs(last-z.mid)/last<0.0008);
  const nearPOC=Math.abs(last-poc.mid)/last<0.0005;
  const label=atLVN?"EXPLOSION ZONE":atHVN?"HVN - Institutional":nearPOC?`Near POC ${poc.mid.toFixed(5)}`:`POC: ${poc.mid.toFixed(5)}`;
  return {atHVN,atLVN,nearPOC,label};
}

// ============================================================
// TREND FOLLOWING ANALYSIS (التركيز على التريند)
// ============================================================
function analyzeTrend(O,H,L,C,V) {
  const n=C.length,last=C[n-1];
  const e20=calcEma(C.slice(-20),20),e50=calcEma(C.slice(-50),50);
  const r=calcRsi(C),m=calcMacd(C),k=calcStoch(H,L,C);
  const ms=marketStr(C),cp=candleP(O,H,L,C);
  const rz=rejZones(H,L,C),vp=volProfile(H,L,C,V);

  let total=0;
  // EMA trend: قوي جداً
  if(last>e20&&e20>e50) total += 3;
  else if(last<e20&&e20<e50) total -= 3;
  else if(last>e20) total += 1;
  else total -= 1;

  // RSI: moderate
  if(r<30) total += 2;
  else if(r>70) total -= 2;
  else if(r<45) total += 1;
  else if(r>55) total -= 1;

  // MACD: confirmation
  total += m>0 ? 1 : -1;

  // Stochastic: momentum
  if(k<20) total += 2;
  else if(k>80) total -= 2;
  else if(k<40) total += 1;
  else if(k>60) total -= 1;

  // Market structure
  total += ms.score;

  // Rejection zones
  total += rz.score;

  // Volume profile boost
  if(vp.atLVN) total += (total>0 ? 2 : -2);

  // ===== TREND FOLLOWING DECISION =====
  let direction = "WAIT";
  let confidence = 0;
  let strength = 0;

  // التريند واضح
  if (total >= 4) {
    direction = "CALL";
    confidence = 80 + Math.min(15, total * 2);
    strength = 80 + Math.min(15, total * 2);
  } else if (total <= -4) {
    direction = "PUT";
    confidence = 80 + Math.min(15, Math.abs(total) * 2);
    strength = 80 + Math.min(15, Math.abs(total) * 2);
  } else if (total >= 2) {
    direction = "CALL";
    confidence = 65 + total * 3;
    strength = 65 + total * 3;
  } else if (total <= -2) {
    direction = "PUT";
    confidence = 65 + Math.abs(total) * 3;
    strength = 65 + Math.abs(total) * 3;
  }

  // تحديد المدة حسب قوة التريند
  let duration = "5 min";
  if (Math.abs(total) >= 6) duration = "15 min";
  else if (Math.abs(total) >= 4) duration = "10 min";
  else duration = "5 min";

  // Reasons
  const reasons = [];
  if (direction !== "WAIT") {
    const isCall = direction === "CALL";
    if (last > e20) reasons.push(`📈 Price above EMA20`);
    else reasons.push(`📉 Price below EMA20`);
    if (isCall && r < 50) reasons.push(`📊 RSI ${r.toFixed(0)} - room to grow`);
    if (!isCall && r > 50) reasons.push(`📊 RSI ${r.toFixed(0)} - room to fall`);
    if (ms.score !== 0) reasons.push(`🏗️ ${ms.trend} confirmed`);
    if (cp.patterns.length > 0) reasons.push(`🕯️ ${cp.patterns[0]} pattern`);
    while (reasons.length < 3) {
      reasons.push(isCall ? "✅ Trend following: CALL" : "✅ Trend following: PUT");
    }
  } else {
    reasons.push("⏳ No clear trend");
    reasons.push("📊 Waiting for breakout");
    reasons.push("🔄 Market consolidating");
  }

  return {
    direction: direction === "CALL" ? "UP" : direction === "PUT" ? "DOWN" : "WAIT",
    dcls: direction === "CALL" ? "up" : direction === "PUT" ? "down" : "wait",
    accuracy: Math.round(confidence),
    strength: Math.round(strength),
    duration,
    total,
    rsi: r.toFixed(1),
    macd: m.toFixed(5),
    stoch: k.toFixed(0),
    e20: e20.toFixed(5),
    last: last.toFixed(5),
    ms, cp, rz, vp,
    reasons: reasons.slice(0,3)
  };
}

// ============================================================
// FETCH
// ============================================================
async function fetchTF(symbol, interval) {
  const map = {
    "5min": "5min",
    "15min": "15min",
    "30min": "30min",
    "1h": "1h",
    "4h": "4h"
  };
  const inter = map[interval] || "5min";

  const url = `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=${inter}&outputsize=100&apikey=${TWELVE_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  if (data.status === "error") {
    throw new Error(data.message || "Twelve Data error");
  }

  if (!data.values || data.values.length === 0) {
    throw new Error("No data returned from Twelve Data");
  }

  const vals = data.values.reverse().slice(0, -1);

  return {
    O: vals.map(v => parseFloat(v.open)),
    H: vals.map(v => parseFloat(v.high)),
    L: vals.map(v => parseFloat(v.low)),
    C: vals.map(v => parseFloat(v.close)),
    V: vals.map(v => parseFloat(v.volume || 0))
  };
}

function quickBias(O,H,L,C){
  const last=C[C.length-1],e20=calcEma(C.slice(-20),20),e50=calcEma(C.slice(-50),50);
  const r=calcRsi(C),m=calcMacd(C);
  let s=0;
  if(last>e20)s++;else s--;if(last>e50)s++;else s--;
  if(r<48)s++;else if(r>52)s--;if(m>0)s++;else s--;
  if(s>=1)return"UP";if(s<=-1)return"DOWN";return"NEUTRAL";
}

function loadH(){try{return JSON.parse(localStorage.getItem("sbh")||"[]");}catch{return[];}}
function saveH(h){try{localStorage.setItem("sbh",JSON.stringify(h));}catch{}}

// COLORS
// ============================================================
const C={
  bg:"#08090f",card:"#10121e",box:"#0d0f1a",border:"#1e2235",
  text:"#e0e0f0",dim:"#444",dim2:"#2a2d45",
  up:"#00e096",down:"#ff4d6d",wait:"#f0c040",accent:"#7c83ff",
  accentB:"#4fc3f7"
};

const S={
  app:{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"-apple-system,BlinkMacSystemFont,sans-serif",display:"flex",justifyContent:"center"},
  wrap:{width:"100%",maxWidth:400,padding:"0 16px 60px"},
  hdr:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"50px 0 20px"},
  row:{display:"flex",alignItems:"center",justifyContent:"space-between"},
  ibox:{background:C.box,borderRadius:10,padding:"11px 13px",marginBottom:8},
  lbl:{fontSize:10,color:C.dim,fontWeight:600,marginBottom:3,textTransform:"uppercase",letterSpacing:"0.5px"},
  g3:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8},
  g4:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:8},
};

// ============================================================
// MAIN APP
// ============================================================
function App(){
  const [pair,setPair]=useState("EUR/USD");
  const [showDD,setShowDD]=useState(false);
  const [loading,setLoading]=useState(false);
  const [sig,setSig]=useState(null);
  const [mtf,setMtf]=useState([]);
  const [verdict,setVerdict]=useState(null);
  const [err,setErr]=useState("");
  const [page,setPage]=useState("signals");
  const [history,setHistory]=useState(loadH);
  const [lastId,setLastId]=useState(null);
  const [taken,setTaken]=useState(false);
  const [autoRefresh,setAutoRefresh] = useState(true);
  const [scanResults,setScanResults] = useState([]);
  const intervalRef = useRef(null);

  const dc=sig?.direction==="UP"?C.up:sig?.direction==="DOWN"?C.down:C.wait;

  // ============================================================
  // AUTO-SCAN كل 3 دقائق
  // ============================================================
  useEffect(() => {
    if (autoRefresh) {
      intervalRef.current = setInterval(() => {
        scanAllPairs();
      }, 3 * 60 * 1000);
    } else {
      if (intervalRef.current) {
        clearInterval(intervalRef.current);
        intervalRef.current = null;
      }
    }
    return () => {
      if (intervalRef.current) {
        clearInterval(intervalRef.current);
        intervalRef.current = null;
      }
    };
  }, [autoRefresh]);

  // ============================================================
  // SCAN ALL PAIRS
  // ============================================================
  const scanAllPairs = useCallback(async() => {
    const results = [];
    for (const p of PAIRS) {
      try {
        const data = await fetchTF(p, "5min");
        const result = analyzeTrend(data.O, data.H, data.L, data.C, data.V);
        if (result.direction !== "WAIT" && result.accuracy >= 65) {
          results.push({
            pair: p,
            direction: result.direction,
            accuracy: result.accuracy,
            duration: result.duration,
            reasons: result.reasons
          });
        }
      } catch(e) {}
    }
    setScanResults(results);
    if (results.length > 0) {
      const best = results.sort((a,b) => b.accuracy - a.accuracy)[0];
      setPair(best.pair);
    }
  }, []);

  // ============================================================
  // GET SIGNAL
  // ============================================================
  const getSignal = useCallback(async()=>{
    setLoading(true);setSig(null);setErr("");setMtf([]);setVerdict(null);setTaken(false);
    try{
      const tfs = [
        ["5min","5M"],
        ["15min","15M"],
        ["30min","30M"],
        ["1h","1H"],
        ["4h","4H"]
      ];
      
      const main=await fetchTF(pair,"5min");
      const mtfArr=[];let up=0,dn=0;
      for(const [tf,lbl] of tfs){
        try{
          if(tf!=="5min")await new Promise(r=>setTimeout(r,300));
          const d=tf==="5min"?main:await fetchTF(pair,tf);
          const b=quickBias(d.O,d.H,d.L,d.C);
          mtfArr.push({lbl,bias:b,active:tf==="5min"});
          if(b==="UP")up++;else if(b==="DOWN")dn++;
        }catch{mtfArr.push({lbl,bias:"N/A",active:tf==="5min"});}
      }
      setMtf(mtfArr);
      const align=Math.max(up,dn);
      
      const result = analyzeTrend(main.O, main.H, main.L, main.C, main.V);
      
      const isGo = result.direction !== "WAIT" && result.accuracy >= 65;
      setVerdict({label:isGo?"GO":"AVOID",dir:result.direction,time:result.duration,color:result.direction==="UP"?C.up:C.down});
      setSig(result);
    }catch(e){setErr(e.message||"Error");}
    setLoading(false);
  },[pair]);

  const takeTrade=()=>{
    if(!sig)return;
    const id=Date.now();
    const durationMs={"5 min":5*60*1000,"10 min":10*60*1000,"15 min":15*60*1000}[sig.duration]||5*60*1000;
    const t={id,pair,dir:sig.direction,dur:sig.duration,time:new Date().toLocaleTimeString(),date:new Date().toLocaleDateString(),result:null,accuracy:sig.accuracy,entryPrice:parseFloat(sig.last),expiryTime:Date.now()+durationMs};
    const h=[t,...history].slice(0,100);
    setHistory(h);saveH(h);setLastId(id);setTaken(true);
    const durationMs2={"5 min":5*60*1000,"10 min":10*60*1000,"15 min":15*60*1000}[sig.duration]||5*60*1000;
    const entryP=parseFloat(sig.last);
    const tradeDir=sig.direction;
    const tradePair=pair;
    setTimeout(async()=>{
      try{
        const data=await fetchTF(tradePair,"5min");
        const exitPrice=data.C[data.C.length-1];
        const autoResult=tradeDir==="UP"?(exitPrice>entryP?"WIN":"LOSS"):(exitPrice<entryP?"WIN":"LOSS");
        setHistory(prev=>{
          const updated=prev.map(tr=>tr.id===id&&tr.result===null?{...tr,result:autoResult,exitPrice,auto:true}:tr);
          saveH(updated);
          return updated;
        });
        setTaken(false);setSig(null);
      }catch(e){console.log("Auto-track failed:",e);}
    },durationMs2);
  };

  const markResult=(result)=>{
    const h=history.map(t=>t.id===lastId?{...t,result}:t);
    setHistory(h);saveH(h);setTaken(false);setSig(null);
  };

  const markFromHistory=(id,result)=>{
    const h=history.map(t=>t.id===id?{...t,result}:t);
    setHistory(h);saveH(h);
  };

  const done=history.filter(t=>t.result);
  const wins=done.filter(t=>t.result==="WIN").length;
  const losses=done.filter(t=>t.result==="LOSS").length;
  const rate=done.length>0?Math.round(wins/done.length*100):0;

  if(page==="history") return(
    <div style={S.app}>
      <div style={S.wrap}>
        <div style={{...S.hdr}}>
          <div style={{fontSize:18,fontWeight:800,color:C.text}}>📊 Trade History</div>
          <button onClick={()=>setPage("signals")} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",color:C.accent,fontSize:13,fontWeight:600,cursor:"pointer"}}>← Back</button>
        </div>
        <div style={{...S.g4,marginBottom:16}}>
          {[{n:history.length,l:"TOTAL",c:C.accent},{n:wins,l:"WINS",c:C.up},{n:losses,l:"LOSSES",c:C.down},{n:`${rate}%`,l:"WIN RATE",c:rate>=65?C.up:rate>=50?C.wait:C.down}].map(x=>(
            <div key={x.l} style={{background:C.card,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:800,color:x.c}}>{x.n}</div>
              <div style={{fontSize:9,color:C.dim,marginTop:2}}>{x.l}</div>
            </div>
          ))}
        </div>
        {history.length===0?<div style={{textAlign:"center",color:C.dim2,padding:"40px 0",fontSize:13}}>No trades yet.<br/>Trend Following Mode active.</div>:
          history.slice(0,30).map(t=>(
            <div key={t.id} style={{background:C.card,borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.text}}>{t.pair}</div>
                <div style={{fontSize:10,color:C.dim}}>{t.date} {t.time} | {t.dir} | {t.accuracy}% | ⏱️ {t.dur}</div>
              </div>
              {t.result===null?(
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>markFromHistory(t.id,"WIN")} style={{padding:"4px 8px",background:"rgba(0,224,150,0.15)",border:`1px solid ${C.up}`,borderRadius:6,color:C.up,fontSize:11,fontWeight:700,cursor:"pointer"}}>WIN</button>
                  <button onClick={()=>markFromHistory(t.id,"LOSS")} style={{padding:"4px 8px",background:"rgba(255,77,109,0.15)",border:`1px solid ${C.down}`,borderRadius:6,color:C.down,fontSize:11,fontWeight:700,cursor:"pointer"}}>LOSS</button>
                </div>
              ):(
                <span style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:700,color:t.result==="WIN"?C.up:C.down,background:t.result==="WIN"?"rgba(0,224,150,0.15)":"rgba(255,77,109,0.15)"}}>{t.result}</span>
              )}
            </div>
          ))
        }
        {history.length>0&&<button onClick={()=>{if(window.confirm("Clear all trade history?")){const h=[];setHistory(h);saveH(h);}}} style={{width:"100%",marginTop:12,padding:10,background:"transparent",border:`1px solid ${C.border}`,borderRadius:8,color:C.dim,fontSize:11,cursor:"pointer"}}>🗑 Clear All History</button>}
      </div>
    </div>
  );

  return(
    <div style={S.app}>
      <style>{`
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulseG{0%,100%{box-shadow:0 0 0 0 rgba(0,224,150,0.3)}50%{box-shadow:0 0 0 8px rgba(0,224,150,0)}}
        @keyframes pulseR{0%,100%{box-shadow:0 0 0 0 rgba(255,77,109,0.3)}50%{box-shadow:0 0 0 8px rgba(255,77,109,0)}}
        *{box-sizing:border-box;-webkit-tap-highlight-color:rgba(0,0,0,0);}
      `}</style>
      <div style={S.wrap}>

        {/* Header */}
        <div style={S.hdr}>
          <div>
            <span style={{fontSize:22,fontWeight:800,background:`linear-gradient(135deg,${C.accentB},${C.accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Trend Bot</span>
            <span style={{fontSize:11,fontWeight:700,color:C.up,background:"rgba(0,224,150,0.12)",padding:"2px 7px",borderRadius:5,marginLeft:6}}>FOLLOW</span>
          </div>
          <div style={{fontSize:9,color:autoRefresh?C.up:C.dim}}>{autoRefresh ? "⚡ Auto ON" : "⏸️"}</div>
        </div>

        {/* Auto-Refresh Toggle */}
        <div style={{...S.ibox, marginBottom:8, display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <span style={S.lbl}>🔄 Auto-Scan (3 min)</span>
          <button
            onClick={() => setAutoRefresh(!autoRefresh)}
            style={{
              padding:"4px 12px",
              borderRadius:20,
              border:"none",
              background: autoRefresh ? C.up : C.dim,
              color:"#fff",
              fontWeight:700,
              fontSize:11,
              cursor:"pointer",
              transition:"0.3s"
            }}
          >
            {autoRefresh ? "ON" : "OFF"}
          </button>
        </div>

        {/* Scan Results */}
        {scanResults.length > 0 && (
          <div style={{...S.ibox, marginBottom:8, border:`1px solid ${C.accent}44`}}>
            <div style={S.lbl}>📊 Signals Found ({scanResults.length})</div>
            {scanResults.slice(0,5).map((r,i) => (
              <div key={i} style={{display:"flex", justifyContent:"space-between", padding:"4px 0", borderBottom:"1px solid #0a0c14"}}>
                <span style={{fontSize:12,color:C.text}}>{r.pair}</span>
                <span style={{fontSize:12,fontWeight:700,color:r.direction==="UP"?C.up:r.direction==="DOWN"?C.down:C.wait}}>
                  {r.direction} {r.accuracy}% ⏱️{r.duration}
                </span>
              </div>
            ))}
          </div>
        )}

        {/* Card */}
        <div style={{background:C.card,border:`1px solid #1a1c2e`,borderRadius:16,padding:18,marginBottom:12,minHeight:100}}>
          {!sig&&!loading&&!err&&<div style={{textAlign:"center",color:C.dim2,fontSize:14,padding:"20px 0"}}>⏳ Scanning for trend following opportunities</div>}
          {loading&&<div style={{textAlign:"center",padding:"20px 0"}}><div style={{width:36,height:36,border:`3px solid ${C.border}`,borderTop:`3px solid ${C.accent}`,borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 10px"}}/><div style={{color:C.dim,fontSize:12}}>Analyzing trend...</div></div>}
          {err&&<div style={{textAlign:"center",color:C.down,fontSize:13,padding:"20px 0"}}>❌ {err}</div>}

          {sig&&!loading&&(
            <div style={{animation:"fadeUp 0.4s ease"}}>

              <div style={{...S.ibox,...S.row,marginBottom:8}}>
                <div>
                  <div style={S.lbl}>Confidence</div>
                  <div style={{fontSize:22,fontWeight:800,color:C.accent}}>{sig.direction==="WAIT"?"---":`${sig.accuracy}%`}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={S.lbl}>Trend</div>
                  <div style={{fontSize:13,fontWeight:700,color:dc}}>{sig.ms.trend}</div>
                </div>
              </div>

              <div style={S.g3}>
                {[{l:"RSI",v:sig.rsi,c:sig.rsi<40?C.up:sig.rsi>60?C.down:C.wait},{l:"Stoch",v:sig.stoch,c:sig.stoch<30?C.up:sig.stoch>70?C.down:C.wait},{l:"MACD",v:(parseFloat(sig.macd)>0?"+":"")+parseFloat(sig.macd).toFixed(4),c:parseFloat(sig.macd)>0?C.up:C.down}].map(x=>(
                  <div key={x.l} style={{...S.ibox,marginBottom:0,padding:"9px 10px"}}>
                    <div style={{...S.lbl,fontSize:9}}>{x.l}</div>
                    <div style={{fontSize:13,fontWeight:700,color:x.c}}>{x.v}</div>
                  </div>
                ))}
              </div>

              <div style={{...S.ibox,marginBottom:8}}>
                <div style={{...S.row,marginBottom:5}}>
                  <span style={S.lbl}>Signal Strength</span>
                  <span style={{fontSize:10,color:C.dim}}>{sig.direction==="WAIT"?"WAIT":`${sig.strength}%`}</span>
                </div>
                <div style={{height:5,background:"#1a1c2e",borderRadius:100,overflow:"hidden"}}>
                  <div style={{width:`${sig.direction==="WAIT"?0:sig.strength}%`,height:"100%",background:sig.dcls==="up"?`linear-gradient(90deg,${C.accentB},${C.up})`:`linear-gradient(90deg,${C.down},#ff8c00)`,borderRadius:100,transition:"width 0.8s"}}/>
                </div>
                <div style={{...S.row,marginTop:3}}>
                  <span style={{fontSize:9,color:"#333"}}>Weak</span>
                  <span style={{fontSize:9,color:C.dim}}>Score: {sig.total}</span>
                  <span style={{fontSize:9,color:"#333"}}>Strong</span>
                </div>
              </div>

              <div style={{...S.ibox,marginBottom:8}}>
                <div style={{fontSize:10,color:C.dim,marginBottom:4}}>📈 Trend Following</div>
                <div>{sig.cp.patterns.length>0?sig.cp.patterns.map(p=><span key={p} style={{background:"#1a1c2e",borderRadius:5,padding:"2px 7px",fontSize:10,color:C.accent,marginRight:3}}>{p}</span>):<span style={{fontSize:10,color:C.dim2}}>No pattern</span>}</div>
              </div>

              <div style={{borderRadius:11,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between",background:sig.dcls==="up"?"rgba(0,224,150,0.07)":sig.dcls==="down"?"rgba(255,77,109,0.07)":"rgba(240,192,64,0.07)",border:`1px solid ${sig.dcls==="up"?"rgba(0,224,150,0.2)":sig.dcls==="down"?"rgba(255,77,109,0.2)":"rgba(240,192,64,0.2)"}`}}>
                <div>
                  <div style={S.lbl}>Signal</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:24}}>{sig.direction==="UP"?"📈":sig.direction==="DOWN"?"📉":"⏳"}</span>
                    <span style={{fontSize:26,fontWeight:900,color:dc}}>{sig.direction}</span>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={S.lbl}>Duration</div>
                  <div style={{fontSize:16,fontWeight:700,color:C.accent}}>{sig.duration}</div>
                </div>
              </div>

              <div style={{...S.ibox,marginBottom:12}}>
                <div style={{...S.lbl,marginBottom:8}}>📋 Top 3 Reasons</div>
                {sig.reasons.map((r,i)=>(
                  <div key={i} style={{display:"flex",gap:8,marginBottom:7,alignItems:"flex-start"}}>
                    <div style={{width:18,height:18,borderRadius:"50%",background:`${dc}22`,color:dc,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
                    <div style={{fontSize:12,color:"#a0a8c8",lineHeight:1.5}}>{r}</div>
                  </div>
                ))}
              </div>

              {verdict&&(
                <div style={{borderRadius:12,border:`2px solid ${verdict.label==="GO"?verdict.color:C.border}`,marginBottom:12}}>
                  <div style={{background:verdict.label==="GO"?`${verdict.color}18`:C.box,padding:14,display:"flex",alignItems:"center",justifyContent:"space-between",borderRadius:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:40,height:40,borderRadius:"50%",background:verdict.label==="GO"?verdict.color:C.card,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{verdict.label==="GO"?"✅":"🚫"}</div>
                      <div>
                        <div style={{fontSize:22,fontWeight:900,letterSpacing:2,color:verdict.label==="GO"?verdict.color:"#333"}}>{verdict.label}</div>
                        <div style={{fontSize:10,color:C.dim}}>{verdict.label==="GO"?"Trend Following Signal":"Weak trend"}</div>
                      </div>
                    </div>
                    {verdict.label==="GO"&&<div style={{textAlign:"right"}}>
                      <div style={{fontSize:18,fontWeight:800,color:verdict.color}}>{verdict.dir}</div>
                      <div style={{fontSize:12,color:"#666"}}>{verdict.time}</div>
                    </div>}
                  </div>
                </div>
              )}

              {!taken && verdict?.label==="GO" ? (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <button onClick={takeTrade} style={{padding:13,border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",background:sig.direction==="UP"?C.up:C.down,animation:sig.direction==="UP"?"pulseG 2s infinite":"pulseR 2s infinite"}}>✅ Take</button>
                  <button onClick={getSignal} style={{padding:13,background:"transparent",border:`1px solid ${C.border}`,borderRadius:10,color:C.dim,fontWeight:700,fontSize:14,cursor:"pointer"}}>🔄 Refresh</button>
                </div>
              ) : !taken ? (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <button style={{padding:13,border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14,background:"#1e2235",cursor:"not-allowed",opacity:0.5}}>⏳ WAIT</button>
                  <button onClick={getSignal} style={{padding:13,background:"transparent",border:`1px solid ${C.border}`,borderRadius:10,color:C.dim,fontWeight:700,fontSize:14,cursor:"pointer"}}>🔄 Refresh</button>
                </div>
              ) : (
                <div style={{background:"rgba(0,224,150,0.06)",border:"1px solid rgba(0,224,150,0.18)",borderRadius:10,padding:14,textAlign:"center"}}>
                  <div style={{fontSize:13,color:C.up,fontWeight:600,marginBottom:10}}>💎 Mark result:</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <button onClick={()=>markResult("WIN")} style={{padding:10,background:"rgba(0,224,150,0.15)",border:`1px solid ${C.up}60`,borderRadius:8,color:C.up,fontWeight:700,fontSize:13,cursor:"pointer"}}>✅ WIN</button>
                    <button onClick={()=>markResult("LOSS")} style={{padding:10,background:"rgba(255,77,109,0.15)",border:`1px solid ${C.down}60`,borderRadius:8,color:C.down,fontWeight:700,fontSize:13,cursor:"pointer"}}>❌ LOSS</button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {!loading&&!sig&&(
          <button onClick={getSignal} style={{width:"100%",padding:15,background:`linear-gradient(135deg,${C.accentB},${C.accent})`,border:"none",borderRadius:12,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",boxShadow:`0 4px 24px ${C.accent}44`}}>
            🚀 Get Signal
          </button>
        )}

        <div style={{display:"flex",justifyContent:"space-around",marginTop:24,borderTop:`1px solid ${C.card}`,paddingTop:14}}>
          {[{ic:"👤",lb:"Profile"},{ic:"📊",lb:"History",action:()=>setPage("history")},{ic:"📈",lb:"Signals"},{ic:"🧠",lb:"AI"},{ic:"🎧",lb:"Support"}].map((x,i)=>(
            <div key={x.lb} onClick={x.action} style={{textAlign:"center",cursor:x.action?"pointer":"default",opacity:x.lb==="Signals"||x.lb==="History"?1:0.25}}>
              <div style={{fontSize:17,marginBottom:2}}>{x.ic}</div>
              <div style={{fontSize:9,color:x.lb==="Signals"?C.accent:"#333",fontWeight:x.lb==="Signals"?700:400}}>{x.lb}</div>
            </div>
          ))}
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
