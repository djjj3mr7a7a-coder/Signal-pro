<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OTC Signal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b12;
  --card:#0f1520;
  --card2:#141c2a;
  --bd:#1e2d45;
  --tx:#dde4f0;
  --dim:#4a5a78;
  --buy:#00e676;
  --buyg:rgba(0,230,118,.08);
  --buybr:rgba(0,230,118,.25);
  --sel:#ff4d6d;
  --selg:rgba(255,77,109,.08);
  --selbr:rgba(255,77,109,.25);
  --wait:#f59e0b;
  --ac:#3d7eff;
  --fn:'Segoe UI',system-ui,sans-serif;
  --mo:'SF Mono','Fira Code',monospace;
}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1.5rem 1rem 3rem}

/* Header */
.logo{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:2rem;text-align:center}

/* Input card */
.input-card{width:100%;max-width:420px;background:var(--card);border:.5px solid var(--bd);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
.input-label{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:.75rem}
.ohlc-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:.75rem}
.ohlc-field{background:var(--card2);border:.5px solid var(--bd);border-radius:8px;padding:.5rem .6rem;transition:border-color .15s}
.ohlc-field:focus-within{border-color:var(--ac)}
.ohlc-field label{display:block;font-size:9px;color:var(--dim);margin-bottom:3px;font-weight:600}
.ohlc-field input{width:100%;background:transparent;border:none;color:var(--tx);font-size:13px;font-family:var(--mo);outline:none}
.tf-row{display:flex;gap:6px}
.tf-btn{flex:1;padding:7px 0;background:var(--card2);border:.5px solid var(--bd);border-radius:8px;color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;font-family:var(--fn)}
.tf-btn.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.tf-btn:hover:not(.active){border-color:var(--ac);color:var(--ac)}

/* Signal button */
.go-btn{width:100%;max-width:420px;padding:15px;background:var(--ac);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--fn);letter-spacing:.5px;margin-bottom:1.25rem;transition:opacity .15s}
.go-btn:hover{opacity:.88}
.go-btn:active{opacity:.75}

/* Result */
.result{display:none;width:100%;max-width:420px}

/* Big signal card */
.sig-card{border-radius:20px;padding:2rem 1.5rem;text-align:center;margin-bottom:1rem;position:relative;overflow:hidden}
.sig-card.buy{background:var(--buyg);border:1px solid var(--buybr)}
.sig-card.sell{background:var(--selg);border:1px solid var(--selbr)}
.sig-card.wait{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2)}
.sig-glow{position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:200px;height:200px;border-radius:50%;opacity:.06;pointer-events:none}
.sig-glow.buy{background:var(--buy)}
.sig-glow.sell{background:var(--sel)}
.sig-dir{font-size:48px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:.5rem}
.sig-dir.buy{color:var(--buy)}
.sig-dir.sell{color:var(--sel)}
.sig-dir.wait{color:var(--wait)}
.sig-type{font-size:13px;font-weight:600;color:var(--dim);margin-bottom:1.25rem;letter-spacing:1px;text-transform:uppercase}
.sig-dur{font-size:36px;font-weight:700;color:var(--tx);line-height:1}
.sig-dur-lbl{font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:1px;text-transform:uppercase}

/* Score bar */
.score-wrap{background:var(--card);border:.5px solid var(--bd);border-radius:12px;padding:1rem;margin-bottom:.75rem}
.score-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.score-lbl{font-size:11px;color:var(--dim)}
.score-val{font-size:13px;font-weight:700;color:var(--tx)}
.score-track{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* Mini metrics */
.mini-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:.75rem}
.mini{background:var(--card);border:.5px solid var(--bd);border-radius:10px;padding:.65rem;text-align:center}
.mini-val{font-size:16px;font-weight:700;color:var(--tx)}
.mini-val.up{color:var(--buy)}.mini-val.dn{color:var(--sel)}.mini-val.nt{color:var(--dim)}
.mini-lbl{font-size:9px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* Signals list */
.sigs-toggle{width:100%;background:transparent;border:.5px solid var(--bd);border-radius:10px;color:var(--dim);font-size:11px;padding:8px;cursor:pointer;font-family:var(--fn);margin-bottom:.75rem;transition:all .15s}
.sigs-toggle:hover{border-color:var(--ac);color:var(--ac)}
.sigs-list{display:none;background:var(--card);border:.5px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:.75rem}
.sig-row{display:flex;align-items:center;gap:10px;padding:.55rem .85rem;border-bottom:.5px solid var(--bd)}
.sig-row:last-child{border-bottom:none}
.sig-ico{font-size:12px;min-width:14px;text-align:center}
.sig-name{font-size:11px;color:var(--dim);flex:1}
.sig-badge{font-size:10px;font-weight:600;padding:1px 8px;border-radius:4px}
.sig-badge.up{background:rgba(0,230,118,.12);color:var(--buy)}
.sig-badge.dn{background:rgba(255,77,109,.12);color:var(--sel)}
.sig-badge.nt{background:var(--card2);color:var(--dim)}

/* Reset */
.reset-btn{width:100%;background:transparent;border:.5px solid var(--bd);border-radius:10px;color:var(--dim);font-size:12px;padding:9px;cursor:pointer;font-family:var(--fn)}
.reset-btn:hover{border-color:var(--bd);color:var(--tx)}

@media(max-width:400px){.sig-dir{font-size:40px}.sig-dur{font-size:30px}}
</style>
</head>
<body>

<div class="logo">OTC · Signal Engine</div>

<!-- Input -->
<div class="input-card" id="input-section">
  <div class="input-label">بيانات الشمعة</div>
  <div class="ohlc-grid">
    <div class="ohlc-field"><label>OPEN</label><input type="number" id="O" placeholder="0.00000" step="0.00001" inputmode="decimal"/></div>
    <div class="ohlc-field"><label>HIGH</label><input type="number" id="H" placeholder="0.00000" step="0.00001" inputmode="decimal"/></div>
    <div class="ohlc-field"><label>LOW</label> <input type="number" id="L" placeholder="0.00000" step="0.00001" inputmode="decimal"/></div>
    <div class="ohlc-field"><label>CLOSE</label><input type="number" id="C" placeholder="0.00000" step="0.00001" inputmode="decimal"/></div>
  </div>
  <div class="input-label" style="margin-top:.5rem">الفريم</div>
  <div class="tf-row">
    <div class="tf-btn" onclick="setTF(1,this)">M1</div>
    <div class="tf-btn active" onclick="setTF(5,this)">M5</div>
    <div class="tf-btn" onclick="setTF(15,this)">M15</div>
    <div class="tf-btn" onclick="setTF(30,this)">M30</div>
    <div class="tf-btn" onclick="setTF(60,this)">H1</div>
  </div>
</div>

<button class="go-btn" onclick="calc()">احسب الإشارة</button>

<!-- Result -->
<div class="result" id="result">

  <div class="sig-card" id="sig-card">
    <div class="sig-glow" id="sig-glow"></div>
    <div class="sig-dir" id="sig-dir"></div>
    <div class="sig-type" id="sig-type"></div>
    <div class="sig-dur" id="sig-dur"></div>
    <div class="sig-dur-lbl">مدة الصفقة</div>
  </div>

  <div class="score-wrap">
    <div class="score-label">
      <span class="score-lbl">قوة الإشارة</span>
      <span class="score-val" id="score-val"></span>
    </div>
    <div class="score-track"><div class="score-fill" id="score-fill"></div></div>
  </div>

  <div class="mini-grid">
    <div class="mini"><div class="mini-val" id="m-rsi"></div><div class="mini-lbl">RSI</div></div>
    <div class="mini"><div class="mini-val" id="m-stoch"></div><div class="mini-lbl">Stoch</div></div>
    <div class="mini"><div class="mini-val" id="m-bb"></div><div class="mini-lbl">BB</div></div>
  </div>

  <button class="sigs-toggle" onclick="toggleSigs(this)">▼ تفاصيل الإشارات</button>
  <div class="sigs-list" id="sigs-list"></div>

  <button class="reset-btn" onclick="reset()">صفقة جديدة</button>
</div>

<script>
var TF = 5;
function setTF(v, el) {
  TF = v;
  document.querySelectorAll('.tf-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
}

function fmt(m) {
  if(m < 60) return m + ' دقيقة';
  if(m === 60) return 'ساعة';
  if(m === 120) return 'ساعتين';
  if(m % 60 === 0) return (m/60) + ' ساعات';
  return m + ' دقيقة';
}

function calc() {
  var O = parseFloat(document.getElementById('O').value);
  var H = parseFloat(document.getElementById('H').value);
  var L = parseFloat(document.getElementById('L').value);
  var C = parseFloat(document.getElementById('C').value);

  if([O,H,L,C].some(isNaN) || H < L || H < O || H < C || L > O || L > C) {
    alert('تأكد من البيانات — High أعلى قيمة، Low أدنى');
    return;
  }

  var range = H - L;
  var body  = Math.abs(C - O);
  var upSh  = H - Math.max(O,C);
  var loSh  = Math.min(O,C) - L;
  var d     = C > O ? 1 : C < O ? -1 : 0;
  var bR    = range > 0 ? body/range : 0;
  var cP    = range > 0 ? (C-L)/range : 0.5;

  // Pivots
  var PP_c  = (H+L+C)/3;
  var R1_c  = 2*PP_c - L;
  var S1_c  = 2*PP_c - H;
  var PP_w  = (H+L+2*C)/4;
  var R1_w  = 2*PP_w - L;
  var S1_w  = 2*PP_w - H;
  var k=1.1, r3=C+(range*k/4), s3=C-(range*k/4);
  var r4=C+(range*k/2), s4=C-(range*k/2);

  // RSI-like from single candle
  var rsiVal = cP * 100; // position in range = RSI proxy
  var rsiDir = rsiVal < 30 ? 1 : rsiVal > 70 ? -1 : 0;

  // Stochastic
  var stoch = cP * 100;
  var stDir = stoch < 25 ? 1 : stoch > 75 ? -1 : 0;

  // Bollinger (body vs range = BB squeeze proxy)
  var bbDir = cP >= 0.8 ? 1 : cP <= 0.2 ? -1 : 0;

  // Shadow analysis
  var shadDir = 0;
  if(loSh > body*1.8 && upSh < body*0.5) shadDir = 1;
  else if(upSh > body*1.8 && loSh < body*0.5) shadDir = -1;
  else if(loSh > upSh*1.5) shadDir = 1;
  else if(upSh > loSh*1.5) shadDir = -1;

  // ATR momentum
  var atrDir = bR > 0.5 ? d : 0;

  // Classic pivot
  var cpDir = C > PP_c ? 1 : -1;
  var cpProx = C <= S1_c ? 1 : C >= R1_c ? -1 : cpDir;

  // Woodie
  var wDir = C > PP_w ? 1 : -1;
  var wProx = C <= S1_w ? 1 : C >= R1_w ? -1 : wDir;

  // Camarilla
  var camDir = C > (H+L+C)/3 ? 1 : -1;
  var camLvl = C >= r3 ? -1 : C <= s3 ? 1 : camDir;
  var camBrk = C > r4 ? 1 : C < s4 ? -1 : 0;

  // Close position
  var cpSignal = cP >= 0.75 ? 1 : cP <= 0.25 ? -1 : 0;

  // Candle direction
  var candleDir = d;

  var signals = [
    { name: 'اتجاه الشمعة',     val: candleDir, w: 1.0 },
    { name: 'قوة الجسم',        val: bR > 0.55 ? d : 0, w: 1.0 },
    { name: 'تحليل الذيول',     val: shadDir, w: 1.0 },
    { name: 'موضع الإغلاق',     val: cpSignal, w: 1.0 },
    { name: 'RSI',               val: rsiDir, w: 1.2 },
    { name: 'Stochastic',        val: stDir, w: 1.2 },
    { name: 'Bollinger',         val: bbDir, w: 1.2 },
    { name: 'ATR / زخم',        val: atrDir, w: 1.2 },
    { name: 'Classic Pivot',     val: cpDir, w: 1.8 },
    { name: 'Classic S1/R1',     val: cpProx, w: 1.8 },
    { name: 'Woodie Pivot',      val: wDir, w: 1.8 },
    { name: 'Woodie S1/R1',      val: wProx, w: 1.8 },
    { name: 'Camarilla PP',      val: camDir, w: 1.8 },
    { name: 'Camarilla H3/L3',   val: camLvl, w: 1.8 },
    { name: 'Camarilla H4/L4',   val: camBrk, w: 1.8 },
  ];

  var wBuy=0, wSell=0, wTotal=0;
  var rawBuy=0, rawSell=0;
  signals.forEach(function(s){
    if(s.val > 0){ wBuy += s.w; rawBuy++; }
    else if(s.val < 0){ wSell += s.w; rawSell++; }
    wTotal += s.w;
  });
  var score = Math.max(wBuy,wSell)/wTotal;
  var net = wBuy - wSell;
  var isBuy = net > 0;

  // Noise
  var noise = isBuy ? loSh : upSh;
  var noiseR = body > 0 ? noise/body : 0;
  var noiseEx = noiseR < 0.3 ? 0 : noiseR < 0.7 ? 1 : noiseR < 1.3 ? 2 : 3;

  // Duration
  var baseC = score >= 0.9 ? 3 : score >= 0.8 ? 2 : 1;
  var dur = Math.min((baseC + noiseEx) * TF, TF * 5);

  // ===== RENDER =====
  var card = document.getElementById('sig-card');
  var glow = document.getElementById('sig-glow');
  var dir  = document.getElementById('sig-dir');
  var type = document.getElementById('sig-type');
  var durEl= document.getElementById('sig-dur');

  if(score >= 0.6 && net > 0) {
    card.className = 'sig-card buy';
    glow.className = 'sig-glow buy';
    dir.className  = 'sig-dir buy';
    dir.textContent = '▲ CALL';
    type.textContent = 'شراء';
  } else if(score >= 0.6 && net < 0) {
    card.className = 'sig-card sell';
    glow.className = 'sig-glow sell';
    dir.className  = 'sig-dir sell';
    dir.textContent = '▼ PUT';
    type.textContent = 'بيع';
  } else {
    card.className = 'sig-card wait';
    glow.className = 'sig-glow';
    dir.className  = 'sig-dir wait';
    dir.textContent = '— انتظر';
    type.textContent = 'إشارة غير واضحة';
    dur = 0;
  }
  durEl.textContent = dur > 0 ? fmt(dur) : '—';

  // Score bar
  var pct = Math.round(score * 100);
  document.getElementById('score-val').textContent = pct + '%';
  var fill = document.getElementById('score-fill');
  fill.style.width = pct + '%';
  fill.style.background = score >= 0.8 ? '#00e676' : score >= 0.65 ? '#f59e0b' : '#ff4d6d';

  // Mini metrics
  var rsiEl   = document.getElementById('m-rsi');
  var stEl    = document.getElementById('m-stoch');
  var bbEl    = document.getElementById('m-bb');
  rsiEl.textContent   = rsiVal.toFixed(0);
  rsiEl.className     = 'mini-val ' + (rsiDir > 0 ? 'up' : rsiDir < 0 ? 'dn' : 'nt');
  stEl.textContent    = stoch.toFixed(0);
  stEl.className      = 'mini-val ' + (stDir > 0 ? 'up' : stDir < 0 ? 'dn' : 'nt');
  bbEl.textContent    = (cP*100).toFixed(0) + '%';
  bbEl.className      = 'mini-val ' + (bbDir > 0 ? 'up' : bbDir < 0 ? 'dn' : 'nt');

  // Signals list
  document.getElementById('sigs-list').innerHTML = signals.map(function(s){
    var cls = s.val > 0 ? 'up' : s.val < 0 ? 'dn' : 'nt';
    var lbl = s.val > 0 ? '▲ شراء' : s.val < 0 ? '▼ بيع' : '— محايد';
    return '<div class="sig-row"><div class="sig-ico" style="color:'+(s.val>0?'var(--buy)':s.val<0?'var(--sel)':'var(--dim)')+'">'+( s.val>0?'▲':s.val<0?'▼':'—')+'</div><div class="sig-name">'+s.name+'</div><div class="sig-badge '+cls+'">'+lbl+'</div></div>';
  }).join('');

  document.getElementById('input-section').style.display = 'none';
  document.querySelector('.go-btn').style.display = 'none';
  document.getElementById('result').style.display = 'block';
}

function toggleSigs(btn) {
  var list = document.getElementById('sigs-list');
  var open = list.style.display === 'block';
  list.style.display = open ? 'none' : 'block';
  btn.textContent = open ? '▼ تفاصيل الإشارات' : '▲ إخفاء التفاصيل';
}

function reset() {
  document.getElementById('O').value = '';
  document.getElementById('H').value = '';
  document.getElementById('L').value = '';
  document.getElementById('C').value = '';
  document.getElementById('input-section').style.display = 'block';
  document.querySelector('.go-btn').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('sigs-list').style.display = 'none';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
