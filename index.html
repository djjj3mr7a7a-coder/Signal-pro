<script>
const GEMINI_KEY=localStorage.getItem("gk")||"";
async function getGeminiAnalysis(pair,tf,rsi,macd,stoch,ema20,ema50,msRend,patterns,sr){
  try{
    var prompt="Analyze forex data. Reply ONLY with JSON:\nPair:"+pair+",TF:"+tf+",RSI:"+rsi+",MACD:"+macd+",Stoch:"+stoch+",EMA20:"+ema20+",EMA50:"+ema50+",Structure:"+msRend+",Patterns:"+(patterns.length?patterns.join(","):"None")+",S1:"+sr.s1.toFixed(5)+",R1:"+sr.r1.toFixed(5)+"\nReturn:{\"signal\":\"UP\" or \"DOWN\" or \"WAIT\",\"confidence\":50-99,\"reason\":\"max 12 words\"}";
    var res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+GEMINI_KEY,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.1,maxOutputTokens:80}})
    });
    var data=await res.json();
    var text=data.candidates[0].content.parts[0].text.replace(/```json|```/g,"").trim();
    var match=text.match(/\{[\s\S]*\}/);
    return match?JSON.parse(match[0]):null;
  }catch(e){return null;}
}

function toggleSettings(){
  var m=document.getElementById("settingsModal");
  m.style.display=m.style.display==="none"?"flex":"none";
  var k=localStorage.getItem("gk");
  if(k)document.getElementById("geminiInput").value=k;
  document.getElementById("keyStatus").textContent=k?"Key saved ✅":"No key saved";
}
function saveKey(){
  var k=document.getElementById("geminiInput").value.trim();
  if(k){localStorage.setItem("gk",k);document.getElementById("keyStatus").textContent="Saved ✅";}
  else{localStorage.removeItem("gk");document.getElementById("keyStatus").textContent="Key removed";}
  setTimeout(function(){toggleSettings();},800);
}

function toggleSettings(){
  var p=document.getElementById("settingsPanel");
  p.style.display=p.style.display==="none"?"block":"none";
  var k=localStorage.getItem("gk");

}
function saveKey(){

    document.getElementById("keyStatus").style.color="#00e096";

}

const PAIRS=[
  {label:"EUR/USD",symbol:"EUR/USD",flag:"&#127466;&#127482;"},
  {label:"GBP/USD",symbol:"GBP/USD",flag:"&#127468;&#127463;"},
  {label:"USD/JPY",symbol:"USD/JPY",flag:"&#127471;&#127477;"},
  {label:"AUD/USD",symbol:"AUD/USD",flag:"&#127462;&#127482;"},
  {label:"USD/CAD",symbol:"USD/CAD",flag:"&#127464;&#127462;"},
  {label:"EUR/GBP",symbol:"EUR/GBP",flag:"&#127466;&#127482;"},
  {label:"EUR/JPY",symbol:"EUR/JPY",flag:"&#127466;&#127482;"},
  {label:"GBP/JPY",symbol:"GBP/JPY",flag:"&#127468;&#127463;"},
  {label:"USD/CHF",symbol:"USD/CHF",flag:"&#127464;&#127469;"},
  {label:"NZD/USD",symbol:"NZD/USD",flag:"&#127475;&#127487;"},
  {label:"AUD/JPY",symbol:"AUD/JPY",flag:"&#127462;&#127482;"},
  {label:"EUR/CHF",symbol:"EUR/CHF",flag:"&#127466;&#127482;"},
];
let currentPair=PAIRS[0],isLoading=false;
const dd=document.getElementById("pairDropdown");
PAIRS.forEach(function(p){
  const d=document.createElement("div");
  d.className="pair-item"+(p.symbol===currentPair.symbol?" active":"");
  d.innerHTML=p.label;
  d.onclick=function(){
    currentPair=p;
    document.getElementById("pairLabel").innerHTML=p.label;
    document.querySelectorAll(".pair-item").forEach(function(x){x.classList.remove("active");});
    d.classList.add("active");dd.style.display="none";resetCard();
  };
  dd.appendChild(d);

function setCard(h){document.getElementById("card").innerHTML=h;}

// ======= INDICATORS =======
function ema(data,p){
  var k=2/(p+1),e=data[0];
  for(var i=1;i<data.length;i++)e=data[i]*k+e*(1-k);
  return e;
}
function rsi(data,p){
  p=p||14;if(data.length<p+1)return 50;
  var g=0,l=0;
  for(var i=data.length-p;i<data.length;i++){var d=data[i]-data[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
  return 100-(100/(1+(g/p)/((l/p)||0.0001)));
}
function atr(H,L,C,p){
  p=p||14;var tr=[];
  for(var i=1;i<C.length;i++)tr.push(Math.max(H[i]-L[i],Math.abs(H[i]-C[i-1]),Math.abs(L[i]-C[i-1])));
  return tr.slice(-p).reduce(function(a,b){return a+b;},0)/p;
}
function macd(data){
  return ema(data.slice(-26),12)-ema(data.slice(-26),26);
}
function stoch(H,L,C,p){
  p=p||14;
  var hh=Math.max.apply(null,H.slice(-p));
  var ll=Math.min.apply(null,L.slice(-p));
  return ((C[C.length-1]-ll)/(hh-ll||0.0001))*100;
}

// ======= MARKET STRUCTURE =======
function marketStructure(C){
  var n=C.length,ups=0,downs=0;
  for(var i=3;i<Math.min(n,25);i++){
    if(C[i]>C[i-1]&&C[i-1]>C[i-2]&&C[i-2]>C[i-3])ups++;
    if(C[i]<C[i-1]&&C[i-1]<C[i-2]&&C[i-2]<C[i-3])downs++;
  }
  if(ups>downs+1)return{trend:"UPTREND",score:2};
  if(downs>ups+1)return{trend:"DOWNTREND",score:-2};
  return{trend:"SIDEWAYS",score:0};
}

// ======= SUPPORT & RESISTANCE =======
function getSR(H,L,C){
  var last=C[C.length-1];
  var res=Math.max.apply(null,H.slice(-30));
  var sup=Math.min.apply(null,L.slice(-30));
  var pivot=(H[H.length-1]+L[L.length-1]+C[C.length-1])/3;
  var r1=2*pivot-L[L.length-1];
  var s1=2*pivot-H[H.length-1];
  var r2=pivot+(res-sup);
  var s2=pivot-(res-sup);
  return{res:res,sup:sup,pivot:pivot,r1:r1,s1:s1,r2:r2,s2:s2,last:last};
}

// ======= TREND LINES =======
function trendLines(C,H,L){
  var n=C.length;
  var recentHighs=[],recentLows=[];
  for(var i=n-20;i<n;i++){
    if(i>0&&i<n-1&&H[i]>H[i-1]&&H[i]>H[i+1])recentHighs.push({i:i,v:H[i]});
    if(i>0&&i<n-1&&L[i]<L[i-1]&&L[i]<L[i+1])recentLows.push({i:i,v:L[i]});
  }
  var hlSlope=0,llSlope=0;
  if(recentHighs.length>=2){var a=recentHighs[recentHighs.length-1],b=recentHighs[recentHighs.length-2];hlSlope=(a.v-b.v)/(a.i-b.i);}
  if(recentLows.length>=2){var a=recentLows[recentLows.length-1],b=recentLows[recentLows.length-2];llSlope=(a.v-b.v)/(a.i-b.i);}
  var trendDir="NEUTRAL";
  if(hlSlope>0&&llSlope>0)trendDir="UP_CHANNEL";
  else if(hlSlope<0&&llSlope<0)trendDir="DOWN_CHANNEL";
  else if(hlSlope<0&&llSlope>0)trendDir="CONVERGING";
  return{trendDir:trendDir,hlSlope:hlSlope,llSlope:llSlope};
}

// ======= BREAKOUT & RETEST =======
function breakoutRetest(C,H,L,sr){
  var last=C[C.length-1];
  var prev=C[C.length-2];
  var signals=[],score=0;
  if(prev<sr.r1&&last>sr.r1){signals.push("Breakout above R1");score+=3;}
  if(prev>sr.s1&&last<sr.s1){signals.push("Breakout below S1");score-=3;}
  var atR1=Math.abs(last-sr.r1)/sr.r1<0.0015;
  var atS1=Math.abs(last-sr.s1)/sr.s1<0.0015;
  if(atR1&&last<sr.r1){signals.push("Retest of broken R1 (now support)");score+=2;}
  if(atS1&&last>sr.s1){signals.push("Retest of broken S1 (now resistance)");score-=2;}
  if(last>sr.pivot){score+=1;}else{score-=1;}
  return{signals:signals,score:score};
}

// ======= CANDLE PATTERNS =======
function candlePatterns(O,H,L,C){
  var patterns=[],score=0;
  var n=C.length-1;
  var o=O[n],h=H[n],l=L[n],c=C[n];
  var body=Math.abs(c-o),range=h-l;
  var upper=h-Math.max(o,c),lower=Math.min(o,c)-l;
  var bull=c>o;
  if(body<range*0.1){patterns.push("Doji");}
  if(lower>body*2.5&&upper<body*0.5){patterns.push(bull?"Bull Hammer":"Hanging Man");score+=bull?2:-1;}
  if(upper>body*2.5&&lower<body*0.5){patterns.push(bull?"Shooting Star":"Inv Hammer");score+=bull?-2:1;}
  if(body>range*0.75){patterns.push(bull?"Marubozu Bull":"Marubozu Bear");score+=bull?2:-2;}
  if(n>0){
    var po=O[n-1],pc=C[n-1],ph=H[n-1],pl=L[n-1];
    if(pc<po&&c>o&&c>po&&o<pc){patterns.push("Bullish Engulfing");score+=3;}
    if(pc>po&&c<o&&c<po&&o>pc){patterns.push("Bearish Engulfing");score-=3;}
    if(n>1){
      var ppc=C[n-2],ppo=O[n-2];
      if(ppc<ppo&&Math.abs(pc-po)<Math.abs(ppc-ppo)*0.3&&c>o&&c>(ppo+ppc)/2){patterns.push("Morning Star");score+=4;}
      if(ppc>ppo&&Math.abs(pc-po)<Math.abs(ppc-ppo)*0.3&&c<o&&c<(ppo+ppc)/2){patterns.push("Evening Star");score-=4;}
      var mid3H=Math.max(H[n-2],ph,h),mid3L=Math.min(L[n-2],pl,l);
      if(C[n-2]>O[n-2]&&bull&&C[n-2]<h&&O[n-2]>l){patterns.push("Three White Soldiers");score+=3;}
      if(C[n-2]<O[n-2]&&!bull&&C[n-2]>l&&O[n-2]<h){patterns.push("Three Black Crows");score-=3;}
    }
  }
  return{patterns:patterns,score:score};
}

// ======= WAVE ANALYSIS (Elliott - Impulsive vs Corrective) =======
function waveAnalysis(C){
  var n=C.length;
  // Detect swing points
  var swings=[];
  for(var i=2;i<n-2;i++){
    if(C[i]>C[i-1]&&C[i]>C[i-2]&&C[i]>C[i+1]&&C[i]>C[i+2])swings.push({i:i,v:C[i],type:"H"});
    if(C[i]<C[i-1]&&C[i]<C[i-2]&&C[i]<C[i+1]&&C[i]<C[i+2])swings.push({i:i,v:C[i],type:"L"});
  }
  // Determine wave type from last 3 swings
  var waveType="Unknown";
  var waveBias="Analyzing...";
  var waveNum="";
  var score=0;
  if(swings.length>=3){
    var s1=swings[swings.length-3];
    var s2=swings[swings.length-2];
    var s3=swings[swings.length-1];
    // Impulsive UP: L -> H -> higher L -> higher H
    if(s1.type==="L"&&s2.type==="H"&&s3.type==="L"&&s3.v>s1.v){
      waveType="Impulsive";waveBias="Wave 3 UP (Strongest)";waveNum="&#9651; W3";score=3;
    }
    // Corrective DOWN after up move
    else if(s1.type==="H"&&s2.type==="L"&&s3.type==="H"&&s3.v<s1.v){
      waveType="Corrective";waveBias="Wave ABC DOWN";waveNum="&#9661; ABC";score=-2;
    }
    // Impulsive DOWN
    else if(s1.type==="H"&&s2.type==="L"&&s3.type==="H"&&s3.v<s1.v&&C[n-1]<s2.v){
      waveType="Impulsive";waveBias="Wave 3 DOWN (Bearish)";waveNum="&#9661; W3";score=-3;
    }
    // Corrective UP (retracement)
    else if(s1.type==="L"&&s2.type==="H"&&s3.type==="L"&&s3.v<s1.v){
      waveType="Corrective";waveBias="Wave ABC UP";waveNum="&#9651; ABC";score=1;
    }
    else{
      waveType=C[n-1]>C[n-10]?"Impulsive":"Corrective";
      waveBias=waveType==="Impulsive"?"Trending UP":"Trending DOWN";
      waveNum=waveType==="Impulsive"?"&#9651; W5":"&#9661; W4";
      score=waveType==="Impulsive"?1:-1;
    }
  }
  return{waveType:waveType,waveBias:waveBias,waveNum:waveNum,waveScore:score,swings:swings.length};
}

// ======= MOMENTUM =======
function momentum(C){
  var n=C.length;
  var m5=C[n-1]-C[n-6];
  var m10=C[n-1]-C[n-11];
  if(m5>0&&m10>0)return{label:"Strong Bullish Momentum",score:2};
  if(m5<0&&m10<0)return{label:"Strong Bearish Momentum",score:-2};
  if(m5>0)return{label:"Weak Bullish Momentum",score:1};
  return{label:"Weak Bearish Momentum",score:-1};
}

// ======= MAIN ANALYSIS =======
function analyze(O,H,L,C){
  var last=C[C.length-1];
  var e20=ema(C.slice(-20),20);
  var e50=ema(C.slice(-50),50);
  var e200=ema(C,200);
  var r=rsi(C);
  var m=macd(C);
  var k=stoch(H,L,C,14);
  var sr=getSR(H,L,C);
  var ms=marketStructure(C);
  var br=breakoutRetest(C,H,L,sr);
  var cp=candlePatterns(O,H,L,C);
  var wa=waveAnalysis(C);
  var mo=momentum(C);
  var tl=trendLines(C,H,L);
  var totalScore=0;

  // EMA
  var emaScore=0;
  if(last>e20&&e20>e50)emaScore=2;
  else if(last<e20&&e20<e50)emaScore=-2;
  else if(last>e20)emaScore=1;
  else emaScore=-1;
  totalScore+=emaScore;

  // RSI
  var rsiScore=0;
  if(r<25)rsiScore=3;else if(r<35)rsiScore=2;else if(r<45)rsiScore=1;
  else if(r>75)rsiScore=-3;else if(r>65)rsiScore=-2;else if(r>55)rsiScore=-1;
  totalScore+=rsiScore;

  // MACD
  totalScore+=m>0?1:-1;

  // Stoch
  if(k<20)totalScore+=2;else if(k>80)totalScore-=2;

  // Market structure
  totalScore+=ms.score;
  totalScore+=wa.waveScore||0;

  // Breakout/Retest
  totalScore+=br.score;

  // Candles
  totalScore+=cp.score;

  // Momentum
  totalScore+=mo.score;

  // Trend line
  if(tl.trendDir==="UP_CHANNEL")totalScore+=1;
  else if(tl.trendDir==="DOWN_CHANNEL")totalScore-=1;

  // Conflict detection - if major indicators disagree, force WAIT
  var emaUp=last>e20&&e20>e50;
  var emaDown=last<e20&&e20<e50;
  var rsiUp=r<50;
  var rsiDown=r>50;
  var msUp=ms.score>0;
  var msDown=ms.score<0;
  var macdUp=m>0;
  var macdDown=m<0;
  var conflicts=0;
  if(emaUp&&msDown)conflicts++;
  if(emaDown&&msUp)conflicts++;
  if(emaUp&&rsiDown&&r>65)conflicts++;
  if(emaDown&&rsiUp&&r<35)conflicts++;
  if(macdUp&&emaDown)conflicts++;
  if(macdDown&&emaUp)conflicts++;
  var direction,dcls;
  if(conflicts>=2||Math.abs(totalScore)<3){direction="WAIT";dcls="wait";}
  else if(totalScore>0){direction="UP";dcls="up";}
  else{direction="DOWN";dcls="down";}

  var absScore=Math.abs(totalScore);
  var accuracy=Math.min(96,58+absScore*3.5);
  if(direction==="WAIT")accuracy=0;
  var strength=Math.min(98,50+absScore*5);

  // Generate 3 reasons
  var reasons=[];
  if(direction!=="WAIT"){
    var isUP=direction==="UP";
    if(emaScore!==0)reasons.push(isUP?"Price above EMA20 & EMA50 — confirming uptrend structure":"Price below EMA20 & EMA50 — confirming downtrend structure");
    if(r<40&&isUP)reasons.push("RSI at "+r.toFixed(0)+" — oversold zone, reversal expected upward");
    if(r>60&&!isUP)reasons.push("RSI at "+r.toFixed(0)+" — overbought zone, reversal expected downward");
    if(ms.score!==0)reasons.push("Market structure shows "+ms.trend+" — "+( isUP?"Higher Highs & Higher Lows":"Lower Highs & Lower Lows"));
    if(cp.patterns.length>0)reasons.push("Candle pattern detected: "+cp.patterns[0]+" — strong "+( isUP?"bullish":"bearish")+" signal");
    if(br.signals.length>0)reasons.push(br.signals[0]+" — key level confirmation");
    if(mo.score!==0)reasons.push(mo.label+" supports the "+direction+" direction");
    if(tl.trendDir!=="NEUTRAL"&&tl.trendDir!=="CONVERGING")reasons.push("Trend channel is "+tl.trendDir+" — price following channel direction");
    if(k<25&&isUP)reasons.push("Stochastic at "+k.toFixed(0)+" — oversold, momentum reversal forming");
    if(k>75&&!isUP)reasons.push("Stochastic at "+k.toFixed(0)+" — overbought, momentum fading");
    if(wa.waveBias)reasons.push("Elliott Wave: "+wa.waveBias+" — "+wa.waveType+" move in progress");
    reasons=reasons.slice(0,3);
    while(reasons.length<3){
      if(isUP)reasons.push("Price holding above Pivot ("+sr.pivot.toFixed(5)+") — bullish bias maintained");
      else reasons.push("Price trading below Pivot ("+sr.pivot.toFixed(5)+") — bearish pressure continues");
    }
  } else {
    reasons.push("Mixed signals across timeframe — no clear directional bias");
    reasons.push("RSI at "+r.toFixed(0)+" — neutral zone, wait for confirmation");
    reasons.push("Price near Pivot ("+sr.pivot.toFixed(5)+") — await breakout for entry");
  }

  // Duration = selected timeframe (passed from outside)
  var duration="";// will be set after analyze() call

  return{direction:direction,dcls:dcls,accuracy:Math.round(accuracy),strength:Math.round(strength),
    reasons:reasons,sr:sr,last:last.toFixed(5),duration:duration,
    rsi:r.toFixed(1),macd:m.toFixed(5),stoch:k.toFixed(0),
    e20:e20.toFixed(5),e50:e50.toFixed(5),
    patterns:cp.patterns,ms:ms,wa:wa,tl:tl,waveBias:wa.waveBias,waveNum:wa.waveNum,waveType:wa.waveType,
    emaScore:emaScore,totalScore:totalScore};
}

async function fetchTF(symbol,interval){
  var url="https://api.twelvedata.com/time_series?symbol="+symbol+"&interval="+interval+"&outputsize=100&apikey=fbaf04b411c7458f923c05ef24bcc878";
  var res=await fetch(url);
  if(!res.ok)throw new Error("Network error");
  var text=await res.text();
  var data=JSON.parse(text);
  if(data.status==="error"||!data.values)throw new Error(data.message||"No data");
  var vals=data.values.reverse();
  return{
    O:vals.map(function(v){return parseFloat(v.open);}),
    H:vals.map(function(v){return parseFloat(v.high);}),
    L:vals.map(function(v){return parseFloat(v.low);}),
    C:vals.map(function(v){return parseFloat(v.close);})
  };
}

function quickBias(O,H,L,C){
  var last=C[C.length-1];
  var e20=ema(C.slice(-20),20);
  var e50=ema(C.slice(-50),50);
  var r=rsi(C);
  var m=macd(C);
  var score=0;
  if(last>e20)score++;else score--;
  if(last>e50)score++;else score--;
  if(r<45)score++;else if(r>55)score--;
  if(m>0)score++;else score--;
  if(score>=2)return"UP";
  if(score<=-2)return"DOWN";
  return"NEUTRAL";
}
