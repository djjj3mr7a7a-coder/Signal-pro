// ============================================================
// INDICATORS (نفس الكود القديم)
// ============================================================
function calcEma(d, p) {
  const k = 2/(p+1); let e = d[0];
  for (let i=1;i<d.length;i++) e = d[i]*k + e*(1-k);
  return e;
}
function calcRsi(d, p=14) {
  if (d.length<p+1) return 50;
  let g=0,l=0;
  for (let i=d.length-p;i<d.length;i++) { const x=d[i]-d[i-1]; x>0?g+=x:l+=Math.abs(x); }
  return 100 - 100/(1+(g/p)/((l/p)||0.0001));
}
function calcMacd(d) { return calcEma(d.slice(-26),12)-calcEma(d.slice(-26),26); }
function calcStoch(H,L,C,p=14) {
  const hh=Math.max(...H.slice(-p)), ll=Math.min(...L.slice(-p));
  return ((C[C.length-1]-ll)/((hh-ll)||0.0001))*100;
}
function calcAtr(H,L,C,p=14) {
  const tr=[];
  for (let i=1;i<C.length;i++) tr.push(Math.max(H[i]-L[i],Math.abs(H[i]-C[i-1]),Math.abs(L[i]-C[i-1])));
  return tr.slice(-p).reduce((a,b)=>a+b,0)/p;
}

function marketStr(C) {
  let u=0,d=0;
  for (let i=3;i<Math.min(C.length,25);i++) {
    if(C[i]>C[i-1]&&C[i-1]>C[i-2]&&C[i-2]>C[i-3])u++;
    if(C[i]<C[i-1]&&C[i-1]<C[i-2]&&C[i-2]<C[i-3])d++;
  }
  if(u>d+1) return {trend:"UPTREND",score:2};
  if(d>u+1) return {trend:"DOWNTREND",score:-2};
  return {trend:"SIDEWAYS",score:0};
}

function candleP(O,H,L,C) {
  const n=C.length-1,o=O[n],h=H[n],l=L[n],c=C[n];
  const body=Math.abs(c-o),range=h-l,bull=c>o;
  const up=h-Math.max(o,c),dn=Math.min(o,c)-l;
  const p=[]; let s=0;
  if(body<range*0.1){p.push("Doji");}
  if(dn>body*2.5&&up<body*0.5){p.push(bull?"Hammer":"Hanging Man");s+=bull?2:-1;}
  if(up>body*2.5&&dn<body*0.5){p.push(bull?"Shooting Star":"Inv Hammer");s+=bull?-2:1;}
  if(body>range*0.75){p.push(bull?"Marubozu Bull":"Marubozu Bear");s+=bull?2:-2;}
  if(n>0){
    const po=O[n-1],pc=C[n-1];
    if(pc<po&&c>o&&c>po&&o<pc){p.push("Bullish Engulfing");s+=3;}
    if(pc>po&&c<o&&c<po&&o>pc){p.push("Bearish Engulfing");s-=3;}
    if(n>1){
      const ppc=C[n-2],ppo=O[n-2];
      if(ppc<ppo&&Math.abs(pc-po)<Math.abs(ppc-ppo)*0.3&&c>o&&c>(ppo+ppc)/2){p.push("Morning Star");s+=4;}
      if(ppc>ppo&&Math.abs(pc-po)<Math.abs(ppc-ppo)*0.3&&c<o&&c<(ppo+ppc)/2){p.push("Evening Star");s-=4;}
    }
  }
  return {patterns:p,score:s};
}

function rejZones(H,L,C) {
  const n=C.length,levels=[],tol=0.0003;
  for(let i=5;i<n-5;i++){
    if(H[i]>H[i-1]&&H[i]>H[i-2]&&H[i]>H[i+1]&&H[i]>H[i+2])levels.push({price:H[i],type:"R"});
    if(L[i]<L[i-1]&&L[i]<L[i-2]&&L[i]<L[i+1]&&L[i]<L[i+2])levels.push({price:L[i],type:"S"});
  }
  const cl=[];
  levels.forEach(lv=>{
    let found=false;
    cl.forEach(c=>{if(Math.abs(c.price-lv.price)/lv.price<tol){c.touches++;lv.type==="R"?c.ru++:c.rd++;found=true;}});
    if(!found)cl.push({price:lv.price,touches:1,ru:lv.type==="R"?1:0,rd:lv.type==="S"?1:0});
  });
  const strong=cl.filter(c=>c.touches>=3).sort((a,b)=>b.touches-a.touches);
  const last=C[n-1]; let nz=null,nt="",ns=0;
  strong.forEach(z=>{
    const d=Math.abs(last-z.price)/z.price*100;
    if(d<0.05&&(!nz||d<Math.abs(last-nz.price)/last*100)){nz=z;nt=z.rd>z.ru?"RESISTANCE":"SUPPORT";ns=Math.min(100,z.touches*20);}
  });
  const atZone=!!nz,score=atZone?(nt==="SUPPORT"?2:-2):0;
  return {nearZone:nz,nearType:nt,nearStrength:ns,atZone,score,label:atZone?`${nt} zone (${nz.touches}x) at ${nz.price.toFixed(5)}`:"No rejection zone nearby"};
}

function volProfile(H,L,C,V) {
  const n=C.length,minP=Math.min(...L),maxP=Math.max(...H),range=maxP-minP,buckets=20;
  const prof=Array.from({length:buckets},(_,b)=>({mid:minP+(b+0.5)*range/buckets,vol:0}));
  for(let i=0;i<n;i++){
    const v=V&&V[i]?V[i]:1;
    for(let b=0;b<buckets;b++)if(L[i]<=minP+(b+1)*range/buckets&&H[i]>=minP+b*range/buckets)prof[b].vol+=v;
  }
  const poc=prof.reduce((a,b)=>b.vol>a.vol?b:a);
  const avg=prof.reduce((a,b)=>a+b.vol,0)/buckets;
  const last=C[n-1];
  const atHVN=prof.some(z=>z.vol>avg*1.5&&Math.abs(last-z.mid)/last<0.0008);
  const atLVN=prof.some(z=>z.vol<avg*0.4&&z.vol>0&&Math.abs(last-z.mid)/last<0.0008);
  const nearPOC=Math.abs(last-poc.mid)/last<0.0005;
  const label=atLVN?"EXPLOSION ZONE":atHVN?"HVN - Institutional":nearPOC?`Near POC ${poc.mid.toFixed(5)}`:`POC: ${poc.mid.toFixed(5)}`;
  return {atHVN,atLVN,nearPOC,label};
}

function smartTripleCheck(O,H,L,C,rz,vp,sig) {
  const n=C.length;
  let lu=0,ld=0;
  for(let i=n-5;i<n;i++){lu+=(C[i]>C[i-1]?1:0);ld+=(C[i]<C[i-1]?1:0);}
  let ab=0;for(let i=n-10;i<n-1;i++)ab+=Math.abs(C[i]-O[i]);ab/=9;
  const strongCnd=Math.abs(C[n-1]-O[n-1])>ab*0.8;
  const clearEma=Math.abs(C[n-1]-calcEma(C.slice(-20),20))/calcEma(C.slice(-20),20)*100>0.01;
  const momAcc=Math.abs(C[n-1]-C[n-2])>Math.abs(C[n-2]-C[n-3]);
  const cndCons=Math.max(lu,ld);
  let mcs=0;
  if(cndCons>=3)mcs++;if(strongCnd)mcs++;if(clearEma)mcs++;if(momAcc)mcs++;
  const check1=mcs>=3;

  const rzOk=!rz.atZone||(rz.nearType==="SUPPORT"&&sig==="UP")||(rz.nearType==="RESISTANCE"&&sig==="DOWN");
  const vpOk=vp.atLVN || (!vp.atHVN);
  const check2=rzOk&&vpOk;

  const rsiV=calcRsi(C);
  const macdV=calcMacd(C);
  const e20=calcEma(C.slice(-20),20),e50=calcEma(C.slice(-50),50);
  const last=C[n-1];
  let agree=0;
  if(sig==="UP"){
    if(rsiV<60&&rsiV>30)agree++;
    if(macdV>0)agree++;
    if(last>e20)agree++;
  } else if(sig==="DOWN"){
    if(rsiV>40&&rsiV<70)agree++;
    if(macdV<0)agree++;
    if(last<e20)agree++;
  }
  const check3=sig==="WAIT" ? true : (agree>=2);

  const passed=[check1,check2,check3].filter(Boolean).length;
  const allPassed=passed===3;

  return {
    check1,check2,check3,passed,allPassed,
    mcs,mcsDetails:`Candles:${cndCons}/5 | Body:${strongCnd?"Strong":"Weak"} | Clear:${clearEma?"Yes":"No"} | Accel:${momAcc?"Yes":"No"}`,
    agree,rzOk,vpOk
  };
}

function analyze(O,H,L,C,V) {
  const n=C.length,last=C[n-1];
  const e20=calcEma(C.slice(-20),20),e50=calcEma(C.slice(-50),50);
  const r=calcRsi(C),m=calcMacd(C),k=calcStoch(H,L,C);
  const ms=marketStr(C),cp=candleP(O,H,L,C);
  const rz=rejZones(H,L,C),vp=volProfile(H,L,C,V);

  let total=0;
  if(last>e20&&e20>e50)total+=2;else if(last<e20&&e20<e50)total-=2;else if(last>e20)total+=1;else total-=1;
  if(r<25)total+=3;else if(r<35)total+=2;else if(r<45)total+=1;
  else if(r>75)total-=3;else if(r>65)total-=2;else if(r>55)total-=1;
  total+=m>0?1:-1;
  if(k<20)total+=2;else if(k>80)total-=2;
  total+=ms.score+cp.score+rz.score;
  
  if(vp.atLVN)total+=(total>0?1:-1);

  let conflicts=0;
  if(last>e20&&e20>e50&&ms.score<0)conflicts++;
  if(last<e20&&e20<e50&&ms.score>0)conflicts++;
  if(rz.atZone&&rz.nearType==="RESISTANCE"&&total>0)conflicts+=1;
  if(rz.atZone&&rz.nearType==="SUPPORT"&&total<0)conflicts+=1;

  let direction="WAIT",dcls="wait";
  if(conflicts<2&&Math.abs(total)>=2){
    direction=total>0?"UP":"DOWN";
    dcls=total>0?"up":"down";
  }

  const stc=smartTripleCheck(O,H,L,C,rz,vp,direction);
  if(direction!=="WAIT"&&!stc.allPassed){direction="WAIT";dcls="wait";}

  const absScore=Math.abs(total);
  const accuracy=Math.min(95,Math.round(60+absScore*4));
  const strength=Math.min(98,Math.round(52+absScore*5));

  const atrVal=calcAtr(H,L,C);
  const atrPct=(atrVal/last)*100;
  let duration="No Entry";
  if(direction!=="WAIT"){
    if(atrPct>0.15)duration="5 min";
    else if(atrPct>0.08)duration="15 min";
    else if(atrPct>0.04)duration="30 min";
    else duration="1 hour";
  }

  const reasons=[];
  if(direction!=="WAIT"){
    const up=direction==="UP";
    if(up&&last>e20||!up&&last<e20) reasons.push(`Price ${up?"above":"below"} EMA20 & EMA50`);
    if(r<45&&up) reasons.push(`RSI ${r.toFixed(0)} — support dynamic alignment`);
    if(r>55&&!up) reasons.push(`RSI ${r.toFixed(0)} — resistance dynamic alignment`);
    if(ms.score!==0) reasons.push(`${ms.trend} Structure Aligned`);
    if(cp.patterns.length>0) reasons.push(`${cp.patterns[0]} confirmed`);
    while(reasons.length<3) reasons.push(`${up?"Bullish":"Bearish"} momentum aligned`);
  } else {
    reasons.push("Mixed signals — monitoring market structure");
    reasons.push(`Smart Triple Check: ${stc.passed}/3 checks passed`);
    reasons.push("Wait for system confluence");
  }

  return {
    direction,dcls,accuracy,strength,duration,total,
    rsi:r.toFixed(1),macd:m.toFixed(5),stoch:k.toFixed(0),
    e20:e20.toFixed(5),last:last.toFixed(5),
    ms,cp,rz,vp,stc,reasons:reasons.slice(0,3)
  };
}

// ============================================================
// 🚀 SMART FETCH: ALL PAIRS IN ONE REQUEST PER TIMEFRAME
// ============================================================
async function fetchAllPairs(timeframe) {
  const symbolList = PAIRS.join(",");
  const url = `https://api.twelvedata.com/time_series?symbol=${symbolList}&interval=${timeframe}&outputsize=100&apikey=${TWELVE_KEY}`;
  
  const res = await fetch(url);
  const data = await res.json();

  if (data.status === "error") {
    throw new Error(data.message || "Twelve Data error");
  }

  const result = {};
  for (const pair of PAIRS) {
    const pairData = data[pair];
    if (!pairData || !pairData.values || pairData.values.length === 0) {
      result[pair] = null;
      continue;
    }
    const vals = pairData.values.reverse().slice(0, -1);
    result[pair] = {
      O: vals.map(v => parseFloat(v.open)),
      H: vals.map(v => parseFloat(v.high)),
      L: vals.map(v => parseFloat(v.low)),
      C: vals.map(v => parseFloat(v.close)),
      V: vals.map(v => parseFloat(v.volume || 0))
    };
  }
  return result;
}

// ============================================================
// 🚀 SCAN ALL PAIRS
// ============================================================
async function scanAllPairs() {
  // 1. Fetch 5min data for all pairs (1 request)
  const data5min = await fetchAllPairs("5min");
  
  // 2. Fetch 15min data for all pairs (1 request)
  const data15min = await fetchAllPairs("15min");
  
  // 3. Fetch 1h data for all pairs (1 request)
  const data1h = await fetchAllPairs("1h");

  const results = [];

  for (const pair of PAIRS) {
    const d5 = data5min[pair];
    const d15 = data15min[pair];
    const d1h = data1h[pair];

    if (!d5) continue;

    // Calculate MTF biases
    let up=0, dn=0;
    
    // 5min bias
    if (d5) {
      const b5 = quickBias(d5.O, d5.H, d5.L, d5.C);
      if (b5 === "UP") up++; else if (b5 === "DOWN") dn++;
    }
    
    // 15min bias
    if (d15) {
      const b15 = quickBias(d15.O, d15.H, d15.L, d15.C);
      if (b15 === "UP") up++; else if (b15 === "DOWN") dn++;
    }
    
    // 1h bias
    if (d1h) {
      const b1h = quickBias(d1h.O, d1h.H, d1h.L, d1h.C);
      if (b1h === "UP") up++; else if (b1h === "DOWN") dn++;
    }

    const align = Math.max(up, dn);
    const mtfDir = up > dn ? "UP" : dn > up ? "DOWN" : "NEUTRAL";

    // Analyze 5min data
    const result = analyze(d5.O, d5.H, d5.L, d5.C, d5.V);

    // Apply MTF override
    if (mtfDir !== "NEUTRAL" && mtfDir !== result.direction && result.direction !== "WAIT") {
      result.direction = "WAIT";
      result.dcls = "wait";
      result.duration = "No Entry";
    }
    if (mtfDir === result.direction && result.direction !== "WAIT") {
      result.accuracy = Math.min(96, result.accuracy + align * 2);
    }

    // Check if GO
    const stcOk = result.stc.allPassed;
    const mtfOk = align >= 2;
    const confOk = result.accuracy >= 80;
    const isGo = result.direction !== "WAIT" && stcOk && mtfOk && confOk;

    results.push({
      pair,
      direction: result.direction,
      accuracy: result.accuracy,
      duration: result.duration,
      isGo,
      reasons: result.reasons,
      total: result.total,
      ms: result.ms,
      stc: result.stc,
      price: d5.C[d5.C.length - 1].toFixed(5)
    });
  }

  return results;
}

// ============================================================
// QUICK BIAS
// ============================================================
function quickBias(O,H,L,C){
  const last=C[C.length-1],e20=calcEma(C.slice(-20),20),e50=calcEma(C.slice(-50),50);
  const r=calcRsi(C),m=calcMacd(C);
  let s=0;
  if(last>e20)s++;else s--;if(last>e50)s++;else s--;
  if(r<48)s++;else if(r>52)s--;if(m>0)s++;else s--;
  if(s>=2)return"UP";if(s<=-2)return"DOWN";return"NEUTRAL";
}

// MAIN APP
// ============================================================
function App(){
  const [pair,setPair]=useState("EUR/USD");
  const [showDD,setShowDD]=useState(false);
  const [loading,setLoading]=useState(false);
  const [scanResults,setScanResults]=useState([]);
  const [scanning,setScanning]=useState(false);
  const [err,setErr]=useState("");
  const [page,setPage]=useState("signals");
  const [history,setHistory]=useState(loadH());
  const [taken,setTaken]=useState(false);
  const [lastId,setLastId]=useState(null);
  const [sig,setSig]=useState(null);
  const [verdict,setVerdict]=useState(null);
  const [mtf,setMtf]=useState([]);

  function loadH(){try{return JSON.parse(localStorage.getItem("sbh")||"[]");}catch{return[];}}
  function saveH(h){try{localStorage.setItem("sbh",JSON.stringify(h));}catch{}}

  const getSignal = useCallback(async()=>{
    setLoading(true);setErr("");setScanResults([]);
    try{
      const main=await fetchTF(pair,"5min");
      const tfs=[["5min","5M"],["15min","15M"],["1h","1H"]];
      const mtfArr=[];let up=0,dn=0;
      for(const [tf,lbl] of tfs){
        try{
          if(tf!=="5min")await new Promise(r=>setTimeout(r,300));
          const d=tf==="5min"?main:await fetchTF(pair,tf);
          const b=quickBias(d.O,d.H,d.L,d.C);
          mtfArr.push({lbl,bias:b,active:tf==="5min"});
          if(b==="UP")up++;else if(b==="DOWN")dn++;
        }catch{mtfArr.push({lbl,bias:"N/A",active:tf==="5min"});}
      }
      setMtf(mtfArr);
      const align=Math.max(up,dn);
      const mtfDir=up>dn?"UP":dn>up?"DOWN":"NEUTRAL";
      const result=analyze(main.O,main.H,main.L,main.C,main.V);
      if(mtfDir!=="NEUTRAL"&&mtfDir!==result.direction&&result.direction!=="WAIT"){
        result.direction="WAIT";result.dcls="wait";result.duration="No Entry";
      }
      if(mtfDir===result.direction&&result.direction!=="WAIT"){
        result.accuracy=Math.min(96,result.accuracy+align*2);
      }
      const stcOk=result.stc.allPassed;
      const mtfOk=align>=2;
      const confOk=result.accuracy>=80;
      const isGo=result.direction!=="WAIT"&&stcOk&&mtfOk&&confOk;
      setVerdict({label:isGo?"GO":"AVOID",dir:result.direction,time:result.duration,color:result.direction==="UP"?C.up:C.down});
      setSig(result);
    }catch(e){setErr(e.message||"Error");}
    setLoading(false);
  },[pair]);

  // ===== SCAN ALL PAIRS =====
  const scanAll = useCallback(async()=>{
    setScanning(true);
    setErr("");
    setScanResults([]);
    try {
      const results = await scanAllPairs();
      const goSignals = results.filter(r => r.isGo === true);
      setScanResults(goSignals);
      if (goSignals.length === 0) {
        setErr("⏳ No GO signals found. Try again in 5-10 minutes.");
      }
    } catch (e) {
      setErr(e.message || "Scan failed");
    }
    setScanning(false);
  }, []);

  const takeTrade=()=>{
    if(!sig)return;
    const id=Date.now();
    const t={id,pair,dir:sig.direction,dur:sig.duration,time:new Date().toLocaleTimeString(),date:new Date().toLocaleDateString(),result:null,accuracy:sig.accuracy,entryPrice:parseFloat(sig.last)};
    const h=[t,...history].slice(0,100);
    setHistory(h);saveH(h);setLastId(id);setTaken(true);
  };

  const markResult=(result)=>{
    const h=history.map(t=>t.id===lastId?{...t,result}:t);
    setHistory(h);saveH(h);setTaken(false);setSig(null);
  };

  const markFromHistory=(id,result)=>{
    const h=history.map(t=>t.id===id?{...t,result}:t);
    setHistory(h);saveH(h);
  };

  const done=history.filter(t=>t.result);
  const wins=done.filter(t=>t.result==="WIN").length;
  const losses=done.filter(t=>t.result==="LOSS").length;
  const rate=done.length>0?Math.round(wins/done.length*100):0;

  // ============================================================
  // HISTORY PAGE
  // ============================================================
  if(page==="history") return(
    <div style={S.app}>
      <div style={S.wrap}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"40px 0 20px"}}>
          <div style={{fontSize:18,fontWeight:800,color:C.text}}>📊 Trade History</div>
          <button onClick={()=>setPage("signals")} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",color:C.accent,fontSize:13,fontWeight:600,cursor:"pointer"}}>← Back</button>
        </div>
        <div style={{...S.g4,marginBottom:16}}>
          {[{n:history.length,l:"TOTAL",c:C.accent},{n:wins,l:"WINS",c:C.up},{n:losses,l:"LOSSES",c:C.down},{n:`${rate}%`,l:"WIN RATE",c:rate>=65?C.up:rate>=50?C.wait:C.down}].map(x=>(
            <div key={x.l} style={{background:C.card,borderRadius:10,padding:"10px 6px",textAlign:"center",backdropFilter:"blur(4px)",border:`1px solid #1a1c2e`}}>
              <div style={{fontSize:18,fontWeight:800,color:x.c}}>{x.n}</div>
              <div style={{fontSize:9,color:C.dim,marginTop:2}}>{x.l}</div>
            </div>
          ))}
        </div>
        {history.length===0?<div style={{textAlign:"center",color:C.dim2,padding:"40px 0",fontSize:13}}>No trades yet.</div>:
          history.slice(0,30).map(t=>(
            <div key={t.id} style={{background:C.card,borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between",backdropFilter:"blur(4px)",border:`1px solid #1a1c2e`}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.text}}>{t.pair}</div>
                <div style={{fontSize:10,color:C.dim}}>{t.date} {t.time} | {t.dir} | {t.accuracy}%</div>
              </div>
              {t.result===null?(
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>markFromHistory(t.id,"WIN")} style={{padding:"4px 8px",background:"rgba(0,224,150,0.15)",border:`1px solid ${C.up}`,borderRadius:6,color:C.up,fontSize:11,fontWeight:700,cursor:"pointer"}}>WIN</button>
                  <button onClick={()=>markFromHistory(t.id,"LOSS")} style={{padding:"4px 8px",background:"rgba(255,77,109,0.15)",border:`1px solid ${C.down}`,borderRadius:6,color:C.down,fontSize:11,fontWeight:700,cursor:"pointer"}}>LOSS</button>
                </div>
              ):(
                <span style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:700,color:t.result==="WIN"?C.up:C.down,background:t.result==="WIN"?"rgba(0,224,150,0.15)":"rgba(255,77,109,0.15)"}}>{t.result}</span>
              )}
            </div>
          ))
        }
        {history.length>0&&<button onClick={()=>{if(window.confirm("Clear all trade history?")){const h=[];setHistory(h);saveH(h);}}} style={{width:"100%",marginTop:12,padding:10,background:"transparent",border:`1px solid ${C.border}`,borderRadius:8,color:C.dim,fontSize:11,cursor:"pointer"}}>🗑 Clear All</button>}
      </div>
      <div style={S.footer}>MADE BY: ABDALLAH MAHER</div>
    </div>
  );

  // ============================================================
  // MAIN PAGE
  // ============================================================
  return(
    <div style={S.app}>
      <style>{`
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulseG{0%,100%{box-shadow:0 0 0 0 rgba(0,224,150,0.3)}50%{box-shadow:0 0 0 8px rgba(0,224,150,0)}}
        @keyframes pulseR{0%,100%{box-shadow:0 0 0 0 rgba(255,77,109,0.3)}50%{box-shadow:0 0 0 8px rgba(255,77,109,0)}}
        *{box-sizing:border-box;-webkit-tap-highlight-color:rgba(0,0,0,0);}
      `}</style>
      <div style={S.wrap}>

        {/* Header */}
        <div style={S.hdr}>
          <div style={{position:"relative",display:"inline-block"}}>
            <span style={{fontSize:28,fontWeight:900,background:`linear-gradient(135deg, #ffffff, ${C.accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"1px",filter:"drop-shadow(0px 2px 8px rgba(124,131,255,0.3))"}}>SpriNg Bot</span>
            <span style={{fontSize:9,fontWeight:800,color:"#fff",background:`linear-gradient(135deg, #ff9800, #f44336)`,padding:"2px 6px",borderRadius:4,verticalAlign:"middle",marginLeft:8,boxShadow:"0 2px 10px rgba(244,67,54,0.3)"}}>PRO</span>
          </div>
          <div style={{fontSize:11,color:C.dim,marginTop:4,fontWeight:500,letterSpacing:"0.5px"}}>AI-POWERED TRADING ENGINE</div>
        </div>

        {/* Pair Selector */}
        <div style={{position:"relative",marginBottom:14}}>
          <button
            onClick={()=>setShowDD(v=>!v)}
            style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",color:C.text,fontSize:14,fontWeight:600,cursor:"pointer",backdropFilter:"blur(4px)"}}
          >
            <span>{pair}</span>
            <span style={{color:C.dim,fontSize:10}}>▼</span>
          </button>
          {showDD&&(
            <div style={{position:"absolute",top:50,left:0,right:0,zIndex:999,background:"#0f111a",border:`1px solid ${C.border}`,borderRadius:10,maxHeight:220,overflowY:"auto",boxShadow:"0 12px 40px rgba(0,0,0,0.7)"}}>
              {PAIRS.map(p=>(
                <div
                  key={p}
                  onClick={()=>{setPair(p);setShowDD(false);setSig(null);setVerdict(null);setScanResults([]);}}
                  style={{padding:"11px 14px",fontSize:13,cursor:"pointer",color:p===pair?C.accent:C.text,background:p===pair?"#1a1c2e":"transparent",borderBottom:"1px solid #0d0f1a"}}
                >{p}</div>
              ))}
            </div>
          )}
        </div>

        {/* SCAN RESULTS - GO ONLY */}
        {scanResults.length > 0 && (
          <div style={{...S.ibox,marginBottom:12,border:`2px solid ${C.gold}`,background:`${C.gold}11`}}>
            <div style={S.row}>
              <div style={S.lbl}>🏆 GO SIGNALS FOUND ({scanResults.length}/{PAIRS.length})</div>
              <span style={{fontSize:10,color:C.gold,fontWeight:700}}>✅ Ready</span>
            </div>
            {scanResults.map((r,i)=>{
              const color = r.direction === "UP" ? C.up : r.direction === "DOWN" ? C.down : C.wait;
              return (
                <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",marginBottom:6,background:C.box,border:`1px solid ${color}`,borderRadius:8}}>
                  <div>
                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>{r.pair}</span>
                    <div style={{fontSize:9,color:C.dim}}>{r.reasons?.[0] || ""}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <span style={{fontSize:14,fontWeight:800,color:color}}>{r.direction === "UP" ? "📈 CALL" : r.direction === "DOWN" ? "📉 PUT" : "⏳ WAIT"}</span>
                    <div style={{fontSize:10,color:C.accent,fontWeight:600}}>{r.accuracy}% | ⏱️ {r.duration}</div>
                  </div>
                </div>
              );
            })}
            <div style={{marginTop:8,padding:10,background:`${C.gold}22`,borderRadius:8,border:`2px solid ${C.gold}`}}>
              <div style={{fontSize:12,color:C.gold,fontWeight:700,textAlign:"center"}}>
                🏆 Best: {scanResults.sort((a,b)=>b.accuracy-a.accuracy)[0]?.pair} ({scanResults.sort((a,b)=>b.accuracy-a.accuracy)[0]?.direction}) {scanResults.sort((a,b)=>b.accuracy-a.accuracy)[0]?.accuracy}%
              </div>
            </div>
          </div>
        )}

        {/* Card - Single Analysis */}
        <div style={{background:C.card,border:`1px solid #1a1c2e`,backdropFilter:"blur(10px)",borderRadius:16,padding:18,marginBottom:12,minHeight:100,boxShadow:"0 8px 32px rgba(0,0,0,0.25)"}}>
          {!sig&&!loading&&!err&&scanResults.length===0&&!scanning&&<div style={{textAlign:"center",color:C.dim,fontSize:14,padding:"30px 0",fontWeight:500}}>Press <span style={{color:C.accent}}>Scan All</span> to find GO signals</div>}
          {(loading||scanning)&&<div style={{textAlign:"center",padding:"20px 0"}}><div style={{width:36,height:36,border:`3px solid ${C.border}`,borderTop:`3px solid ${C.gold}`,borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 10px"}}/><div style={{color:C.dim,fontSize:12}}>{scanning ? "Scanning all pairs..." : "Analyzing..."}</div></div>}
          {err&&<div style={{textAlign:"center",color:C.down,fontSize:13,padding:"20px 0"}}>⏳ {err}</div>}

          {sig&&!loading&&(
            <div style={{animation:"fadeUp 0.4s ease"}}>
              <div style={{...S.ibox,...S.row,marginBottom:8}}>
                <div><div style={S.lbl}>Confidence</div><div style={{fontSize:22,fontWeight:800,color:C.accent}}>{sig.direction==="WAIT"?"---":`${sig.accuracy}%`}</div></div>
                <div style={{textAlign:"right"}}><div style={S.lbl}>Market</div><div style={{fontSize:13,fontWeight:700,color:"#a0a8c8"}}>{sig.ms.trend}</div></div>
              </div>

              <div style={{...S.ibox,marginBottom:8}}>
                <div style={S.lbl}>Multi-Timeframe</div>
                {mtf.map(d=>{
                  const c=d.bias==="UP"?C.up:d.bias==="DOWN"?C.down:C.wait;
                  return <div key={d.lbl} style={{display:"flex",alignItems:"center",padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.02)"}}>
                    <span style={{fontSize:11,color:d.active?C.accent:C.dim,fontWeight:d.active?700:400,width:35}}>{d.lbl}</span>
                    <div style={{flex:1,height:4,background:"#1a1c2e",borderRadius:100,overflow:"hidden",margin:"0 8px"}}>
                      <div style={{width:d.bias!=="N/A"?"70%":"0%",height:"100%",background:c,borderRadius:100}}/>
                    </div>
                    <span style={{fontSize:11,fontWeight:700,color:c,width:60,textAlign:"right"}}>{d.bias}</span>
                  </div>;
                })}
              </div>

              <div style={S.g4}>
                {[{l:"RSI",v:sig.rsi,c:sig.rsi<40?C.up:sig.rsi>60?C.down:C.wait},{l:"Stoch",v:sig.stoch,c:sig.stoch<30?C.up:sig.stoch>70?C.down:C.wait},{l:"MACD",v:(parseFloat(sig.macd)>0?"+":"")+parseFloat(sig.macd).toFixed(4),c:parseFloat(sig.macd)>0?C.up:C.down},{l:"Score",v:sig.total,c:Math.abs(sig.total)>=3?C.up:Math.abs(sig.total)>=1?C.wait:C.dim}].map(x=>(
                <div key={x.l} style={{...S.ibox,marginBottom:0,padding:"6px 8px"}}>
                  <div style={{...S.lbl,fontSize:8}}>{x.l}</div>
                  <div style={{fontSize:12,fontWeight:700,color:x.c}}>{x.v}</div>
                </div>
              ))}
              </div>

              <div style={{borderRadius:11,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between",background:sig.dcls==="up"?"rgba(0,224,150,0.07)":sig.dcls==="down"?"rgba(255,77,109,0.07)":"rgba(240,192,64,0.07)",border:`1px solid ${sig.dcls==="up"?"rgba(0,224,150,0.2)":sig.dcls==="down"?"rgba(255,77,109,0.2)":"rgba(240,192,64,0.2)"}`}}>
                <div>
                  <div style={S.lbl}>Signal</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:24}}>{sig.direction==="UP"?"📈":sig.direction==="DOWN"?"📉":"⏳"}</span>
                    <span style={{fontSize:26,fontWeight:900,color:sig.direction==="UP"?C.up:sig.direction==="DOWN"?C.down:C.wait}}>{sig.direction}</span>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={S.lbl}>Duration</div>
                  <div style={{fontSize:16,fontWeight:700,color:C.accent}}>{sig.duration}</div>
                </div>
              </div>

              {!taken && sig.direction!=="WAIT" ? (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <button onClick={takeTrade} style={{padding:13,border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",background:sig.direction==="UP"?C.up:C.down,animation:sig.direction==="UP"?"pulseG 2s infinite":"pulseR 2s infinite"}}>✅ TAKE</button>
                  <button onClick={scanAll} style={{padding:13,background:"transparent",border:`1px solid ${C.border}`,borderRadius:10,color:C.dim,fontWeight:700,fontSize:14,cursor:"pointer"}}>🔍 Scan All</button>
                </div>
              ) : !taken ? (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <button style={{padding:13,border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14,background:"#1e2235",cursor:"not-allowed",opacity:0.5}}>⏳ WAIT</button>
                  <button onClick={scanAll} style={{padding:13,background:"transparent",border:`1px solid ${C.border}`,borderRadius:10,color:C.dim,fontWeight:700,fontSize:14,cursor:"pointer"}}>🔍 Scan All</button>
                </div>
              ) : (
                <div style={{background:"rgba(255,215,0,0.06)",border:"1px solid rgba(255,215,0,0.18)",borderRadius:10,padding:14,textAlign:"center"}}>
                  <div style={{fontSize:13,color:C.gold,fontWeight:600,marginBottom:10}}>💎 Mark result:</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <button onClick={()=>markResult("WIN")} style={{padding:10,background:"rgba(0,224,150,0.15)",border:`1px solid ${C.up}60`,borderRadius:8,color:C.up,fontWeight:700,fontSize:13,cursor:"pointer"}}>✅ WIN</button>
                    <button onClick={()=>markResult("LOSS")} style={{padding:10,background:"rgba(255,77,109,0.15)",border:`1px solid ${C.down}60`,borderRadius:8,color:C.down,fontWeight:700,fontSize:13,cursor:"pointer"}}>❌ LOSS</button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Buttons */}
        {!loading && !sig && !scanning && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <button
              onClick={scanAll}
              style={{padding:15,background:"linear-gradient(135deg,#ffd700,#f0a500)",border:"none",borderRadius:12,color:"#000",fontWeight:800,fontSize:14,cursor:"pointer",boxShadow:"0 4px 20px rgba(255,215,0,0.3)"}}
            >
              🔍 Scan All
            </button>
            <button
              onClick={getSignal}
              style={{padding:15,background:"linear-gradient(135deg,#4fc3f7,#7c83ff)",border:"none",borderRadius:12,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}
            >
              📊 Single
            </button>
          </div>
        )}

        {/* Nav */}
        <div style={{display:"flex",justifyContent:"space-around",marginTop:24,borderTop:`1px solid rgba(255,255,255,0.05)`,paddingTop:14}}>
          {[
            {ic:"👤",lb:"Profile"},
            {ic:"📊",lb:"History",action:()=>setPage("history")},
            {ic:"📈",lb:"Signals"},
            {ic:"🧠",lb:"AI"},
            {ic:"🎧",lb:"Support"}
          ].map((x,i)=>(
            <div key={x.lb} onClick={x.action} style={{textAlign:"center",cursor:x.action?"pointer":"default",opacity:x.lb==="Signals"||x.lb==="History"?1:0.35}}>
              <div style={{fontSize:18,marginBottom:2}}>{x.ic}</div>
              <div style={{fontSize:9,color:x.lb==="Signals"?C.accent:C.dim,fontWeight:x.lb==="Signals"?700:400}}>{x.lb}</div>
            </div>
          ))}
        </div>

      </div>
      <div style={S.footer}>MADE BY: ABDALLAH MAHER</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
